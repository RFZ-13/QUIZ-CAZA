<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Cinegética IV — TS Gestión Forestal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#1a1208;--bark:#3d2b1a;--earth:#7a5c3a;--moss:#4a6741;--sage:#7a9e6e;--cream:#f5eed8;--parchment:#ede3c8;--red:#b84040;--green:#3a7a4a;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(74,103,65,0.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(122,92,58,0.09) 0%,transparent 50%);}
  .header{background:var(--bark);color:var(--cream);padding:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
  .header-icon{font-size:26px}.header h1{font-family:'Playfair Display',serif;font-size:1.15rem;line-height:1.2}.header p{font-size:.72rem;opacity:.65;margin-top:2px}
  .prog-wrap{background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 24px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--earth);position:sticky;top:65px;z-index:99;}
  .prog-bar{flex:1;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--sage));border-radius:3px;transition:width .4s}
  .score-badge{background:var(--bark);color:var(--cream);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.73rem;white-space:nowrap}
  .container{max-width:700px;margin:0 auto;padding:20px 16px 50px}
  .card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;animation:up .28s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .block-tag{display:inline-block;background:var(--moss);color:#fff;padding:2px 9px;border-radius:4px;font-size:.7rem;font-weight:600;margin-bottom:12px}
  .question{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.55;color:var(--bark);margin-bottom:18px;font-weight:700}
  .options{display:flex;flex-direction:column;gap:8px}
  .option{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:8px;border:2px solid var(--parchment);cursor:pointer;transition:all .16s;background:var(--parchment);font-size:.91rem;line-height:1.45}
  .option:hover:not(.done){border-color:var(--earth);background:#fff;transform:translateX(2px)}
  .letter{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--earth);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;margin-top:1px}
  .option.correct{border-color:var(--green);background:#eef7f0}.option.correct .letter{background:var(--green)}
  .option.wrong{border-color:var(--red);background:#fdf0f0}.option.wrong .letter{background:var(--red)}
  .option.dim{opacity:.4}.option.done{cursor:default}
  .explanation{margin-top:14px;padding:13px 15px;background:linear-gradient(135deg,#f0f7ee,#e8f4e8);border-left:4px solid var(--moss);border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.55;color:var(--bark);display:none}
  .explanation.show{display:block}
  .nav{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
  .btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:600;transition:all .16s}
  .btn-p{background:var(--bark);color:#fff}.btn-p:hover{background:var(--earth)}
  .btn-s{background:var(--parchment);color:var(--bark);border:1px solid rgba(0,0,0,.12)}.btn-s:hover{background:#e8dfc4}
  .btn:disabled{opacity:.38;cursor:not-allowed}
  .dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
  .dot{width:17px;height:17px;border-radius:50%;border:1px solid rgba(0,0,0,.15);cursor:pointer;font-size:.62rem;display:flex;align-items:center;justify-content:center;color:var(--earth);background:var(--parchment)}
  .dot.cur{border:2px solid var(--bark);font-weight:700}.dot.ok{background:var(--green);border-color:var(--green);color:#fff}.dot.no{background:var(--red);border-color:var(--red);color:#fff}
  .results{text-align:center;padding:8px 0 20px}
  .score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Playfair Display',serif;box-shadow:0 6px 28px rgba(0,0,0,.14)}
  .score-circle .big{font-size:2rem;font-weight:700;line-height:1}.score-circle .sub{font-size:.75rem;opacity:.7;margin-top:2px}
  .grade-text{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:5px}.grade-sub{color:var(--earth);font-size:.88rem;margin-bottom:22px}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--parchment);border-radius:10px;padding:11px 16px;text-align:center;min-width:80px}
  .stat .n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--bark)}.stat .l{font-size:.7rem;color:var(--earth);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .ak-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--bark);margin:20px 0 11px;padding-bottom:8px;border-bottom:2px solid var(--parchment)}
  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .ftab{padding:4px 11px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:var(--parchment);color:var(--earth);font-family:'Source Sans 3',sans-serif}
  .ftab.on{background:var(--bark);color:#fff;border-color:var(--bark)}
  .ak-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:6px;font-size:.83rem;line-height:1.45}
  .ak-item.ok{background:#eef7f0}.ak-item.no{background:#fdf0f0}
  .ak-icon{flex-shrink:0;font-size:.95rem}.ak-num{flex-shrink:0;font-weight:600;color:var(--earth);width:26px}
  .start{text-align:center;padding:12px 0}
  .start h2{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--bark);margin-bottom:8px}
  .start p{color:var(--earth);font-size:.9rem;margin-bottom:5px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:18px 0 22px}
  .tag{background:var(--parchment);border:1px solid rgba(0,0,0,.1);padding:4px 12px;border-radius:20px;font-size:.76rem;color:var(--earth);font-weight:600}
  @media(max-width:480px){.card{padding:18px 14px}.question{font-size:.97rem}}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🦅</div>
  <div><h1>Test de Gestión Cinegética IV</h1><p>TS Gestión Forestal y del Medio Natural · 100 preguntas nuevas</p></div>
</div>
<div class="prog-wrap" id="progWrap" style="display:none">
  <span id="progLabel" style="font-weight:600;min-width:70px"></span>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="score-badge" id="scoreBadge">0/0</div>
</div>
<div class="container" id="app"></div>
<script>
const Q=[
// ══ BLOQUE 1: LEGISLACIÓN (Q1–Q15) ══
{b:"Legislación",q:"¿Cuál es el peso aproximado de un macho adulto de gamo (Dama dama) en España?",o:{A:"15-30 kg.",B:"52-63 kg en machos y 28-41 kg en hembras.",C:"100-200 kg.",D:"200-300 kg."},c:"B",e:"El gamo macho adulto en España pesa entre 52-63 kg y la hembra entre 28-41 kg, con una altura a la cruz de aproximadamente 85 cm en machos y 75 cm en hembras."},
{b:"Legislación",q:"¿En qué época del año se produce la 'ronca' del gamo y en qué consiste?",o:{A:"En primavera (abril-mayo), durante la cual los machos emiten chillidos agudos.",B:"En otoño (septiembre-noviembre), durante la cual los machos emiten ronquidos para llamar a las hembras e intimidar a los rivales.",C:"En invierno (diciembre-enero), con bramidos similares a los del ciervo.",D:"En verano (julio-agosto), coincidiendo con el celo del corzo."},c:"B",e:"La ronca del gamo es su período de celo, que ocurre en otoño (generalmente de septiembre a noviembre). Los machos emiten un ronquido característico para atraer hembras y advertir a los rivales."},
{b:"Legislación",q:"Un trofeo de ciervo que supera los 195 puntos CIC y ocupa uno de los cinco primeros puestos del ranking nacional está sujeto a:",o:{A:"Una penalización proporcional en la valoración final.",B:"Prueba obligatoria de ADN para verificar su origen.",C:"Un período de espera de seis meses antes de la homologación.",D:"Revisión por parte del Ministerio de Medio Ambiente."},c:"B",e:"El Reglamento de Homologación establece que los trofeos de ciervo de más de 195 puntos CIC cazados desde 2012 que figuren en los cinco primeros del ranking nacional deben someterse obligatoriamente a prueba de ADN."},
{b:"Legislación",q:"¿Por qué los trofeos de corzos de cuernas pintadas o con sustancias que modifican su color no son homologables?",o:{A:"Porque el color no forma parte de los criterios de valoración del corzo.",B:"Porque cualquier alteración artificial del trofeo lo descalifica de la homologación.",C:"Porque solo afecta a los puntos de belleza pero no impide la homologación.",D:"Porque los trofeos de corzo nunca se homologan por su color."},c:"B",e:"Las normas de homologación prohíben la presentación de trofeos con cuernas pintadas o tratadas con sustancias que modifiquen su color natural, pues cualquier alteración artificial descalifica el trofeo."},
{b:"Legislación",q:"¿Cuánto tiempo mínimo debe transcurrir desde la captura antes de poder homologar un trofeo de gamo que supere los 180 puntos CIC?",o:{A:"Inmediatamente.",B:"Un mes.",C:"Tres meses.",D:"Seis meses."},c:"C",e:"Los trofeos de gamo que superen los 180 puntos CIC deben esperar un mínimo de tres meses desde la fecha de captura antes de poder ser presentados a homologación."},
{b:"Legislación",q:"Según la normativa de homologación, ¿cómo deben presentarse los trofeos de jabalí (colmillos y amoladeras)?",o:{A:"Montados sobre tabla de madera con identificación del cazador.",B:"Exentos de tabla o soporte similar, en adecuadas condiciones de higiene.",C:"Acompañados del cráneo completo con mandíbula inferior.",D:"Con los colmillos separados del cráneo e identificados individualmente."},c:"B",e:"Los trofeos de jabalí deben presentarse siempre exentos de tabla o soporte, a diferencia de como suelen decorarse habitualmente. Deben estar en adecuadas condiciones de higiene."},
{b:"Legislación",q:"¿Qué instrumento de medición se utiliza específicamente para medir la anchura de los colmillos del jabalí en la homologación?",o:{A:"Cinta métrica metálica.",B:"Calibre digital.",C:"Regla de madera.",D:"Pie de rey con corredera."},c:"B",e:"La normativa de homologación establece que la anchura de los colmillos del jabalí se medirá específicamente con calibre digital, a diferencia de la mayoría de medidas que se toman con cinta métrica metálica."},
{b:"Legislación",q:"¿Qué ocurre si a un trofeo de ciervo le falta una de las dos puntas centrales?",o:{A:"Es directamente no homologable.",B:"Es homologable si solo le falta la de una cuerna, pero no si faltan las dos.",C:"Se homologa sin penalización adicional.",D:"Se cataloga automáticamente como trofeo atípico con penalización del 50%."},c:"B",e:"El reglamento permite la homologación de trofeos de ciervo y gamo a los que les falte una punta central (en una sola cuerna), pero no cuando falten las de ambas cuernas."},
{b:"Legislación",q:"¿Cuándo se considera que un trofeo de cabra montés es homologable en la zona baremo 'Norte' con medalla de oro?",o:{A:"A partir de 200 puntos.",B:"A partir de 230 puntos.",C:"A partir de 250 puntos.",D:"A partir de 220 puntos."},c:"B",e:"Para la zona baremo Norte (Ávila, Burgos, León, Salamanca, Segovia, Zamora, Cáceres norte del Tajo y Madrid), la medalla de oro de cabra montés se otorga a partir de 230 puntos CIC."},
{b:"Legislación",q:"¿Qué norma técnica internacional regula los procedimientos de evaluación de trampas de retención o captura en vivo?",o:{A:"ISO 9001: Sistemas de Gestión de Calidad.",B:"ISO 10990-5: Methods for testing restraining trap.",C:"ISO 14001: Sistemas de Gestión Ambiental.",D:"ISO 22000: Seguridad Alimentaria."},c:"B",e:"La norma ISO 10990-5 establece los procedimientos específicos para la evaluación de trampas de retención o captura en vivo, siendo el referente técnico para la homologación de métodos de captura de predadores en España."},
{b:"Legislación",q:"Según el esfuerzo mínimo de caza de jabalí en zonas de sobreabundancia de la Comunitat Valenciana, ¿cuántas jornadas equivalentes por km² forestal y temporada se exigen?",o:{A:"10 jornadas equivalentes.",B:"20 jornadas equivalentes.",C:"30 jornadas equivalentes.",D:"50 jornadas equivalentes."},c:"C",e:"La normativa valenciana sobre zonas de sobreabundancia de jabalí establece un esfuerzo mínimo de 30 jornadas equivalentes por km² de terreno forestal y temporada, combinando distintas modalidades de caza y control."},
{b:"Legislación",q:"¿Cuál es el coeficiente de equivalencia del trampeo (CeT) respecto a las batidas en el cálculo del esfuerzo de caza de jabalí?",o:{A:"CeT = 1,000 (igual que las batidas).",B:"CeT = 0,625 (necesita más jornadas para alcanzar el mismo esfuerzo).",C:"CeT = 1,250 (más eficiente que las batidas).",D:"CeT = 2,000 (doble de eficiente)."},c:"B",e:"El trampeo tiene un coeficiente de equivalencia de 0,625 respecto a las batidas, lo que significa que necesita 48 jornadas de trampeo para alcanzar las 30 jornadas equivalentes que requieren solo 30 batidas."},
{b:"Legislación",q:"¿Qué característica técnica de la jaula-trampa modular de accionamiento remoto para jabalí permite evitar la captura accidental de especies no objetivo?",o:{A:"La malla de la jaula tiene una apertura especialmente pequeña.",B:"El cierre de la puerta se activa manualmente por el controlador tras verificar visualmente la especie mediante cámara y app móvil, sin activación automática.",C:"La jaula solo funciona en zonas con alta densidad de jabalí certificada.",D:"Incorpora un sistema de reconocimiento óptico automático de especies."},c:"B",e:"La jaula-trampa modular se distingue porque la puerta se cierra de forma remota por el propio controlador tras visualizar en su app móvil que el animal capturado es realmente un jabalí, eliminando las capturas accidentales de especies no objetivo."},
{b:"Legislación",q:"¿Qué cebo es especialmente recomendado para la atracción de jabalí en las cajas-trampa autorizadas en la Comunitat Valenciana?",o:{A:"Carne fresca de cerdo doméstico.",B:"Frutos secos (almendras) o maíz en grano duro y seco.",C:"Grano de cebada húmedo.",D:"Miel de abeja silvestre."},c:"B",e:"Las resoluciones de autorización de cajas-trampa en la CV establecen que el cebo más efectivo y específico para la atracción de jabalí es la almendra u otro fruto seco, o el maíz en grano duro y seco; con preferencia a sustancias olorosas atrayentes no contaminantes."},
{b:"Legislación",q:"¿Qué obligación legal existe respecto a todos los jabalíes que entren en una caja-trampa autorizada en la Comunitat Valenciana, independientemente de su sexo o edad?",o:{A:"Pueden liberarse si son rayones o hembras lactantes.",B:"Deben ser capturados y sacrificados en su totalidad sin excepción.",C:"Pueden ser trasladados a otra zona cinegética si el titular lo solicita.",D:"Deben ser marcados y liberados si están en buen estado de salud."},c:"B",e:"Las resoluciones de autorización de cajas-trampa para jabalí en la CV incluyen expresamente la obligación de proceder a la captura y sacrificio de la totalidad de los ejemplares que entren en la trampa, con independencia de su sexo y edad."},

// ══ BLOQUE 2: BIOLOGÍA DE ESPECIES (Q16–Q32) ══
{b:"Biología de especies",q:"¿Cuál es la altura a la cruz máxima del corzo adulto y su rango de peso?",o:{A:"Hasta 100 cm de altura y 40-60 kg.",B:"Hasta 76 cm de altura y 15-30 kg.",C:"Hasta 90 cm de altura y 30-50 kg.",D:"Hasta 60 cm de altura y 8-12 kg."},c:"B",e:"El corzo adulto tiene una altura máxima en la cruz de 76 cm y pesa entre 15 y 30 kg, siendo el cérvido de menor tamaño presente en España."},
{b:"Biología de especies",q:"¿Cuál es el rasgo morfológico más inconfundible del corzo dentro de los cérvidos españoles?",o:{A:"Sus astas muy desarrolladas y ramificadas.",B:"El bozal negro que contrasta con la barbilla y el labio superior blancos.",C:"Las manchas blancas del lomo presentes en adultos.",D:"La cola muy larga y de color rojizo."},c:"B",e:"El bozal negro del corzo, que contrasta intensamente con la barbilla y el labio superior blancos, es un rasgo inconfundible que distingue a esta especie de otros cérvidos a primera vista."},
{b:"Biología de especies",q:"El ciervo macho de uno o dos años con dos astas rectas sin ramificaciones se llama vareto. ¿Cómo se denomina al del siguiente año cuando aparece la primera bifurcación lateral en cada asta?",o:{A:"Gabato.",B:"Horquillero.",C:"Estaquero.",D:"Porrudo."},c:"B",e:"Al tercer año de vida, cuando el ciervo desarrolla una bifurcación en cada asta, pasa a llamarse horquillero o enodio, denominación que precede a la aparición de cuernas más complejas en años sucesivos."},
{b:"Biología de especies",q:"¿Qué función comunicativa cumple la cola del gamo cuando apunta verticalmente hacia arriba mostrando el envés blanco continuo con el escudo anal?",o:{A:"Indica que el animal está en reposo y sin amenazas.",B:"Señal de alarma máxima indicando huida inminente.",C:"Señal de dominancia de los machos sobre las hembras.",D:"Indicador de que el animal está en período de celo."},c:"B",e:"Cuando el gamo levanta la cola verticalmente hacia arriba, el blanco del envés continúa el blanco del escudo anal formando una señal muy visible: es la alarma máxima que indica peligro inminente y necesidad de huida, captada rápidamente por los demás miembros del grupo."},
{b:"Biología de especies",q:"¿Cuánto pesa aproximadamente una hembra adulta de ciervo en comparación con el macho?",o:{A:"Las hembras pesan lo mismo que los machos.",B:"Las hembras son un cuarto o un tercio más pequeñas y menos corpulentas que los machos.",C:"Las hembras son la mitad del peso de los machos.",D:"Las hembras son un 10% más pequeñas que los machos."},c:"B",e:"Las ciervas son notablemente más pequeñas que los machos: un cuarto o incluso un tercio menores en tamaño y peso. Esta diferencia (dimorfismo sexual) es característica de la especie y muy visible en el campo."},
{b:"Biología de especies",q:"¿A qué edad comienza a aparecer el inicio de la palmadura en la cuerna del gamo?",o:{A:"Al primer año de vida.",B:"Al cuarto año de vida, con la tercera muda.",C:"Al segundo año.",D:"Solo en ejemplares mayores de 8 años."},c:"B",e:"Con la tercera muda (cuarto año de vida) ya aparece el inicio del aplastamiento característico de la cuerna del gamo. La palmadura completa y definitiva se desarrolla plenamente a partir del cuarto año."},
{b:"Biología de especies",q:"¿Cuál es el rasgo morfológico de la huella del gamo que permite distinguirla de la del ciervo?",o:{A:"La huella del gamo es más grande y redonda que la del ciervo.",B:"Las huellas del gamo son más estrechas y alargadas que las del ciervo, con bordes exteriores casi paralelos en la parte posterior.",C:"La huella del gamo siempre muestra la impresión de los dedos secundarios.",D:"La huella del gamo es idéntica a la del ciervo y no puede distinguirse."},c:"B",e:"La huella del gamo es más estrecha y alargada que la del ciervo, con bordes casi paralelos en la parte posterior. Las señales de las almohadillas ocupan la mitad de la longitud total de la huella, con una longitud media de unos 7 cm."},
{b:"Biología de especies",q:"¿Por qué se afirma que el olfato es el sentido más útil para el ciervo en el campo?",o:{A:"Porque su visión es excelente pero el olfato completa la información.",B:"Porque el olfato les proporciona la mayor información para localizar alimento y detectar depredadores, siendo superior a su visión y audición.",C:"Porque utilizan el olfato exclusivamente para encontrar pareja en el celo.",D:"Porque el olfato solo es relevante en el caso de los machos adultos."},c:"B",e:"El olfato es el sentido dominante del ciervo: les permite detectar depredadores y localizar alimento a grandes distancias y en condiciones de baja visibilidad, siendo más fiable y eficaz que su vista (moderada) y audición para la supervivencia."},
{b:"Biología de especies",q:"¿Cuánto mide aproximadamente la huella del pie del jabalí adulto?",o:{A:"2-3 cm.",B:"5-8 cm.",C:"10-15 cm.",D:"1-2 cm."},c:"B",e:"La huella del jabalí adulto mide entre 5 y 8 cm, siendo muy característica por la forma redondeada de los dedos y la impresión de los pezuños laterales secundarios que quedan marcados en terrenos blandos."},
{b:"Biología de especies",q:"¿Cómo se llama la característica protuberancia plana que termina el hocico del jabalí?",o:{A:"Trompa.",B:"Jeta.",C:"Morro.",D:"Tripa."},c:"B",e:"El hocico del jabalí termina en una protuberancia cartilaginosa plana llamada jeta, que le permite hozar (excavar) el suelo con gran eficacia para encontrar raíces, bulbos, invertebrados y otros alimentos."},
{b:"Biología de especies",q:"¿Qué característica diferencia la huella del ciervo macho adulto de la hembra adulta?",o:{A:"No existen diferencias entre la huella del macho y la hembra.",B:"Las pezuñas delanteras de las hembras son más afiladas y no superan los 7 cm, mientras los machos superan los 8 cm.",C:"Los machos dejan siempre la impresión de los dedos secundarios y las hembras no.",D:"La huella de la hembra es siempre más redonda que la del macho."},c:"B",e:"Las huellas del ciervo macho adulto son mayores (superan los 8 cm) y menos afiladas que las de la hembra (por debajo de 7 cm). Esta diferencia puede usarse para distinguir el sexo de los individuos mediante el rastreo."},
{b:"Biología de especies",q:"¿Cuál es el peso medio del ciervo macho adulto en España?",o:{A:"50-80 kg.",B:"100-200 kg.",C:"200-300 kg.",D:"250-400 kg."},c:"B",e:"El ciervo macho adulto en España tiene un peso medio de 100-200 kg, aunque los individuos mayores de zonas con abundante alimento pueden superar este rango. Las hembras son considerablemente más ligeras."},
{b:"Biología de especies",q:"¿Qué denominación recibe en la terminología cinegética española la hembra del jabalí adulta?",o:{A:"Cierva.",B:"Guarra o marrana.",C:"Gama.",C:"Cerda.",D:"Cochina."},c:"C",e:"La hembra adulta del jabalí se denomina en terminología cinegética 'guarra' o 'marrana' (también 'cerda' en algunos territorios), mientras las crías se llaman rayones hasta los 6 meses."},
{b:"Biología de especies",q:"¿Cuál es la característica principal de la cuerna del muflón (Ovis musimon) que lo diferencia de los demás ungulados cinegéticos españoles?",o:{A:"La cuerna del muflón es siempre muy ramificada como la del ciervo.",B:"El muflón tiene cuernos permanentes (no se desmogan) en espiral que crecen durante toda la vida del animal.",C:"Solo las hembras del muflón tienen cuernos desarrollados.",D:"El muflón pierde y renueva los cuernos cada dos años."},c:"B",e:"El muflón posee cuernos (no astas) permanentes que no se desprenden. Estos crecen en espiral durante toda la vida del animal, constituyendo el trofeo que se valora en la homologación."},
{b:"Biología de especies",q:"¿Por qué la fiebre aftosa (glosopeda) es especialmente relevante para el sector cinegético, aunque actualmente esté ausente en España?",o:{A:"Porque afecta solo a la caza menor pero no a la caza mayor.",B:"Porque su eventual aparición tendría consecuencias sobre el movimiento de animales y sus productos, incluyendo los de caza, y afectaría al sector ganadero con gran impacto económico.",C:"Porque produce mortalidad masiva inmediata en cérvidos.",D:"Porque es la única enfermedad viral que afecta exclusivamente al jabalí."},c:"B",e:"Aunque la fiebre aftosa está actualmente ausente en España (favorable para la ganadería y la caza), su eventual reaparición restringiría el movimiento de ungulados silvestres y sus productos, afectando al mercado cinegético. Actualmente existe en el norte de África, lo que supone un riesgo de entrada."},
{b:"Biología de especies",q:"¿Qué síntoma externo es el primero que suele observarse en ungulados silvestres afectados por fiebre aftosa (glosopeda)?",o:{A:"Tumores cutáneos visibles en el cuello.",B:"Cojeras, debidas a lesiones en las extremidades (zona interdigital y rodete de la pezuña).",C:"Pérdida de pelo generalizada en el lomo.",D:"Coloración amarillenta de las mucosas."},c:"B",e:"Las cojeras son normalmente el primer signo detectable de fiebre aftosa en fauna silvestre, causadas por las vesículas y aftas dolorosas que se forman en la zona interdigital y el rodete de la pezuña, dificultando el movimiento."},
{b:"Biología de especies",q:"¿Qué bacteria del género Pasteurella puede causar brotes con mortalidad significativa en ciervos, especialmente en época estival?",o:{A:"Pasteurella multocida serotipo B2,5.",B:"Pasteurella haemolytica.",C:"Pasteurella pneumotropica.",D:"Pasteurella dagmatis."},c:"A",e:"Pasteurella multocida serotipo B2,5 puede causar septicemia hemorrágica en ciervos con mortalidad significativa, habiendo producido brotes repetidos en España, especialmente en verano cuando las condiciones de estrés y concentración en puntos de agua favorecen la transmisión."},

// ══ BLOQUE 3: MODALIDADES Y GESTIÓN (Q33–Q48) ══
{b:"Modalidades y gestión",q:"¿Qué relación existe entre la modalidad de espera nocturna para jabalí y la normativa sobre el uso de focos luminosos?",o:{A:"El uso de focos luminosos está completamente prohibido en la espera nocturna.",B:"La legislación permite usar un foco luminoso en el momento del disparo para identificar la pieza, pero no como cebo o para crear hábito de visita.",C:"Los focos luminosos solo pueden ser de luz blanca, no infrarroja.",D:"Solo los guardas jurados pueden usar focos en esperas nocturnas."},c:"B",e:"La legislación permite usar un foco luminoso en el momento preciso del disparo para identificar la pieza y asegurar un tiro correcto, pero no está autorizado su uso como elemento de atracción o cebo ni para habituar a los animales a acudir bajo la luz."},
{b:"Modalidades y gestión",q:"¿Cuántos cultivares son especialmente útiles para retener al jabalí dentro de un territorio forestal y reducir los daños en cultivos colindantes?",o:{A:"Solo el trigo, ya que es el cereal preferido por el jabalí.",B:"El maíz (que puede enterrarse al madurar para prolongar la visita), el sorgo, el morcajo, el repollo forrajero y la remolacha.",C:"El girasol y la colza exclusivamente.",D:"Solo las plantas con frutos silvestres como bellotas y hayucos."},c:"B",e:"Varios cultivos son atractivos para el jabalí: maíz, sorgo, morcajo, repollo forrajero, habichuelas, cotufa, patatas y remolacha. El maíz, al poder enterrarse al madurar, hace que el jabalí pase más tiempo buscando alimento dentro del territorio forestal."},
{b:"Modalidades y gestión",q:"Un cazador practica la modalidad de 'al salto' para becada. ¿Cuál es la medida de seguridad más importante en esta modalidad?",o:{A:"Llevar chaleco antibalas.",B:"No disparar nunca hacia el suelo ni en ángulo horizontal que pueda alcanzar al perro o a otro cazador, y conocer siempre la posición de los compañeros.",C:"Usar exclusivamente perdigón del nº 10.",D:"Cazar siempre en solitario, sin acompañantes."},c:"B",e:"En la caza al salto, la principal medida de seguridad es conocer en todo momento la posición del perro y de los acompañantes, y no disparar en trayectorias que puedan alcanzarles. Los disparos hacia el suelo o en ángulo muy bajo son especialmente peligrosos."},
{b:"Modalidades y gestión",q:"¿Qué es el 'terciado' en la caza de la perdiz con reclamo y por qué es importante?",o:{A:"El momento en que el cazador dispara a la perdiz que se acerca.",B:"La denominación de los pollos de un año de edad que se usan como reclamo.",C:"Técnica de crianza del reclamo macho que define el período en que el pájaro es apto para ser utilizado.",D:"El acto de colocar al reclamo en el puesto antes del amanecer."},c:"B",e:"En la terminología de la caza con reclamo, el 'pollo' designa a la perdiz de un año de edad. El conocimiento de la terminología específica de esta modalidad tradicional es parte fundamental de su práctica y cultura cinegética."},
{b:"Modalidades y gestión",q:"¿Cuál es la diferencia principal entre la modalidad de 'montería' y el 'gancho' en Castilla-La Mancha?",o:{A:"En la montería se usan escopetas y en el gancho solo rifles.",B:"El gancho es una variante de montería con número de cazadores igual o inferior a treinta y máximo cinco rehalas.",C:"La montería solo se practica en invierno y el gancho en otoño.",D:"El gancho no permite el uso de perros, solo de batidores a pie."},c:"B",e:"En Castilla-La Mancha, el gancho se define como una variante de la montería en la que el número de cazadores es igual o inferior a treinta y se emplean como máximo cinco rehalas. Por encima de esos límites la modalidad se considera montería."},
{b:"Modalidades y gestión",q:"¿Qué es el 'jabalí en mano' como modalidad de caza?",o:{A:"La captura manual de jabalíes con lazos.",B:"Una modalidad en la que un grupo de cazadores con ayuda de perros, colocados en línea y separados entre sí, avanzan cazando el terreno conjuntamente en una misma dirección.",C:"La caza de jabalí con perros sin armas de fuego.",D:"La modalidad en la que un único cazador persigue al jabalí con perro de rastro."},c:"B",e:"El jabalí en mano es una modalidad específica para jabalí en la que los cazadores, con ayuda de perros, forman una línea y avanzan juntos en la misma dirección batiendo el terreno, similar a la caza 'en mano' de caza menor pero aplicada al jabalí."},
{b:"Modalidades y gestión",q:"¿Cuándo la espera o aguardo para jabalí puede utilizarse también para otras especies de ungulados?",o:{A:"Nunca; la espera es exclusiva para el jabalí.",B:"Cuando esas otras especies de ungulados causan daños en cultivos y la administración lo autoriza.",C:"Solo durante los meses de diciembre y enero.",D:"Únicamente cuando el cazador es titular del coto."},c:"B",e:"La espera o aguardo, aunque especialmente utilizada para el jabalí, puede emplearse también para controlar poblaciones de otros ungulados que causen daños en cultivos, siempre que la administración autorice esta modalidad para dichas especies."},
{b:"Modalidades y gestión",q:"¿Qué requisito previo es indispensable para instalar una caja-trampa para jabalí según la normativa valenciana?",o:{A:"Que la zona esté oficialmente declarada como zona de sobreabundancia.",B:"Haber localizado previamente signos de presencia frecuente del jabalí (rastros, hozaduras, excrementos) en el punto de instalación.",C:"Obtener permiso escrito de todos los propietarios colindantes.",D:"Que el coto tenga más de 500 hectáreas de superficie."},c:"B",e:"Antes de instalar la trampa, es necesario verificar previamente la presencia habitual del jabalí en ese punto concreto mediante rastros, hozaduras y excrementos, para maximizar la efectividad y justificar la instalación."},
{b:"Modalidades y gestión",q:"¿Cuándo debe revisarse como mínimo una caja-trampa de cable o contrapeso para jabalí según la normativa valenciana?",o:{A:"Una vez a la semana.",B:"Una vez al día (preferiblemente de noche o a primera hora de la mañana) debido a los hábitos nocturnos del jabalí.",C:"Solo cuando la cámara detecte movimiento.",D:"Cada 48 horas como máximo."},c:"B",e:"La revisión mínima es diaria, preferiblemente de noche o a primera hora de la mañana dado el comportamiento predominantemente nocturno del jabalí, con el objetivo de minimizar el tiempo que el animal permanece capturado y reducir el estrés y posibles lesiones."},
{b:"Modalidades y gestión",q:"¿Qué instrucción de seguridad es obligatoria para informar al público sobre la presencia de cajas-trampa para jabalí?",o:{A:"No existe ninguna obligación de señalización.",B:"Se recomienda instalar carteles informativos en el acceso a la trampa para prevenir accidentes, especialmente con niños.",C:"Las trampas deben estar completamente camufladas para no alertar al jabalí.",D:"La señalización solo es obligatoria en zonas recreativas."},c:"B",e:"La normativa recomienda colocar carteles informativos en los accesos a las cajas-trampa para prevenir y evitar accidentes de personas que puedan acercarse por curiosidad, especialmente niños que pudieran introducir manos o extremidades."},
{b:"Modalidades y gestión",q:"¿Qué tipo de sustancias atrayentes tienen preferencia sobre el cebado con alimentos en las cajas-trampa de jabalí?",o:{A:"Aceites de motor usados y gasoil.",B:"Sustancias olorosas atrayentes no contaminantes ni nocivas para el medio natural, como extractos de alimentos o plantas y derivados de orina.",C:"Sangre y vísceras de animales domésticos.",D:"Productos químicos de síntesis con feromonas artificiales."},c:"B",e:"La normativa establece que con carácter preferente al cebado con alimentos pueden utilizarse sustancias olorosas atrayentes no contaminantes ni nocivas, como extractos de alimentos, plantas o derivados de orina, por su mayor selectividad y menor impacto ambiental."},
{b:"Modalidades y gestión",q:"¿En qué circunstancias puede instalarse una caja-trampa para jabalí y cebarse con alimentos en cualquier época del año en la Comunitat Valenciana?",o:{A:"Solo en los meses de temporada hábil de caza.",B:"Con independencia de que la zona esté o no declarada con sobreabundancia oficial, siempre que el suministro de alimento esté autorizado.",C:"Solo durante los meses de enero a marzo.",D:"Únicamente en zonas de sobreabundancia declarada oficialmente."},c:"B",e:"La normativa valenciana establece que puede autorizarse el suministro de alimento para atraer jabalíes a la trampa en cualquier época del año, con independencia de que la zona esté o no declarada oficialmente con sobreabundancia."},
{b:"Modalidades y gestión",q:"¿Qué limitación práctica impone la obligación de revisión diaria de las trampas sobre el número de trampas que un usuario puede mantener activas?",o:{A:"No supone ninguna limitación práctica.",B:"Limita el número de trampas que un único usuario puede mantener, ya que la revisión diaria de cada trampa exige un tiempo que determina el número máximo gestionable.",C:"Solo aplica a trampas colocadas a más de 5 km del domicilio del usuario.",D:"La limitación solo aplica durante los meses de verano."},c:"B",e:"La obligación de revisión diaria impone una limitación práctica real: un único usuario solo puede mantener activas tantas trampas como sea capaz de revisar diariamente en el tiempo disponible, lo que determina el número máximo recomendado por 500 ha."},
{b:"Modalidades y gestión",q:"¿Cuál de las siguientes modalidades tiene el coeficiente de equivalencia más alto en el cálculo del esfuerzo de caza de jabalí en zonas de sobreabundancia?",o:{A:"Las batidas (CeB = 1,000).",B:"Las esperas (CeE = 1,250), lo que significa que son más eficientes por jornada.",C:"El trampeo (CeT = 0,625).",D:"La caza al salto (CeS = 1,000)."},c:"B",e:"Las esperas tienen el coeficiente de equivalencia más alto (CeE = 1,250), lo que significa que cada jornada de espera equivale a 1,25 jornadas estándar: son la modalidad más eficiente por unidad de esfuerzo para el control del jabalí."},
{b:"Modalidades y gestión",q:"¿Qué significa que la caja-trampa modular para jabalí puede montarse en 'modo manejo'?",o:{A:"Que el dispositivo puede controlarse exclusivamente desde un teléfono móvil.",B:"Que se configura con una jaula exterior anexa conectada a la principal mediante una trampilla, donde los jabalíes se refugian facilitando su posterior sacrificio.",C:"Que la jaula puede modificarse para capturar otras especies además del jabalí.",D:"Que la trampa puede ser manejada por personal sin habilitación específica."},c:"B",e:"En el modo manejo, se añade una jaula exterior anexa conectada a la jaula principal mediante una trampilla abatible. Una vez activada la captura, los jabalíes acceden a este espacio más reducido, facilitando su localización y sacrificio."},

// ══ BLOQUE 4: CENSOS Y GESTIÓN DE POBLACIONES (Q49–Q62) ══
{b:"Censos y gestión",q:"¿Qué diferencia existe entre un censo absoluto y un censo relativo en el trabajo con fauna cinegética?",o:{A:"No existe diferencia, ambos términos son sinónimos.",B:"El censo absoluto pretende contar todos los individuos presentes, mientras el censo relativo estima la abundancia mediante un índice proporcional sin contar todos los individuos.",C:"El censo relativo siempre es más preciso que el absoluto.",D:"El censo absoluto solo puede realizarse con aviones y el relativo a pie."},c:"B",e:"El censo absoluto intenta contar todos los individuos en un área (posible en zonas pequeñas con poblaciones manipulables), mientras el censo relativo usa índices de abundancia (IKA, transectos) que son proporcionales a la densidad real pero no la miden directamente."},
{b:"Censos y gestión",q:"En la metodología de censos, ¿qué es el 'área de muestreo' y cuál es su relación con la 'unidad de muestreo'?",o:{A:"Son términos idénticos que se usan indistintamente.",B:"El área de muestreo es la superficie total que ocupa la población a censar, mientras la unidad de muestreo es la subdivide en sectores manejables que se muestrean individualmente.",C:"El área de muestreo es siempre más pequeña que la unidad de muestreo.",D:"La unidad de muestreo se aplica solo a censos de aves, no de mamíferos."},c:"B",e:"El área de muestreo es la superficie total que ocupa la población objeto de estudio. Cuando es demasiado grande para censarla directamente, se divide en unidades de muestreo más manejables de las que se obtiene una muestra representativa."},
{b:"Censos y gestión",q:"¿Qué es la 'observación directa' como método de censo de fauna y en qué circunstancias es más adecuada?",o:{A:"Solo puede usarse para aves, no para mamíferos.",B:"Consiste en contar animales observados directamente en itinerarios o desde estaciones de censo; es más adecuada para especies detectable visual o auditivamente y con densidades suficientes.",C:"Solo es aplicable cuando se dispone de visores de imagen térmica.",D:"Requiere siempre la captura previa de los individuos."},c:"B",e:"La observación directa consiste en contar animales detectados visualmente o auditivamente en itinerarios o estaciones de censo. Es especialmente adecuada para el control rutinario de la abundancia de especies cinegéticas en áreas abiertas."},
{b:"Censos y gestión",q:"¿Qué ventaja aporta el método de seguimiento nocturno con foco (lamping) para el censo de ungulados?",o:{A:"Permite contar todos los individuos sin excepción.",B:"Permite cubrir grandes superficies en poco tiempo aprovechando la mayor actividad nocturna de muchas especies, con buena detectabilidad gracias al reflejo ocular.",C:"Es el único método válido para censos oficiales.",D:"No requiere personal especializado ni equipo específico."},c:"B",e:"El seguimiento nocturno con foco (desde vehículo a baja velocidad) aprovecha que muchos ungulados son más activos de noche y el reflejo de sus ojos facilita la detección. Permite recorrer grandes superficies de forma estandarizada y comparable entre años."},
{b:"Censos y gestión",q:"¿Qué significa que una muestra sea 'representativa' en los métodos de censo de fauna?",o:{A:"Que incluye solo a los individuos adultos de la población.",B:"Que la muestra refleja fielmente las características (densidad, estructura, distribución) de la población total, permitiendo inferir conclusiones válidas para el conjunto.",C:"Que la muestra se obtiene siempre en los mismos puntos cada año.",D:"Que incluye al menos el 50% de la población total."},c:"B",e:"Una muestra representativa es aquella que refleja las propiedades de la población total de manera no sesgada, permitiendo generalizar los resultados del muestreo al conjunto de la población con una fiabilidad estadística conocida."},
{b:"Censos y gestión",q:"¿Qué es la 'tasa de mortalidad' y cómo influye en el cálculo de la cosecha sostenible?",o:{A:"Es el porcentaje de animales que mueren por causas cinegéticas únicamente.",B:"Es la proporción de individuos que mueren en un período dado por todas las causas; la cosecha sostenible no puede superar el excedente de la natalidad sobre la mortalidad natural.",C:"La tasa de mortalidad no influye en el cálculo de la cosecha sostenible.",D:"Solo incluye la mortalidad de hembras reproductoras."},c:"B",e:"La tasa de mortalidad (por todas las causas: depredación, enfermedad, accidentes) determina junto con la natalidad el incremento neto anual. La cosecha cinegética sostenible no puede superar ese incremento neto para mantener el tamaño poblacional."},
{b:"Censos y gestión",q:"¿Cuándo está justificado el uso de métodos estadísticos como el modelo REM (Random Encounter Model) frente al esfuerzo estándar de caza de jabalí?",o:{A:"Siempre, ya que el REM es obligatorio para todos los cotos.",B:"Solo cuando se desea modificar el esfuerzo mínimo estándar de 30 jornadas/km² basándose en estimaciones más precisas de la densidad poblacional.",C:"Únicamente en cotos de menos de 100 hectáreas.",D:"Solo cuando el jabalí ya ha sido completamente erradicado del territorio."},c:"B",e:"El uso de REM, REST u otros modelos precisos de estimación poblacional con cámaras trampa está justificado cuando se quiere justificar técnicamente una modificación del esfuerzo mínimo estándar de 30 jornadas equivalentes/km² forestal/temporada."},
{b:"Censos y gestión",q:"¿Qué indica la relación entre el número de hozaduras de jabalí y la superficie de terreno para el seguimiento de sus poblaciones?",o:{A:"Es un indicador poco fiable que nunca se usa en gestión.",B:"Es un índice de actividad (IKA de hozaduras) que, estandarizado por superficie o distancia recorrida, permite comparar la abundancia relativa entre zonas o entre años.",C:"Solo indica si el jabalí está presente o ausente, sin información sobre densidad.",D:"Las hozaduras solo pueden contarse en terrenos agrícolas, no forestales."},c:"B",e:"El conteo de hozaduras por unidad de superficie o por km de transecto es un índice de actividad cinegético (forma de IKA) que permite comparar la abundancia relativa del jabalí entre distintas zonas de un coto o entre temporadas, siendo un indicador de gestión práctico y económico."},
{b:"Censos y gestión",q:"¿Qué aporta el análisis de la 'estructura de clases de trofeo' en ungulados abatidos a la gestión cinegética?",o:{A:"Información exclusivamente sobre el valor económico de la temporada.",B:"Información sobre la edad media de los machos abatidos y la calidad genética de la población, permitiendo evaluar si la selección cinegética está mejorando o degradando el potencial trófico.",C:"Solo sirve para estadísticas administrativas.",D:"La estructura de clases de trofeo no tiene relación con la gestión de la población."},c:"B",e:"El análisis de la clase de trofeo de los machos abatidos revela la edad media de la cosecha y la calidad genética poblacional. Un deterioro en la clase de trofeo a lo largo de los años indica que se está cazando demasiado joven, degradando el potencial genético."},
{b:"Censos y gestión",q:"¿Qué es el 'esfuerzo de muestreo' en la realización de transectos de fauna y por qué debe estandarizarse?",o:{A:"El número de personas que participan en el censo.",B:"La cantidad de tiempo, distancia o superficie dedicada a la búsqueda de indicios; debe estandarizarse para que los índices sean comparables entre zonas y temporadas.",C:"La velocidad a la que se recorre el transecto.",D:"El número de prismáticos utilizados durante el conteo."},c:"B",e:"El esfuerzo de muestreo (distancia recorrida, tiempo invertido, superficie muestreada) debe ser constante y estandarizado para que los índices obtenidos sean comparables entre diferentes zonas o entre años consecutivos, permitiendo detectar tendencias poblacionales reales."},
{b:"Censos y gestión",q:"¿Para qué sirve específicamente un 'comedero' en la gestión cinegética de un coto?",o:{A:"Exclusivamente para atraer animales al alcance del cazador.",B:"Para proporcionar alimento suplementario en épocas de escasez, mejorar la condición corporal de las poblaciones, reducir los daños a cultivos y concentrar animales para su censo.",C:"Su uso está siempre prohibido en terrenos cinegéticos.",D:"Solo para la alimentación de cría de perdices de repoblación."},c:"B",e:"Los comederos tienen múltiples funciones en gestión: suplementar la alimentación en épocas de escasez (invierno, sequía), mejorar la condición corporal y reproductiva de las poblaciones, concentrar animales en zonas alejadas de cultivos y servir como puntos de censo y fototrampeo."},
{b:"Censos y gestión",q:"¿Cuándo es apropiado comparar los datos de un IKA (Índice Kilométrico de Abundancia) entre dos cotos diferentes?",o:{A:"Siempre que ambos cotos pertenezcan a la misma comunidad autónoma.",B:"Solo cuando los transectos se han realizado con la misma metodología, en la misma época del año y con condiciones meteorológicas comparables.",C:"Cuando ambos cotos tienen la misma superficie.",D:"Solo si los dos cotos tienen la misma especie predominante."},c:"B",e:"Los índices de abundancia solo son comparables si se han obtenido con metodología idéntica (mismos itinerarios, misma época, mismas condiciones). Las diferencias metodológicas invalidan cualquier comparación entre cotos o entre períodos."},
{b:"Censos y gestión",q:"¿Qué información proporciona la 'curva de supervivencia' de una población cinegética?",o:{A:"Solo la tasa de natalidad anual.",B:"La proporción de individuos de cada clase de edad que sobrevive de un año al siguiente, permitiendo identificar qué etapa vital es más crítica para la conservación de la población.",C:"El número exacto de individuos que mueren cada temporada de caza.",D:"La edad máxima que alcanzan los individuos de la población."},c:"B",e:"La curva de supervivencia muestra qué fracción de la población sobrevive en cada clase de edad, identificando los cuellos de botella demográficos (etapas de alta mortalidad). Esta información es esencial para diseñar las medidas de gestión más efectivas."},

// ══ BLOQUE 5: SANIDAD CINEGÉTICA (Q63–Q74) ══
{b:"Sanidad cinegética",q:"¿Qué es la pasteurelosis y qué especies cinegéticas afecta principalmente en España?",o:{A:"Una enfermedad parasitaria exclusiva de la perdiz roja.",B:"Una enfermedad bacteriana (género Pasteurella) que afecta principalmente a ciervo, gamo y aves acuáticas, pudiendo causar mortalidades significativas en brotes epidémicos.",C:"Una enfermedad vírica similar a la mixomatosis.",D:"Una enfermedad fúngica que solo afecta a jabalíes."},c:"B",e:"La pasteurelosis es una enfermedad bacteriana (Pasteurella spp., Mannheimia spp.) endémica en España que afecta principalmente a ciervos, gamos y anátidas. Normalmente causa mortalidad esporádica, pero en brotes epidémicos, especialmente en verano, puede causar mortalidades significativas en ciervos."},
{b:"Sanidad cinegética",q:"¿Por qué los brotes de pasteurelosis muy severos en aves acuáticas tienen implicaciones especiales de conservación?",o:{A:"Porque la pasteurelosis puede transmitirse a las aves rapaces.",B:"Porque los brotes muy severos en aves acuáticas pueden afectar a especies protegidas o amenazadas que comparten los humedales con las especies cinegéticas.",C:"Porque las aves acuáticas transmiten la enfermedad al ganado doméstico.",D:"Porque la pasteurelosis en aves produce toxinas que contaminan el agua."},c:"B",e:"Los brotes de pasteurelosis severa en aves acuáticas pueden tener implicaciones de conservación relevantes porque afectan de forma indiscriminada a todas las aves del humedal, incluyendo especies protegidas o amenazadas que conviven con las cinegéticas."},
{b:"Sanidad cinegética",q:"¿Cuál es la principal ruta de transmisión de la pasteurelosis entre ungulados silvestres?",o:{A:"Transmisión aérea exclusivamente.",B:"Por contacto directo, vía respiratoria y por puntos de agua y alimento compartidos.",C:"Solo a través de vectores como pulgas o garrapatas.",D:"Exclusivamente por contaminación del suelo."},c:"B",e:"La pasteurelosis se transmite principalmente por contacto directo entre animales, por vía respiratoria (aerosoles) y a través de puntos de agua y comederos compartidos donde los animales se concentran, lo que explica la mayor incidencia en épocas de estrés hídrico."},
{b:"Sanidad cinegética",q:"¿Qué diferencia fundamental existe entre la mixomatosis y la Enfermedad Hemorrágica Vírica (EHV) en términos de síntomas externos?",o:{A:"La EHV produce síntomas externos muy llamativos y la mixomatosis no.",B:"La mixomatosis produce síntomas externos muy visibles (tumores, conjuntivitis), mientras la EHV no presenta lesiones externas características y se manifiesta por mortalidad aguda.",C:"Ambas enfermedades producen síntomas externos idénticos.",D:"La mixomatosis produce muerte sin síntomas y la EHV produce tumores visibles."},c:"B",e:"La mixomatosis es fácilmente reconocible en campo por los tumores cutáneos y la conjuntivitis que producen. La EHV, en cambio, no presenta lesiones externas características: el conejo muere de forma aguda aparentemente sano, siendo la mortalidad masiva el principal indicador."},
{b:"Sanidad cinegética",q:"Un cazador encuentra un conejo muerto con rigidez muscular extrema y la cabeza hacia atrás (opistótonos). ¿Qué enfermedad sugiere este cuadro?",o:{A:"Mixomatosis avanzada.",B:"Enfermedad Hemorrágica Vírica (EHV), cuya muerte aguda produce frecuentemente este signo de opistótonos por las convulsiones previas al deceso.",C:"Tularemia.",D:"Pasteurelosis."},c:"B",e:"El opistótonos (rigidez con la cabeza arqueada hacia atrás) es un signo característico en conejos muertos de EHV, resultado de las convulsiones que preceden a la muerte rápida. Un conejo con buen aspecto pero con este signo postural es altamente sospechoso de EHV."},
{b:"Sanidad cinegética",q:"¿Qué práctica de manejo de conejos puede reducir significativamente el riesgo de introducir nuevas cepas del virus de la EHV en una población silvestre?",o:{A:"Vacunar a todos los conejos silvestres antes de la temporada.",B:"Evitar los traslados de lagomorfos, especialmente a largas distancias, para no introducir nuevas variantes víricas en poblaciones no expuestas.",C:"Mantener una densidad de conejos superior a 5 individuos/ha.",D:"Solo capturar conejos con red, nunca con cepo."},c:"B",e:"Evitar los traslados de conejos y liebres, especialmente a largas distancias, es una de las principales medidas preventivas para no introducir nuevas cepas del virus de la EHV en poblaciones silvestres que no hayan desarrollado resistencia a esas variantes."},
{b:"Sanidad cinegética",q:"¿Qué aspectos del proceso de cría en granja son fundamentales para producir perdices de repoblación con buenas características silvestres?",o:{A:"Solo importa la línea genética; el proceso de cría no influye.",B:"El aislamiento del contacto visual con el humano, el uso de imagen materna, la cría en parques amplios con vegetación y la alimentación con granos desde las 6 semanas.",C:"Criar en jaulas pequeñas para maximizar la densidad y reducir costes.",D:"Tratar preventivamente con antibióticos durante toda la cría."},c:"B",e:"El proceso de cría es tan importante como la genética: aislar del contacto humano, proporcionar imagen materna (las primeras 48h), criar en parques amplios con vegetación y densidad menor de 1 perdiz/m², y alimentar con granos desde las 6 semanas son claves para desarrollar comportamientos silvestres."},
{b:"Sanidad cinegética",q:"¿Qué riesgo sanitario específico puede suponer la repoblación con perdices de granja criadas con tratamientos antiparasitarios y antibióticos?",o:{A:"Ningún riesgo, pues los tratamientos las protegen.",B:"Pueden liberarse como aparentemente sanas pero con infecciones subclínicas que transmiten a las poblaciones silvestres no expuestas a esos patógenos.",C:"Los antibióticos previenen todas las enfermedades posibles.",D:"Solo suponen riesgo económico, no sanitario."},c:"B",e:"Las perdices de granja tratadas con antibióticos y antiparasitarios pueden estar protegidas clínicamente pero albergar patógenos que no se expresan bajo tratamiento. Al liberarse, pueden infectar a poblaciones silvestres que no han desarrollado resistencia a esos agentes."},
{b:"Sanidad cinegética",q:"¿Por qué la brucelosis de jabalí (Brucella suis) es especialmente relevante en el contexto de la caza de montería con rehalas?",o:{A:"Porque las perras de caza pueden infectarse al contacto con jabalíes y transmitir la brucela a los cazadores a través de mordeduras o contacto.",B:"Porque la brucelosis afecta únicamente a los jabalíes machos.",C:"Porque la brucelosis del jabalí no se transmite a los perros.",D:"Porque los perros son inmunes a la brucelosis porcina."},c:"A",e:"En las monterías con rehalas, los perros pueden infectarse de Brucella suis por contacto con fluidos de jabalíes infectados durante el agarre. Las perras infectadas pueden abortar y transmitir la bacteria a los cazadores mediante contacto con fluidos o mordeduras, siendo una ruta de transmisión humana a tener en cuenta."},
{b:"Sanidad cinegética",q:"¿Qué síntoma en una hembra de corzo puede alertar de una posible infección por el 'gusano del corzo' (Elaphostrongylus cervi)?",o:{A:"Manchas amarillas en la piel.",B:"Alteraciones neurológicas (movimientos incoordinados, parálisis), dificultad para caminar o síntomas respiratorios.",C:"Pérdida de toda la cuerna fuera del período de desmogue.",D:"Coloración rojiza de los ojos."},c:"B",e:"Elaphostrongylus cervi es un nematodo parásito del sistema nervioso de los cérvidos (especialmente corzo y ciervo). Las larvas migran al sistema nervioso central, pudiendo causar signos neurológicos como incoordinación, parálisis y dificultad respiratoria en infecciones severas."},

// ══ BLOQUE 6: SEGURIDAD Y PRIMEROS AUXILIOS (Q75–Q85) ══
{b:"Seguridad y primeros auxilios",q:"¿Qué precaución especial debe tomarse al transportar perros de caza en un vehículo durante un viaje de caza?",o:{A:"Los perros pueden ir sueltos en el habitáculo del pasajero.",B:"Los perros deben ir en espacio suficiente y debidamente señalizado conforme a la legislación vigente, nunca sueltos en el habitáculo, ni dejados al sol.",C:"Solo es obligatorio transportarlos en jaulas si son más de tres.",D:"No existe ninguna normativa específica sobre el transporte de perros de caza."},c:"B",e:"Los perros de caza deben transportarse siempre con el espacio suficiente, debidamente señalizado el vehículo conforme a la normativa autonómica de destino y nunca sueltos en el habitáculo ni dejados en el interior del vehículo bajo el sol, lo que puede causarles la muerte."},
{b:"Seguridad y primeros auxilios",q:"¿Por qué es especialmente peligroso disparar 'a los visos' en la caza menor?",o:{A:"Porque en los visos el arma puede calentarse excesivamente.",B:"Porque disparar hacia el horizonte o en ángulo casi horizontal mantiene los proyectiles a altura peligrosa durante gran distancia, con riesgo de alcanzar a personas no visibles.",C:"Porque los visos son zonas con vegetación que desvía los disparos.",D:"Porque en los visos la caza suele estar protegida."},c:"B",e:"Disparar 'a los visos' (hacia el horizonte) es extremadamente peligroso porque los perdigones o balas viajan a altura peligrosa durante una distancia mucho mayor que en tiro elevado, pudiendo alcanzar a personas, animales domésticos o infraestructuras no visibles."},
{b:"Seguridad y primeros auxilios",q:"¿Qué debe hacerse con el arma al tomar descanso o almorzar durante una jornada de caza?",o:{A:"Dejarla apoyada en un árbol o vehículo sin descargar para ahorrar tiempo.",B:"Descargarla siempre, guardarla en el estuche o funda, y nunca dejarla apoyada en superficies inestables o al alcance de personas no autorizadas.",C:"Dejarla cargada pero con el seguro puesto.",D:"Solo es obligatorio descargarla en zonas recreativas."},c:"B",e:"En cualquier momento de inactividad cinegética (comida, descanso, traslado) el arma debe descargarse, guardarse en su funda o estuche y nunca dejarse apoyada en superficies inestables ni al alcance de personas no autorizadas, especialmente menores."},
{b:"Seguridad y primeros auxilios",q:"¿Cuál es el riesgo específico de no 'enterrar la bala' en un disparo de rifle durante el rececho?",o:{A:"El proyectil puede rebotar en el animal y dañar al cazador.",B:"La bala conserva energía letal durante más de un kilómetro de trayectoria, pudiendo alcanzar personas, ganado o infraestructuras a gran distancia.",C:"El arma puede sufrir daños internos si el proyectil no impacta.",D:"No existe riesgo adicional si se dispara al atardecer."},c:"B",e:"'No enterrar la bala' significa disparar sin que el proyectil tenga garantizado un impacto o un destino seguro (ladera, tierra). Un proyectil de rifle no frenado puede mantener capacidad letal a más de 1 km de distancia, siendo esta la principal causa de accidentes mortales en caza mayor."},
{b:"Seguridad y primeros auxilios",q:"¿Qué actuación es correcta si, durante una batida, un cazador cree haber herido a una pieza pero no la encuentra?",o:{A:"Continuar la batida sin comunicarlo.",B:"Comunicarlo al capitán de batida, señalizar el punto de impacto y, terminada la jornada, organizar un rastreo con perro de sangre para localizar y cobrar la pieza herida.",C:"Abandonar la búsqueda si la pieza no aparece en 15 minutos.",D:"Solo comunicarlo a la administración si la pieza es de caza mayor."},c:"B",e:"El deber de cobro es una obligación ética y legal del cazador. Al herir una pieza debe comunicarse al responsable de la batida, señalizar el punto de impacto y organizar posteriormente un rastreo sistemático con perro de sangre para localizar y recuperar el animal."},
{b:"Seguridad y primeros auxilios",q:"¿Qué error de seguridad representa el hecho de que un cazador lleve el arma cargada apuntando hacia otro cazador mientras descansa en la espera?",o:{A:"No es un error, siempre que el seguro esté puesto.",B:"Es una infracción grave: el arma nunca debe apuntar hacia personas, ni en reposo, ni con el seguro puesto, ya que los mecanismos de seguridad no son infalibles.",C:"Solo es peligroso si el arma es semiautomática.",D:"Es admisible si los cazadores se conocen y confían entre sí."},c:"B",e:"El arma nunca debe apuntar hacia una persona, independientemente de si está cargada, descargada o con el seguro puesto. Los mecanismos de seguridad no son infalibles y cualquier golpe, caída o fallo mecánico puede producir un disparo accidental."},
{b:"Seguridad y primeros auxilios",q:"¿Cuándo está contraindicado administrar agua o alimentos a un accidentado de caza con herida abdominal?",o:{A:"No está contraindicado; los líquidos siempre ayudan al herido.",B:"Siempre; una herida abdominal puede requerir cirugía urgente, y la ingestión de líquidos o alimentos dificulta o impide la anestesia general necesaria.",C:"Solo si el herido está inconsciente.",D:"Solo en el caso de heridas de bala, no de perdigones."},c:"B",e:"Ante cualquier herida torácica o abdominal, o cuando se prevea cirugía urgente, el accidentado no debe ingerir nada (ayunas). La anestesia general requiere un mínimo de 6 horas de ayunas para evitar el riesgo de aspiración del contenido gástrico."},

// ══ BLOQUE 7: REPOBLACIONES Y HÁBITAT (Q86–Q100) ══
{b:"Repoblación y hábitat",q:"¿Cuál es la principal diferencia entre una 'repoblación de choque' y una 'repoblación colonizadora' de perdiz roja?",o:{A:"La repoblación de choque usa perdices silvestres y la colonizadora usa perdices de granja.",B:"La repoblación de choque es una suelta de urgencia previa a una cacería comercial, sin objetivo de establecimiento; la colonizadora busca implantar una población estable y permanente.",C:"La repoblación colonizadora solo se realiza en otoño y la de choque en primavera.",D:"Solo se diferencian en el número de ejemplares soltados."},c:"B",e:"La repoblación de choque es una práctica criticada: consiste en soltar perdices de granja días antes de una cacería para cumplir compromisos comerciales, sin ningún objetivo de recuperación poblacional. La colonizadora, en cambio, busca establecer una población reproductora estable."},
{b:"Repoblación y hábitat",q:"¿Qué es la 'repoblación de refuerzo' de perdiz roja y cuándo está justificada?",o:{A:"Es sinónimo de repoblación de choque y nunca está justificada.",B:"Se realiza en cotos donde la presión cinegética supera la producción natural, para compensar la extracción con nuevos individuos manteniendo la densidad.",C:"Solo se realiza para compensar la mortalidad natural, no la cinegética.",D:"Es la primera repoblación que se realiza en un coto sin antecedentes de perdiz."},c:"B",e:"La repoblación de refuerzo está justificada en cotos donde la extracción cinegética supera la producción natural y se quiere mantener la densidad. A diferencia de la de choque, se planifica correctamente y se integra en el plan de gestión del coto."},
{b:"Repoblación y hábitat",q:"¿Cuál es el porcentaje de éxito aproximado de la suelta directa sin aclimatación ni manejo del hábitat en perdices de granja?",o:{A:"70-80% de supervivencia.",B:"No más del 10% de los animales liberados sobreviven, salvo que se cacen inmediatamente.",C:"30-40% de supervivencia.",D:"100% si las perdices son de línea genética silvestre."},c:"B",e:"La suelta directa sin ningún tipo de aclimatación ni manejo del hábitat tiene el porcentaje de éxito más bajo: no más del 10% de los animales liberados sobreviven. Este porcentaje solo 'mejora' si las perdices se cazan inmediatamente, lo que revela su carácter esencialmente comercial."},
{b:"Repoblación y hábitat",q:"¿Qué ventaja específica tiene la suelta con 'parque de aclimatación' respecto a la suelta directa en repoblaciones de perdiz?",o:{A:"Es más económica que la suelta directa.",B:"Permite que las perdices se adapten al nuevo medio en parques sobre vegetación natural antes de la suelta, pudiendo alcanzar hasta un 35% de éxito.",C:"Garantiza que todas las perdices se establezcan en el área de suelta.",D:"No existe diferencia significativa entre ambas modalidades."},c:"B",e:"La suelta con parque de aclimatación (al menos 1 m² por individuo, instalado sobre vegetación natural) permite una adaptación gradual al nuevo medio, elevando la tasa de éxito hasta el 35%, muy superior al 10% de la suelta directa."},
{b:"Repoblación y hábitat",q:"¿Para qué sirve el anillado de las perdices antes de introducirlas en la jaula de aclimatación?",o:{A:"Para identificar el número de serie del lote de la granja.",B:"Para poder realizar un seguimiento de los animales en el tiempo y conocer los resultados de la repoblación una vez en libertad.",C:"Es un requisito legal sin utilidad práctica en gestión.",D:"Para diferenciar machos de hembras en campo."},c:"B",e:"Anillar las perdices antes de la suelta permite identificar individualmente a los animales liberados durante el seguimiento posterior, conocer su tasa de supervivencia, dispersión y éxito reproductor, datos esenciales para evaluar y mejorar el plan de repoblación."},
{b:"Repoblación y hábitat",q:"¿Qué ocurre si las perdices de repoblación se asustan y salen volando al abrir la jaula de aclimatación, en lugar de salir caminando?",o:{A:"Es la señal de que están perfectamente adaptadas al entorno.",B:"Es difícil que se mantengan en el área de repoblación, por lo que se recomienda dejar en la jaula alguna perdiz que actúe de reclamo.",C:"No supone ningún problema para el éxito de la repoblación.",D:"Indica que las perdices son de línea genética silvestre y buena calidad."},c:"B",e:"Si las perdices salen volando en lugar de caminar al abrir la jaula, es probable que se dispersen y abandonen el área de repoblación. Para evitarlo, se recomienda dejar una perdiz en la jaula como reclamo para que las demás no se alejen demasiado."},
{b:"Repoblación y hábitat",q:"¿Cuáles son las principales ventajas de la 'suelta con monitor' (perdiz o gallina inglesa adulta con perdigones de una semana) en la repoblación de perdiz?",o:{A:"Es el método más económico y sencillo de todos.",B:"El monitor actúa como tutor enseñando a los perdigones comportamientos de forrajeo, alerta y huida, mejorando significativamente su adaptación al medio natural.",C:"Solo sirve si el monitor es siempre una hembra adulta de perdiz silvestre.",D:"Los resultados del monitor nunca han sido evaluados científicamente."},c:"B",e:"La suelta con monitor (un adulto que guía a 15-20 perdigones de una semana) aprovecha el aprendizaje social: el monitor enseña a los jóvenes a buscar alimento, reconocer depredadores y desarrollar comportamientos de huida, mejorando notablemente su supervivencia frente a sueltas sin tutor."},
{b:"Repoblación y hábitat",q:"¿Por qué los cercones para la cría de liebre ibérica en semilibertad obtienen mejores resultados que la cría intensiva en granja?",o:{A:"Porque son más económicos de construir.",B:"Porque en los cercones las liebres desarrollan comportamientos naturales (forrajeo, orientación, huida, sociabilidad) que no pueden aprenderse en granjas intensivas, mejorando la supervivencia post-suelta.",C:"Porque en los cercones se usan siempre liebres de origen silvestre capturadas.",D:"Porque los cercones eliminan completamente la predación sobre las liebres."},c:"B",e:"Los cercones permiten criar liebres en condiciones próximas a las naturales: superficie amplia, vegetación, contacto limitado con humanos. Esto facilita el aprendizaje de comportamientos silvestres (forrajeo, alerta, escape) que son fundamentales para la supervivencia tras la suelta."},
{b:"Repoblación y hábitat",q:"¿Cuál es la mejor época para soltar perdices de seis o más meses de edad con objetivo de repoblación colonizadora?",o:{A:"En otoño, coincidiendo con el inicio de la temporada de caza.",B:"A principios de primavera, con perdices nacidas antes de finales de julio, para que su celo esté sincronizado con las aves silvestres.",C:"En invierno, para aprovechar la mayor disponibilidad de alimento.",D:"En verano, cuando las temperaturas son más favorables para su supervivencia."},c:"B",e:"La suelta de perdices de 6+ meses para repoblación colonizadora se realiza en primavera con animales nacidos antes de julio, para que su ciclo reproductivo esté sincronizado con el de las aves silvestres de la zona y puedan aparearse, nidificar y reproducirse como si fueran autóctonas."},
{b:"Repoblación y hábitat",q:"¿Qué es la 'línea genética silvestre' en perdices de granja y por qué es importante para las repoblaciones?",o:{A:"Es una denominación comercial sin base científica.",B:"Es la denominación de las estirpes cuyo origen genético es más próximo al de las perdices silvestres, lo que favorece comportamientos más apropiados para la supervivencia en libertad.",C:"Solo importa para evitar la hibridación con otras especies de perdiz.",D:"La línea genética no influye en la calidad de las repoblaciones."},c:"B",e:"Las perdices de línea genética silvestre son aquellas cuya descendencia está más próxima a la generación F0 de origen silvestre. Cuanto más cercanas sean a la generación original, mayor capacidad tendrán de expresar los comportamientos naturales necesarios para sobrevivir en libertad."},
{b:"Repoblación y hábitat",q:"¿Cuál es el concepto de 'zona de reserva' en el contexto de las repoblaciones de perdiz y cuál es su tamaño mínimo recomendado?",o:{A:"Una zona donde nunca puede cazarse, de dimensión ilimitada.",B:"Un área de mínimo 100 hectáreas alrededor del punto de suelta, declarada sin caza para garantizar la supervivencia y el establecimiento de las perdices soltadas.",C:"Un recinto vallado de 10 hectáreas donde se mantienen las perdices antes de la suelta.",D:"La zona de seguridad obligatoria alrededor del coto."},c:"B",e:"La zona de reserva es un área de mínimo 100 ha alrededor del punto de suelta donde se prohíbe la caza para dar tiempo a que las perdices se establezcan, formen bandos y, si es posible, se reproduzcan antes de estar sometidas a presión cinegética."},
{b:"Repoblación y hábitat",q:"¿Qué tipo de topografía favorece la supervivencia de las perdices de repoblación en el área de suelta?",o:{A:"Terrenos completamente llanos sin obstáculos.",B:"Topografía ondulada que ofrece refugio y protección contra depredadores, y si no es posible, zonas con elementos del paisaje (arroyos, montículos, márgenes) que faciliten la huida.",C:"Zonas de alta montaña con escasa vegetación.",D:"Grandes superficies de monocultivo sin matorral."},c:"B",e:"La topografía ondulada favorece la protección de las perdices al proporcionar obstáculos visuales y refugios naturales frente a los predadores. En terrenos llanos, elementos del paisaje como arroyos, montículos, islas herbáceas y márgenes desarrollados cumplen esa función."}
];

const BLOCKS=[...new Set(Q.map(q=>q.b))];
let st={screen:"start",cur:0,ans:{},filter:"Todos"};
function $i(id){return document.getElementById(id)}
function app(){return $i("app")}

function render(){
  if(st.screen==="start") renderStart();
  else if(st.screen==="quiz") renderQuiz();
  else renderResults();
  updateProg();
}

function updateProg(){
  const pw=$i("progWrap");
  if(st.screen==="quiz"){
    pw.style.display="flex";
    const done=Object.keys(st.ans).length;
    const pct=Math.round(done/Q.length*100);
    $i("progFill").style.width=pct+"%";
    $i("progLabel").textContent="P"+(st.cur+1)+" / "+Q.length;
    const correct=Object.values(st.ans).filter(a=>a.correct).length;
    $i("scoreBadge").textContent=correct+"/"+done;
  } else {pw.style.display="none";}
}

function renderStart(){
  app().innerHTML=`<div class="card start">
    <div style="font-size:40px;margin-bottom:12px">🦅</div>
    <h2>Test de Gestión Cinegética IV</h2>
    <p>TS Gestión Forestal y del Medio Natural</p>
    <p style="margin-top:4px;font-size:.82rem;opacity:.7">100 preguntas nuevas · Nivel FP Grado Superior</p>
    <div class="tags">${BLOCKS.map(b=>`<span class="tag">${b}</span>`).join("")}</div>
    <button class="btn btn-p" style="font-size:.98rem;padding:13px 34px;border-radius:8px" onclick="startQuiz()">Comenzar el test →</button>
  </div>`;
}

function startQuiz(){st={screen:"quiz",cur:0,ans:{},filter:"Todos"};render();}

function renderQuiz(){
  const i=st.cur,q=Q[i],a=st.ans[i];
  const start=Math.max(0,i-4),end=Math.min(Q.length,start+10);
  let dots="";
  for(let d=start;d<end;d++){
    let cls="dot"+(d===i?" cur":"")+(st.ans[d]?(st.ans[d].correct?" ok":" no"):"");
    dots+=`<div class="${cls}" onclick="goTo(${d})">${d+1}</div>`;
  }
  let opts="";
  ["A","B","C","D"].forEach(l=>{
    let cls="option"+(a?" done":"");
    if(a){if(l===q.c)cls+=" correct";else if(l===a.chosen)cls+=" wrong";else cls+=" dim";}
    opts+=`<div class="${cls}" onclick="answer('${l}')"><div class="letter">${l}</div><div>${q.o[l]}</div></div>`;
  });
  const exp=a?`<div class="explanation show">💡 <b>Explicación:</b> ${q.e}</div>`:"";
  const last=i===Q.length-1;
  app().innerHTML=`<div class="card">
    <div class="block-tag">${q.b}</div>
    <div class="question">${q.q}</div>
    <div class="options">${opts}</div>${exp}
    <div class="nav">
      <button class="btn btn-s" onclick="prevQ()" ${i===0?"disabled":""}>← Anterior</button>
      <button class="btn btn-p" onclick="nextQ()" ${a?"":"disabled"}>${last?"Ver resultados →":"Siguiente →"}</button>
      <button class="btn btn-s" onclick="skipQ()" ${a?"style='display:none'":""}>Saltar</button>
    </div>
    <div class="dots">${dots}</div>
  </div>`;
}

function answer(l){const i=st.cur;if(st.ans[i])return;st.ans[i]={chosen:l,correct:l===Q[i].c};render();}
function nextQ(){if(st.cur>=Q.length-1){st.screen="results";render();}else{st.cur++;render();}}
function prevQ(){if(st.cur>0){st.cur--;render();}}
function goTo(i){st.cur=i;render();}
function skipQ(){if(!st.ans[st.cur])st.ans[st.cur]={chosen:null,correct:false};nextQ();}

function renderResults(){
  const total=Q.length,done=Object.keys(st.ans).length;
  const correct=Object.values(st.ans).filter(a=>a.correct).length;
  const wrong=done-correct,pct=Math.round(correct/total*100);
  let grade,gsub,gcol;
  if(pct>=90){grade="Excelente 🥇";gsub="Resultado sobresaliente";gcol=["#3a7a4a","#fff"];}
  else if(pct>=75){grade="Bien 🥈";gsub="Resultado satisfactorio";gcol=["#7a7a3a","#fff"];}
  else if(pct>=50){grade="Aprobado 🥉";gsub="Resultado suficiente";gcol=["#7a5c3a","#fff"];}
  else{grade="No superado ❌";gsub="Necesita repasar los contenidos";gcol=["#b84040","#fff"];}

  const f=st.filter;
  const filtered=Q.map((q,i)=>({q,i,a:st.ans[i]})).filter(({q,i,a})=>{
    if(!a)return false;
    if(f==="Errores")return !a.correct;
    if(f==="Aciertos")return a.correct;
    if(f!=="Todos")return q.b===f;
    return true;
  });

  const tabs=["Todos","Aciertos","Errores",...BLOCKS];
  const akHTML=filtered.length?filtered.map(({q,i,a})=>`
    <div class="ak-item ${a.correct?"ok":"no"}">
      <div class="ak-icon">${a.correct?"✅":"❌"}</div>
      <div class="ak-num">Q${i+1}</div>
      <div>
        <div style="font-weight:600;margin-bottom:4px;font-size:.83rem">${q.q.substring(0,85)}${q.q.length>85?"...":""}</div>
        ${a.correct
          ?`<div style="font-size:.78rem;color:#3a7a4a">✓ ${a.chosen}: ${q.o[a.chosen].substring(0,60)}</div>`
          :`<div style="font-size:.78rem;color:#b84040">Tu respuesta: ${a.chosen||"Saltada"}</div>
           <div style="font-size:.78rem;color:#3a7a4a">✓ Correcta: ${q.c} — ${q.o[q.c].substring(0,55)}</div>
           <div style="font-size:.76rem;color:#7a5c3a;font-style:italic;margin-top:3px">💡 ${q.e}</div>`}
      </div>
    </div>`).join("")
    :`<div style="text-align:center;color:#7a5c3a;padding:20px;font-size:.85rem">No hay elementos con este filtro.</div>`;

  app().innerHTML=`<div class="card">
    <div class="results">
      <div class="score-circle" style="background:${gcol[0]};color:${gcol[1]}">
        <div class="big">${correct}/${total}</div><div class="sub">${pct}%</div>
      </div>
      <div class="grade-text">${grade}</div>
      <div class="grade-sub">${gsub}</div>
      <div class="stats">
        <div class="stat"><div class="n" style="color:#3a7a4a">${correct}</div><div class="l">Correctas</div></div>
        <div class="stat"><div class="n" style="color:#b84040">${wrong}</div><div class="l">Errores</div></div>
        <div class="stat"><div class="n">${total-done}</div><div class="l">Saltadas</div></div>
        <div class="stat"><div class="n">${pct}%</div><div class="l">Nota</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-p" onclick="startQuiz()">🔄 Repetir test</button>
        <button class="btn btn-s" onclick="reviewWrong()">Repasar errores</button>
      </div>
    </div>
    <div class="ak-title">📋 Revisión de respuestas</div>
    <div class="filters">${tabs.map(t=>`<button class="ftab${st.filter===t?" on":""}" onclick="setFilter('${t}')">${t}</button>`).join("")}</div>
    ${akHTML}
  </div>`;
}

function setFilter(f){st.filter=f;renderResults();}
function reviewWrong(){
  const w=Object.keys(st.ans).filter(i=>!st.ans[i].correct).map(Number);
  if(!w.length){alert("¡No tienes errores! 🎉");return;}
  st.cur=w[0];st.screen="quiz";render();
}
render();
</script>
</body>
</html>
