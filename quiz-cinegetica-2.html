<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Cinegética II — TS Gestión Forestal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#1a1208;--bark:#3d2b1a;--earth:#7a5c3a;--moss:#4a6741;--sage:#7a9e6e;--cream:#f5eed8;--parchment:#ede3c8;--red:#b84040;--green:#3a7a4a;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(74,103,65,0.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(122,92,58,0.09) 0%,transparent 50%);}
  .header{background:var(--bark);color:var(--cream);padding:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
  .header-icon{font-size:26px}.header h1{font-family:'Playfair Display',serif;font-size:1.15rem;line-height:1.2}.header p{font-size:.72rem;opacity:.65;margin-top:2px}
  .prog-wrap{background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 24px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--earth);position:sticky;top:65px;z-index:99;}
  .prog-bar{flex:1;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--sage));border-radius:3px;transition:width .4s}
  .score-badge{background:var(--bark);color:var(--cream);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.73rem;white-space:nowrap}
  .container{max-width:700px;margin:0 auto;padding:20px 16px 50px}
  .card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;animation:up .28s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .block-tag{display:inline-block;background:var(--moss);color:#fff;padding:2px 9px;border-radius:4px;font-size:.7rem;font-weight:600;margin-bottom:12px}
  .question{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.55;color:var(--bark);margin-bottom:18px;font-weight:700}
  .options{display:flex;flex-direction:column;gap:8px}
  .option{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:8px;border:2px solid var(--parchment);cursor:pointer;transition:all .16s;background:var(--parchment);font-size:.91rem;line-height:1.45}
  .option:hover:not(.done){border-color:var(--earth);background:#fff;transform:translateX(2px)}
  .letter{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--earth);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;margin-top:1px}
  .option.correct{border-color:var(--green);background:#eef7f0}.option.correct .letter{background:var(--green)}
  .option.wrong{border-color:var(--red);background:#fdf0f0}.option.wrong .letter{background:var(--red)}
  .option.dim{opacity:.4}.option.done{cursor:default}
  .explanation{margin-top:14px;padding:13px 15px;background:linear-gradient(135deg,#f0f7ee,#e8f4e8);border-left:4px solid var(--moss);border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.55;color:var(--bark);display:none}
  .explanation.show{display:block}
  .nav{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
  .btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:600;transition:all .16s}
  .btn-p{background:var(--bark);color:#fff}.btn-p:hover{background:var(--earth)}
  .btn-s{background:var(--parchment);color:var(--bark);border:1px solid rgba(0,0,0,.12)}.btn-s:hover{background:#e8dfc4}
  .btn:disabled{opacity:.38;cursor:not-allowed}
  .dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
  .dot{width:17px;height:17px;border-radius:50%;border:1px solid rgba(0,0,0,.15);cursor:pointer;font-size:.62rem;display:flex;align-items:center;justify-content:center;color:var(--earth);background:var(--parchment)}
  .dot.cur{border:2px solid var(--bark);font-weight:700}.dot.ok{background:var(--green);border-color:var(--green);color:#fff}.dot.no{background:var(--red);border-color:var(--red);color:#fff}
  .results{text-align:center;padding:8px 0 20px}
  .score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Playfair Display',serif;box-shadow:0 6px 28px rgba(0,0,0,.14)}
  .score-circle .big{font-size:2rem;font-weight:700;line-height:1}.score-circle .sub{font-size:.75rem;opacity:.7;margin-top:2px}
  .grade-text{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:5px}.grade-sub{color:var(--earth);font-size:.88rem;margin-bottom:22px}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--parchment);border-radius:10px;padding:11px 16px;text-align:center;min-width:80px}
  .stat .n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--bark)}.stat .l{font-size:.7rem;color:var(--earth);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .ak-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--bark);margin:20px 0 11px;padding-bottom:8px;border-bottom:2px solid var(--parchment)}
  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .ftab{padding:4px 11px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:var(--parchment);color:var(--earth);font-family:'Source Sans 3',sans-serif}
  .ftab.on{background:var(--bark);color:#fff;border-color:var(--bark)}
  .ak-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:6px;font-size:.83rem;line-height:1.45}
  .ak-item.ok{background:#eef7f0}.ak-item.no{background:#fdf0f0}
  .ak-icon{flex-shrink:0;font-size:.95rem}.ak-num{flex-shrink:0;font-weight:600;color:var(--earth);width:26px}
  .start{text-align:center;padding:12px 0}
  .start h2{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--bark);margin-bottom:8px}
  .start p{color:var(--earth);font-size:.9rem;margin-bottom:5px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:18px 0 22px}
  .tag{background:var(--parchment);border:1px solid rgba(0,0,0,.1);padding:4px 12px;border-radius:20px;font-size:.76rem;color:var(--earth);font-weight:600}
  @media(max-width:480px){.card{padding:18px 14px}.question{font-size:.97rem}}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🦅</div>
  <div><h1>Test de Gestión Cinegética II</h1><p>TS Gestión Forestal y del Medio Natural · 100 preguntas</p></div>
</div>
<div class="prog-wrap" id="progWrap" style="display:none">
  <span id="progLabel" style="font-weight:600;min-width:70px"></span>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="score-badge" id="scoreBadge">0/0</div>
</div>
<div class="container" id="app"></div>
<script>
const Q=[
// ══ BLOQUE 1: LEGISLACIÓN (Q1-Q15) ══
{b:"Legislación",q:"¿Cuál es el período mínimo de validez de un Plan Técnico de Ordenación Cinegética (PTOC) en la Comunitat Valenciana?",o:{A:"1 año.",B:"3 años.",C:"5 años.",D:"10 años."},c:"C",e:"Los PTOC tienen una vigencia mínima de 5 años en la Comunitat Valenciana, sin perjuicio de sus revisiones anuales mediante el Plan Anual de Aprovechamiento."},
{b:"Legislación",q:"Según la Ley 13/2004 de caza valenciana, ¿qué documento debe llevar obligatoriamente el cazador durante el ejercicio de la caza?",o:{A:"Solo el DNI.",B:"Licencia de caza, permiso de la finca y seguro de responsabilidad civil.",C:"Únicamente la licencia de caza.",D:"Solo el permiso escrito del titular del coto."},c:"B",e:"El artículo 7 de la Ley 13/2004 exige portar la licencia de caza, el permiso de la finca y el seguro de responsabilidad civil obligatorio durante el ejercicio de la caza."},
{b:"Legislación",q:"¿Qué concepto jurídico define el derecho del propietario del terreno sobre la fauna silvestre que en él habita?",o:{A:"Res nullius: la caza no pertenece a nadie hasta que es capturada.",B:"Res communes: la caza pertenece a todos los ciudadanos.",C:"Derecho de accesión: la caza pertenece al propietario del terreno.",D:"Res publicae: la caza pertenece al Estado."},c:"A",e:"La fauna silvestre tiene la consideración de res nullius en el derecho español — no pertenece a nadie hasta que es legalmente capturada por el cazador autorizado."},
{b:"Legislación",q:"Según la Orden de Vedas de la Comunitat Valenciana 2025-26, ¿qué especie tiene establecido un período de caza diferenciado para machos y hembras?",o:{A:"El conejo de monte.",B:"La perdiz roja.",C:"El corzo (Capreolus capreolus).",D:"La liebre ibérica."},c:"C",e:"El corzo tiene períodos de caza diferenciados por sexo: los machos se cazan durante la 'ronca' (época de celo, julio-agosto) y las hembras en otoño-invierno, para una gestión más selectiva."},
{b:"Legislación",q:"¿Qué infracción se considera 'muy grave' según la Ley de Caza Valenciana?",o:{A:"Cazar sin llevar el seguro de responsabilidad civil.",B:"Cazar en terrenos de titularidad ajena sin permiso.",C:"Cazar especies protegidas o en época de veda.",D:"No señalizar correctamente el coto."},c:"C",e:"La caza de especies protegidas o en períodos de veda está tipificada como infracción muy grave en la Ley 13/2004, con sanciones que pueden incluir la retirada definitiva de la licencia."},
{b:"Legislación",q:"¿Qué organismo en España es responsable de la homologación oficial de trofeos de caza mayor a nivel nacional?",o:{A:"El Ministerio de Medio Ambiente.",B:"La Junta Nacional de Homologación de Trofeos de Caza (JNHTC).",C:"La Real Federación Española de Caza.",D:"Las comunidades autónomas exclusivamente."},c:"B",e:"La Junta Nacional de Homologación de Trofeos de Caza (JNHTC) es el organismo oficial español responsable de la medición y clasificación de trofeos según criterios del CIC."},
{b:"Legislación",q:"En la normativa de homologación de trofeos, ¿cuándo puede homologarse un trofeo de jabalí tras su captura?",o:{A:"Pasado un mes mínimo.",B:"Pasados tres meses mínimo.",C:"Inmediatamente después de ser cazado.",D:"Solo en la siguiente temporada de caza."},c:"C",e:"El trofeo de jabalí (colmillos y amoladeras) puede homologarse inmediatamente después de la captura, a diferencia de los cérvidos que deben esperar entre uno y tres meses."},
{b:"Legislación",q:"¿Qué establece el Real Decreto 137/1993 de Armas en relación con las armas prohibidas para la caza?",o:{A:"Prohíbe todas las armas semiautomáticas para la caza.",B:"Prohíbe armas de fuego con silenciador, visores de imagen térmica y trampas explosivas entre otras.",C:"Prohíbe únicamente el uso de rifles de calibre superior a .308.",D:"Prohíbe el uso de cualquier arma de repetición en batidas."},c:"B",e:"El RD 137/1993 y sus modificaciones prohíben en el ejercicio de la caza el uso de silenciadores, visores de imagen térmica, trampas explosivas y otros medios no selectivos."},
{b:"Legislación",q:"¿Qué superficie mínima debe tener un coto privado de caza menor para poder constituirse como tal en la Comunitat Valenciana?",o:{A:"100 hectáreas.",B:"250 hectáreas.",C:"500 hectáreas.",D:"No existe superficie mínima establecida."},c:"C",e:"La Ley 13/2004 establece una superficie mínima de 500 hectáreas para la constitución de cotos privados de caza menor en la Comunitat Valenciana."},
{b:"Legislación",q:"¿Qué entiende la legislación valenciana por 'aprovechamiento cinegético sostenible'?",o:{A:"Cazar el máximo número de animales posible para obtener el mayor rendimiento económico.",B:"El aprovechamiento que permite mantener o mejorar el estado de las poblaciones silvestres a largo plazo.",C:"Cazar únicamente las especies más abundantes.",D:"El que se realiza sin uso de vehículos a motor."},c:"B",e:"El aprovechamiento sostenible implica mantener o mejorar el estado de conservación de las poblaciones cinegéticas, equilibrando la extracción con la capacidad de recuperación natural."},
{b:"Legislación",q:"Un cazador encuentra en el campo un corzo muerto sin causa aparente. Según la legislación, debe:",o:{A:"Llevárselo como pieza cobrada, ya que está muerto.",B:"Dejarlo y no comunicarlo a nadie.",C:"Comunicarlo al agente medioambiental o a la autoridad competente.",D:"Enterrarlo inmediatamente para evitar la propagación de enfermedades."},c:"C",e:"Los animales encontrados muertos en el campo deben comunicarse a la autoridad medioambiental competente. Apropiarse de ellos sin autorización constituye una infracción."},
{b:"Legislación",q:"¿Qué tipo de seguro es obligatorio para el ejercicio de la caza en España?",o:{A:"Seguro de accidentes personales del cazador.",B:"Seguro de responsabilidad civil por daños a terceros.",C:"Seguro de vida del cazador.",D:"Seguro de daños a la fauna silvestre."},c:"B",e:"La legislación española exige un seguro de responsabilidad civil obligatorio que cubra los daños que el cazador pueda causar a terceras personas o bienes ajenos durante el ejercicio de la caza."},
{b:"Legislación",q:"¿Qué es un 'Refugio de Fauna' según la Ley de Caza Valenciana?",o:{A:"Un área donde solo puede cazarse con permiso especial.",B:"Una zona de terreno no cinegético donde la caza está totalmente prohibida para proteger determinadas especies.",C:"Un recinto vallado donde se crían animales para repoblación.",D:"Un área de descanso para cazadores dentro del coto."},c:"B",e:"Los Refugios de Fauna son zonas declaradas como terreno no cinegético donde se prohíbe totalmente la caza para proteger especies amenazadas o sus hábitats críticos."},
{b:"Legislación",q:"Según el Decreto 142/2025 valenciano, ¿qué plazo máximo tiene el titular del coto para comunicar los resultados de una cacería de ungulados?",o:{A:"24 horas.",B:"48 horas.",C:"7 días.",D:"30 días."},c:"C",e:"El Decreto 142/2025 establece que los resultados de las cacerías de ungulados (piezas abatidas, sexo, edad) deben comunicarse a la administración en un plazo máximo de 7 días."},
{b:"Legislación",q:"¿Qué condición debe cumplir el titular de un coto para poder realizar rondas nocturnas de control de ungulados según el Decreto 142/2025?",o:{A:"Tener más de 1.000 hectáreas de terreno acotado.",B:"Obtener autorización administrativa previa de la Generalitat Valenciana.",C:"Disponer de un guarda jurado de caza a tiempo completo.",D:"Haber cazado más de 50 ungulados en la temporada anterior."},c:"B",e:"Las rondas nocturnas requieren autorización administrativa previa de la Generalitat Valenciana, quien valorará la justificación técnica y las condiciones de su realización."},

// ══ BLOQUE 2: ESPACIOS CINEGÉTICOS (Q16-Q25) ══
{b:"Espacios cinegéticos",q:"¿Qué es un 'coto de caza mayor' y en qué se diferencia de uno de caza menor?",o:{A:"No existe diferencia legal entre ambos tipos.",B:"El coto de caza mayor tiene mayor superficie mínima y está orientado al aprovechamiento de ungulados y otras especies de caza mayor.",C:"Solo se diferencia en el tipo de armas permitidas.",D:"El coto de caza mayor no requiere Plan Técnico de Ordenación."},c:"B",e:"Los cotos de caza mayor están orientados al aprovechamiento de ungulados y otras especies mayores, requieren mayor superficie mínima y sus planes técnicos incluyen objetivos de gestión de trofeos y densidades."},
{b:"Espacios cinegéticos",q:"¿Qué significa la señalización de un terreno cinegético con tablillas blancas con letras negras 'COTO DE CAZA' en la Comunitat Valenciana?",o:{A:"Terreno de caza libre para cualquier cazador con licencia.",B:"Terreno acotado donde solo pueden cazar los autorizados por el titular.",C:"Zona de reserva total donde la caza está prohibida.",D:"Terreno en proceso de constitución de coto."},c:"B",e:"Las tablillas de señalización indican que el terreno está acotado y el acceso para cazar está restringido a las personas autorizadas expresamente por el titular del aprovechamiento."},
{b:"Espacios cinegéticos",q:"Un propietario de una finca de 200 hectáreas quiere crear un coto de caza menor en la Comunitat Valenciana. ¿Qué debe hacer?",o:{A:"Solo necesita publicarlo en el DOGV.",B:"Necesita adosarse a otros propietarios colindantes hasta alcanzar las 500 hectáreas mínimas.",C:"Puede constituirlo directamente al superar las 100 hectáreas mínimas.",D:"No puede, ya que la mínima para caza menor es de 1.000 hectáreas."},c:"B",e:"Al no alcanzar las 500 ha mínimas requeridas, el propietario necesitaría integrar su finca en un coto mayor mediante acuerdo con propietarios colindantes para alcanzar la superficie mínima legal."},
{b:"Espacios cinegéticos",q:"¿Qué es una 'zona de seguridad' en relación con los terrenos cinegéticos?",o:{A:"Una área dentro del coto reservada para la reproducción de las especies.",B:"Zona perimetral alrededor de núcleos urbanos, vías de comunicación y edificaciones donde el ejercicio de la caza está prohibido.",C:"La distancia mínima entre dos puestos de caza en una batida.",D:"El área de reserva obligatoria del 20% del coto."},c:"B",e:"Las zonas de seguridad son franjas de terreno alrededor de núcleos habitados, carreteras, vías férreas y edificaciones donde está prohibido cazar para proteger a las personas."},
{b:"Espacios cinegéticos",q:"¿Cuál es la distancia mínima de seguridad desde la que se puede disparar hacia una vía de comunicación o núcleo urbano en España?",o:{A:"50 metros.",B:"100 metros.",C:"200 metros.",D:"500 metros."},c:"B",e:"La legislación cinegética española establece una distancia de seguridad mínima de 100 metros desde vías de comunicación, núcleos habitados y zonas recreativas para el ejercicio del disparo."},
{b:"Espacios cinegéticos",q:"¿Qué tipo de terreno es considerado 'terreno cinegético de aprovechamiento común' en España?",o:{A:"Los terrenos de titularidad privada sin constituir como coto.",B:"Los terrenos públicos y los privados no acotados donde la caza es libre para cualquier cazador con licencia y permiso autonómico.",C:"Los parques nacionales y reservas naturales.",D:"Los terrenos del Estado gestionados por el SEPRONA."},c:"B",e:"Los terrenos de aprovechamiento cinegético común son aquellos no acotados (públicos o privados) donde el ejercicio de la caza es libre para cualquier cazador que disponga de licencia y permiso autonómico."},
{b:"Espacios cinegéticos",q:"¿Qué obligación tiene el titular de un coto respecto a la señalización del perímetro?",o:{A:"Solo debe señalizar los accesos principales.",B:"Debe señalizar todo el perímetro con tablillas homologadas a intervalos no superiores a 200 metros.",C:"La señalización es opcional si el coto está vallado.",D:"Debe instalar vallas en todo el perímetro."},c:"B",e:"La normativa exige señalizar todo el perímetro del coto con tablillas homologadas a intervalos no superiores a 200 metros, para que los cazadores puedan identificar claramente los límites del acotado."},
{b:"Espacios cinegéticos",q:"¿Qué son los 'cotos de piezas vivas de caza' (cercones) y cuál es su función principal?",o:{A:"Cotos donde la caza se practica exclusivamente con arco.",B:"Recintos cercados donde se crían o mantienen animales vivos para su posterior captura o para repoblaciones.",C:"Cotos donde solo se permite la caza fotográfica.",D:"Terrenos donde se practica la caza con perros de rastro exclusivamente."},c:"B",e:"Los cotos de piezas vivas son recintos cercados destinados a la cría, mantenimiento y reproducción de animales silvestres vivos, con fines de aprovechamiento cinegético o repoblación."},
{b:"Espacios cinegéticos",q:"¿Cuál es la función principal del Plan Anual de Aprovechamiento (PAA) en la gestión de un coto?",o:{A:"Establecer los presupuestos económicos del coto para el año siguiente.",B:"Concretar las cuotas de caza anuales por especie y la distribución de jornadas dentro del marco del PTOC.",C:"Renovar anualmente la licencia de caza de los socios.",D:"Planificar las repoblaciones de fauna del año siguiente."},c:"B",e:"El PAA concreta anualmente las cuotas de capturas por especie, las fechas y modalidades de caza permitidas, dentro del marco estratégico establecido por el PTOC quinquenal."},
{b:"Espacios cinegéticos",q:"¿Qué documento acredita la procedencia legal de las piezas de caza mayor en la Comunitat Valenciana?",o:{A:"El carnet de socio del coto.",B:"El precinto oficial de la Generalitat Valenciana colocado en la pieza abatida.",C:"La declaración firmada del titular del coto.",D:"La factura de compra del permiso de caza."},c:"B",e:"El precinto oficial de la Generalitat Valenciana es el documento que acredita la procedencia legal de las piezas de caza mayor abatidas, debiendo colocarse en la pieza inmediatamente tras su cobro."},

// ══ BLOQUE 3: MODALIDADES DE CAZA (Q26-Q38) ══
{b:"Modalidades de caza",q:"En la modalidad de montería, ¿qué es la 'armada'?",o:{A:"El conjunto de armas permitidas en la montería.",B:"La línea de cazadores colocados en puestos fijos para esperar y disparar a las piezas que empujan las rehalas.",C:"El grupo de perros que baten la mancha.",D:"El equipo organizador de la montería."},c:"B",e:"La armada es la línea de cazadores situados en puestos fijos (portillos) que esperan a las piezas empujadas por las rehalas. Según su posición en la mancha recibe nombres distintos: cuerda, sopié, recula, frontera."},
{b:"Modalidades de caza",q:"¿Qué es un 'postor' en el contexto de la montería?",o:{A:"El cazador que realiza más disparos durante la montería.",B:"El encargado de colocar a los cazadores en sus puestos y organizar la armada.",C:"El dueño de los perros de rehala.",D:"El vigilante que controla el acceso de personas ajenas."},c:"B",e:"El postor (también llamado Maestro de Sierra) es el encargado de colocar a los cazadores en sus puestos y de organizar la armada, responsabilizándose del buen funcionamiento de la línea de tiradores."},
{b:"Modalidades de caza",q:"¿Qué tipo de perros componen principalmente las rehalas en una montería?",o:{A:"Perros de muestra como el setter o el braco.",B:"Podencos de talla grande y perros de presa como mastines, alanos y dogos.",C:"Galgos y lebreles.",D:"Perros de agua y retrievers."},c:"B",e:"Las rehalas en la montería están formadas principalmente por podencos de talla grande para el rastreo y conducción de las piezas, y perros de presa como mastines, alanos y dogos para el agarre."},
{b:"Modalidades de caza",q:"¿En qué consiste la modalidad de 'espera o aguardo' para jabalí?",o:{A:"El cazador en línea avanza con otros cazadores batiendo el terreno.",B:"El cazador espera apostado en un lugar fijo, generalmente al atardecer o de noche, a que el jabalí acuda espontáneamente.",C:"Se utilizan perros para acorralar al jabalí en un punto concreto.",D:"Los cazadores rodean una mancha y esperan que los perros saquen las piezas."},c:"B",e:"En la espera o aguardo para jabalí, el cazador se sitúa en un puesto fijo (generalmente elevado) al atardecer o de noche, esperando pacientemente la llegada espontánea del animal, sin uso de ojeadores."},
{b:"Modalidades de caza",q:"¿Qué es el 'lanceo de jabalí a caballo' y qué característica lo hace especialmente singular?",o:{A:"Caza de jabalí desde vehículo con rifle de alta potencia.",B:"Modalidad tradicional en la que el jabalí se caza a caballo utilizando una lanza, sin armas de fuego.",C:"Captura de jabalí con lazo desde caballo.",D:"Caza de jabalí con perros de caza desde a caballo."},c:"B",e:"El lanceo de jabalí a caballo es una modalidad histórica española en la que el jinete persigue y da muerte al jabalí con una lanza, sin uso de armas de fuego, exigiendo gran habilidad ecuestre y cinegética."},
{b:"Modalidades de caza",q:"En la modalidad de caza 'en mano', ¿cuál es la disposición básica de los cazadores?",o:{A:"Los cazadores se sitúan en puestos fijos y esperan a que los ojeadores empujen la caza.",B:"Los cazadores avanzan en línea, separados entre sí, cazando el terreno en una misma dirección.",C:"Los cazadores rodean un área y esperan a que los perros concentren la caza en el centro.",D:"Un único cazador avanza por el terreno sin perros."},c:"B",e:"En la modalidad 'en mano', los cazadores forman una línea y avanzan coordinadamente en la misma dirección, con o sin perros, cazando las piezas que van levantando en su avance."},
{b:"Modalidades de caza",q:"¿Qué modalidad se utiliza exclusivamente para la caza de la liebre con galgos?",o:{A:"La carrera o coursing.",B:"La persecución con galgos.",C:"El galguismo al salto.",D:"La caza a rabo."},c:"B",e:"La persecución con galgos es la modalidad exclusiva para liebres en la que el galgo captura la pieza por velocidad pura, sin que los cazadores utilicen armas de fuego."},
{b:"Modalidades de caza",q:"¿Qué es el 'zapeo o gancho de conejos' como modalidad de caza?",o:{A:"Caza de conejos con lazos y trampas autorizadas.",B:"Modalidad de caza menor exclusiva para conejo, consistente en batir el terreno con batidores para que los conejos pasen por una línea de cazadores apostados.",C:"Caza de conejo al salto con perro de muestra.",D:"Captura de conejos en vivares con hurones."},c:"B",e:"El zapeo o gancho de conejos es una modalidad exclusiva para conejo en la que los batidores, con o sin perros, empujan los conejos hacia una línea de cazadores en puestos fijos."},
{b:"Modalidades de caza",q:"¿Qué aspecto de seguridad es especialmente crítico en la modalidad de rececho?",o:{A:"El uso de chalecos reflectantes por todos los participantes.",B:"Identificar perfectamente la especie, sexo y edad del animal antes de disparar, y conocer el trayecto de la bala más allá del objetivo.",C:"Mantener siempre el arma cargada para reaccionar rápidamente.",D:"Disparar únicamente en los primeros rayos de luz del amanecer."},c:"B",e:"En el rececho, la identificación precisa de la pieza y el control del trayecto de la bala son críticos: al disparar a largas distancias en terreno abierto, una bala perdida puede recorrer más de un kilómetro con efecto letal."},
{b:"Modalidades de caza",q:"¿Cuál es el papel del 'capitán de montería' durante una cacería?",o:{A:"Es el cazador que abate más piezas.",B:"Es la máxima autoridad organizativa: decide el inicio y final de la montería, coordina a los participantes y resuelve incidencias.",C:"Es el encargado de transportar las piezas cobradas.",D:"Es el responsable del control veterinario de las piezas."},c:"B",e:"El capitán de montería es la figura de máxima autoridad durante la cacería: decide cuándo comienza y termina la montería, coordina postos y rehaleros, y resuelve cualquier conflicto o incidencia."},
{b:"Modalidades de caza",q:"¿Qué es la 'Junta de Carnes' al finalizar una montería?",o:{A:"La reunión donde se decide el menú del almuerzo de los participantes.",B:"El momento en que se distribuyen las piezas abatidas, se asignan trofeos a cazadores y se resuelven disputas sobre la propiedad de las piezas.",C:"La inspección veterinaria obligatoria de todas las piezas.",D:"El recuento oficial de las capturas para la administración."},c:"B",e:"La Junta de Carnes es la reunión al final de la montería donde se adjudican los trofeos a sus cazadores, se resuelven disputas sobre piezas reclamadas por varios puestos y se asigna la carne según los acuerdos previos."},
{b:"Modalidades de caza",q:"¿Qué se entiende por 'caza selectiva' en el contexto de la gestión cinegética?",o:{A:"Caza que selecciona únicamente los animales con mejores trofeos.",B:"Caza que selecciona individuos concretos por sexo, edad o estado sanitario para mantener la salud genética y el equilibrio de la población.",C:"Caza realizada únicamente por gestores y técnicos autorizados.",D:"Caza de especies invasoras exclusivamente."},c:"B",e:"La caza selectiva no es una modalidad específica sino un principio que consiste en abatir individuos concretos (enfermos, viejos, depauperados, con exceso de un sexo) para mantener la salud genética y el equilibrio poblacional."},
{b:"Modalidades de caza",q:"¿Qué distancia mínima de peso de arqueo se exige para la caza mayor con arco en España?",o:{A:"30 libras.",B:"45 libras (20,25 kg) medidas a la apertura del arquero.",C:"60 libras.",D:"No existe requisito de peso mínimo para caza mayor con arco."},c:"B",e:"Para la caza mayor con arco se exigen mínimo 45 libras (20,25 kg) medidas a la apertura del arquero, además de estar prohibidas las puntas de diseño en arpón que impidan su extracción."},

// ══ BLOQUE 4: BIOLOGÍA DE ESPECIES (Q39-Q55) ══
{b:"Biología de especies",q:"¿Cuántas puntas tiene normalmente la cuerna de un corzo adulto bien conformado?",o:{A:"Dos puntas por cuerna (cuatro en total).",B:"Tres puntas por cuerna (seis en total): guía, luchadera y garceta.",C:"Una sola punta por cuerna.",D:"El corzo no tiene cuerna, solo pequeñas protuberancias óseas."},c:"B",e:"La cuerna del corzo adulto bien conformado tiene tres puntas por cuerna: la guía principal con su roseta, la luchadera (punta anterior en el primer tercio) y la garceta (punta posterior en el último tercio)."},
{b:"Biología de especies",q:"¿Qué característica reproductiva única presenta el corzo entre los ungulados europeos?",o:{A:"El corzo tiene el período de gestación más largo de todos los cérvidos europeos.",B:"El corzo presenta implantación diferida: la fecundación ocurre en julio-agosto pero el embrión no se implanta hasta enero, pariendo en mayo.",C:"Las hembras de corzo pueden tener hasta cuatro crías por parto.",D:"Los machos de corzo son los únicos cérvidos que mantienen su cuerna todo el año."},c:"B",e:"El corzo es uno de los pocos ungulados con implantación diferida (diapausa embrionaria): tras el celo en julio-agosto, el embrión no se implanta hasta enero, y los partos ocurren en mayo, con una o dos crías."},
{b:"Biología de especies",q:"¿Qué nombre recibe el período de celo del ciervo y en qué época del año se produce?",o:{A:"Ronca, de julio a agosto.",B:"Berrea o brama, de septiembre a octubre.",C:"Ladra, de noviembre a diciembre.",D:"Chilla, de enero a febrero."},c:"B",e:"La berrea o brama del ciervo se produce entre septiembre y octubre, siendo el celo del ciervo caracterizado por los potentes mugidos de los machos para atraer hembras y advertir a sus rivales."},
{b:"Biología de especies",q:"¿Qué es el 'desmogue' en los cérvidos y cuándo ocurre en el ciervo?",o:{A:"El crecimiento de la cuerna en verano.",B:"La pérdida anual de la cuerna; en el ciervo ocurre hacia el mes de marzo.",C:"El período de celo de los cérvidos.",D:"La época de parto de las hembras de ciervo."},c:"B",e:"El desmogue es la pérdida anual y natural de la cuerna en los cérvidos. En el ciervo ocurre en torno a marzo, comenzando inmediatamente el crecimiento de la nueva cuerna cubierta de 'terciopelo' o 'borra'."},
{b:"Biología de especies",q:"¿Qué denominación recibe un ciervo joven de uno o dos años con dos únicos vástagos rectos en su cuerna?",o:{A:"Horquillero.",B:"Vareto o estaquero.",C:"Rayón.",D:"Cervatillo."},c:"B",e:"El vareto o estaquero es el nombre que recibe el ciervo joven de uno o dos años cuya cuerna presenta solo dos vástagos rectos sin ramificaciones, como dos estacas."},
{b:"Biología de especies",q:"¿Cuál es el peso aproximado de un jabalí adulto macho en España?",o:{A:"20-40 kg.",B:"50-100 kg, pudiendo superar los 150 kg en ejemplares excepcionales.",C:"150-200 kg de media.",D:"10-20 kg."},c:"B",e:"El jabalí adulto macho pesa habitualmente entre 50-100 kg, aunque en condiciones óptimas pueden superar los 150 kg. Las hembras son notablemente más pequeñas."},
{b:"Biología de especies",q:"¿Cómo se llaman las crías del jabalí y por qué reciben ese nombre?",o:{A:"Cervatillos, por su parecido con los de ciervo.",B:"Rayones, por las rayas amarillas y negras características de su pelaje hasta los seis meses.",C:"Guarros, nombre popular sin referencia morfológica.",D:"Jabatos, por ser la denominación genérica de todos los jabalíes jóvenes."},c:"B",e:"Las crías del jabalí se llaman rayones hasta los seis meses de edad, nombre que proviene de su característico pelaje con rayas longitudinales amarillas y negras que les sirve de camuflaje."},
{b:"Biología de especies",q:"¿Qué denominación recibe el gamo adulto macho y cuál es la característica principal de su cuerna?",o:{A:"Se llama 'paleto' y su cuerna es simple, sin ramificaciones.",B:"Se llama 'paleto' y su cuerna es palmada (en forma de pala) en la parte superior, con puntas laterales.",C:"Se llama 'macho montero' y su cuerna es similar a la del ciervo.",D:"Se llama 'gamo real' y su cuerna es de tipo roseta como el corzo."},c:"B",e:"El gamo adulto macho se conoce popularmente como 'paleto' y su cuerna es característica por ser palmada o apalada en su parte superior, terminando en una zona aplastada en forma de pala con puntas laterales denominadas espaldas."},
{b:"Biología de especies",q:"¿Cuál es el origen geográfico del gamo (Dama dama) en la Península Ibérica?",o:{A:"Es una especie autóctona de la Península Ibérica.",B:"Es originario de Irán y Asia Menor, introducido en la Península en época romana o medieval.",C:"Procede de África subsahariana.",D:"Es originario de Escandinavia."},c:"B",e:"El gamo es originario de Irán y Asia Menor, siendo una especie naturalizada en Europa desde la Antigüedad (época romana o medieval), aunque actualmente se considera naturalizada en España."},
{b:"Biología de especies",q:"¿Qué período de celo tiene la perdiz roja y cómo afecta a su gestión cinegética?",o:{A:"El celo es en otoño, por lo que la veda se establece en septiembre.",B:"El celo es en primavera (marzo-junio), lo que determina que la veda se establezca en esa época para no interferir con la reproducción.",C:"La perdiz roja no tiene período de celo definido.",D:"El celo es en invierno, lo que permite cazar todo el otoño sin restricciones."},c:"B",e:"La perdiz roja tiene su período reproductor en primavera (de marzo a junio), lo que determina que la veda se establezca durante esos meses para garantizar la reproducción y el reclutamiento de nuevos individuos."},
{b:"Biología de especies",q:"¿Cuántos huevos pone habitualmente una perdiz roja en una nidada y quién incuba?",o:{A:"3-5 huevos, incubados exclusivamente por la hembra.",B:"10-16 huevos por término medio; en algunos casos ambos sexos pueden incubar nidadas separadas.",C:"1-2 huevos, como las grandes rapaces.",D:"20-25 huevos, incubados exclusivamente por el macho."},c:"B",e:"La perdiz roja pone habitualmente entre 10-16 huevos. En un fenómeno único entre las aves españolas, en ocasiones la hembra puede poner dos nidadas: una que incuba el macho y otra ella misma."},
{b:"Biología de especies",q:"¿Qué especie de córvido es considerada la más inteligente y con mayor capacidad de adaptación en el ámbito cinegético?",o:{A:"La grajilla (Corvus monedula).",B:"La urraca (Pica pica).",C:"La corneja negra (Corvus corone).",D:"El cuervo (Corvus corax)."},c:"B",e:"La urraca (Pica pica) destaca entre los córvidos por su extraordinaria inteligencia, capacidad de adaptación a entornos humanos y reconocimiento de su propia imagen en el espejo, siendo también la principal especie objetivo del control de predadores cinegéticos."},
{b:"Biología de especies",q:"¿Cuál es el principal impacto ecológico del zorro sobre las poblaciones de caza menor?",o:{A:"El zorro no tiene impacto significativo sobre la caza menor.",B:"Depredación directa sobre conejos, liebres y perdices, especialmente durante la época de nidificación y cría.",C:"El zorro solo impacta sobre ungulados jóvenes.",D:"Su impacto se limita a la competencia por el alimento vegetal con el conejo."},c:"B",e:"El zorro ejerce una presión depredadora significativa sobre conejos, liebres y perdices, siendo especialmente crítico durante la primavera cuando preda sobre nidos, pollos y gazapos, lo que justifica su control como predador en muchos cotos."},
{b:"Biología de especies",q:"¿Qué es la 'cecotrofia' en lagomorfos (conejos y liebres) y cuál es su función?",o:{A:"La marcación territorial mediante orina y heces.",B:"La ingestión de sus propias heces blandas (cecótrofos) para extraer nutrientes adicionales en una segunda digestión.",C:"El comportamiento de reunirse en grupos para dormir.",D:"La comunicación mediante golpes de pata en el suelo."},c:"B",e:"La cecotrofia es el proceso por el cual conejos y liebres ingieren sus propias heces blandas (cecótrofos) directamente del ano, permitiendo una segunda digestión que extrae los nutrientes que no se absorbieron en el primer paso, especialmente proteínas y vitaminas B."},
{b:"Biología de especies",q:"¿Qué diferencia morfológica principal permite distinguir en el campo a un conejo de una liebre?",o:{A:"El color del pelaje: el conejo siempre es gris y la liebre marrón.",B:"Las orejas: la liebre tiene orejas notablemente más largas con puntas negras; el conejo tiene orejas más cortas y redondeadas.",C:"El tamaño de los dientes: la liebre tiene caninos visibles.",D:"Las patas: el conejo tiene las patas traseras más largas que la liebre."},c:"B",e:"La principal diferencia morfológica en campo es la longitud y forma de las orejas: la liebre tiene orejas muy largas (más largas que la cabeza) con puntas negras características, mientras el conejo tiene orejas más cortas y redondeadas."},
{b:"Biología de especies",q:"¿Cuál es la característica del escudo anal del corzo y cómo varía según el sexo y la estación?",o:{A:"El escudo anal del corzo es siempre negro y circular en ambos sexos.",B:"El escudo anal es de forma de corazón invertido, blanco en invierno en ambos sexos; en verano más amarillento, y en la hembra adquiere forma de corazón con una prolongación inferior.",C:"Solo la hembra tiene escudo anal; el macho no lo presenta.",D:"El escudo anal del corzo es de color rojo intenso en todos los casos."},c:"B",e:"El escudo anal del corzo es en forma de corazón invertido y color blanco en invierno. En verano se vuelve más amarillento. En la hembra, durante el verano, adquiere una forma de corazón con una prolongación inferior que la diferencia del macho."},

// ══ BLOQUE 5: GESTIÓN DE POBLACIONES Y CENSOS (Q56-Q68) ══
{b:"Gestión de poblaciones",q:"¿Qué es la 'capacidad de carga' (K) de un territorio en relación con las especies cinegéticas?",o:{A:"El peso máximo de animales que puede transportar un vehículo de caza.",B:"El número máximo de individuos de una especie que el hábitat puede sostener de forma estable sin degradarse.",C:"La cantidad máxima de piezas que puede cobrar un cazador por jornada.",D:"La superficie mínima necesaria para que una especie esté presente en un territorio."},c:"B",e:"La capacidad de carga (K) es el número máximo de individuos de una especie que el hábitat puede sostener de manera estable y sostenible, determinado por la disponibilidad de alimento, agua, refugio y espacio."},
{b:"Gestión de poblaciones",q:"¿Qué método de censo utiliza cámaras fotográficas automáticas (fototrampeo) y cuál es su principal ventaja?",o:{A:"El fototrampeo es un método de censo directo que permite identificar individuos mediante marcas naturales (manchas, cicatrices) y estimar poblaciones sin disturbarlas.",B:"El fototrampeo solo sirve para detectar la presencia o ausencia de especies.",C:"El fototrampeo requiere el manejo físico de los animales para su identificación.",D:"El fototrampeo solo puede usarse en horas nocturnas."},c:"A",e:"El fototrampeo permite detectar y fotografiar animales sin molestarlos, identificar individuos mediante marcas naturales únicas (manchas de pelaje, cicatrices, morfología de cuernas) y estimar densidades mediante modelos estadísticos."},
{b:"Gestión de poblaciones",q:"¿Qué es el método de 'captura-marcaje-recaptura' (CMR) y para qué se usa en censos de fauna?",o:{A:"Un método de control letal de poblaciones animales.",B:"Un método estadístico que estima el tamaño de una población marcando individuos, liberándolos y analizando la proporción de marcados en capturas posteriores.",C:"Un sistema de seguimiento de animales migratorios mediante satélite.",D:"Un método exclusivo para censos de aves anilladas."},c:"B",e:"El método CMR consiste en capturar y marcar una muestra de individuos, liberarlos y, en una segunda captura, calcular qué proporción de capturados están marcados. Esta proporción permite estimar el tamaño total de la población."},
{b:"Gestión de poblaciones",q:"¿Qué indica un ratio sexual (sex-ratio) muy desequilibrado hacia las hembras en una población de ungulados?",o:{A:"La población está en excelente estado de conservación.",B:"Puede indicar una presión cinegética excesiva sobre machos, que puede reducir la tasa de fecundación y la diversidad genética.",C:"Es un fenómeno natural sin implicaciones para la gestión.",D:"Indica que la población está en declive por causas distintas a la caza."},c:"B",e:"Un ratio sexual muy sesgado hacia las hembras suele indicar sobreexplotación cinegética de machos. Esto reduce la eficacia reproductiva y la diversidad genética, requiriendo ajustes en las cuotas de caza para reequilibrar la proporción."},
{b:"Gestión de poblaciones",q:"¿Qué es un 'punto de agua' en la gestión cinegética y qué función tiene?",o:{A:"Un punto de control donde se pesan las piezas abatidas.",B:"Una instalación de abastecimiento de agua para fauna silvestre, especialmente útil en verano y para monitorear la presencia de especies.",C:"Un sistema de riego para mejorar la vegetación del coto.",D:"El lugar donde los cazadores pueden abastecerse de agua durante la jornada."},c:"B",e:"Los puntos de agua son instalaciones artificiales (bebederos, charcas) que garantizan el suministro hídrico a la fauna silvestre, especialmente en períodos secos. También funcionan como puntos de atracción para monitorear especies mediante fototrampeo."},
{b:"Gestión de poblaciones",q:"En el cálculo de la tasa de reclutamiento de una población de perdiz roja, ¿qué variable es más importante?",o:{A:"El número total de perdices adultas presentes en otoño.",B:"La proporción de jóvenes del año respecto a adultos en los censos post-reproductivos de verano.",C:"El número de huevos puestos por cada hembra.",D:"La densidad de predadores en el coto."},c:"B",e:"La tasa de reclutamiento se mide a través de la proporción juvenil:adulto en los censos post-reproductivos de verano (ratio pollitos/adultos). Un ratio alto indica buena reproducción y alta tasa de incorporación de nuevos individuos."},
{b:"Gestión de poblaciones",q:"¿Qué es la 'tasa de cosecha sostenible' y cómo se calcula teóricamente?",o:{A:"Es el 100% de los individuos excedentarios.",B:"Es el porcentaje de la población que puede extraerse anualmente sin reducir el tamaño poblacional, equivalente al incremento neto (natalidad menos mortalidad natural).",C:"Es siempre el 30% de la población total.",D:"Es la suma de todas las capturas del año anterior."},c:"B",e:"La tasa de cosecha sostenible equivale al incremento neto poblacional anual (natalidad menos mortalidad natural). Extraer más que ese excedente reduce la población; extraer menos permite su crecimiento."},
{b:"Gestión de poblaciones",q:"¿Qué problema de gestión representa la 'fragmentación del hábitat' para las poblaciones cinegéticas?",o:{A:"Aumenta la densidad de animales al concentrarlos en parches pequeños.",B:"Aísla subpoblaciones, impide el flujo genético, aumenta la endogamia y reduce la viabilidad a largo plazo.",C:"Facilita los censos al concentrar los animales en áreas más pequeñas.",D:"No tiene efectos negativos para las especies de caza."},c:"B",e:"La fragmentación del hábitat aísla subpoblaciones en parches, impidiendo el intercambio genético. Esto aumenta la endogamia, reduce la resistencia a enfermedades y la capacidad adaptativa, comprometiendo la viabilidad a largo plazo."},
{b:"Gestión de poblaciones",q:"¿Qué información proporciona el análisis de las 'mandíbulas' (dientes) de ungulados abatidos?",o:{A:"El sexo del animal.",B:"La edad del animal, mediante el desgaste y erupción dental, lo que permite evaluar la estructura de edades de la población.",C:"El estado nutricional del animal.",D:"La presencia de enfermedades infecciosas."},c:"B",e:"El análisis del desgaste y la erupción de los dientes (mandíbulas) es el método más preciso para estimar la edad de ungulados abatidos. Esta información permite evaluar la estructura de edades de la población y la calidad de la gestión."},
{b:"Gestión de poblaciones",q:"¿Qué ventaja tiene el método de los 'itinerarios de censo' frente al recuento total?",o:{A:"El recuento total siempre es más preciso que los itinerarios.",B:"Los itinerarios permiten cubrir grandes superficies con menos esfuerzo, estandarizando el muestreo para comparaciones entre años y zonas.",C:"Los itinerarios de censo no requieren personal especializado.",D:"Los itinerarios solo funcionan para aves, no para mamíferos."},c:"B",e:"Los itinerarios de censo permiten estimar abundancias relativas en grandes superficies con menor esfuerzo que el recuento total, y al estandarizar el muestreo (mismo recorrido, misma época, mismas condiciones) facilitan las comparaciones temporales y espaciales."},
{b:"Gestión de poblaciones",q:"¿Qué es la 'dinámica de metapoblaciones' y cuándo es relevante en gestión cinegética?",o:{A:"El comportamiento de una única población grande y homogénea.",B:"El conjunto de subpoblaciones locales interconectadas por dispersión, donde la extinción local puede ser compensada por recolonización desde otras subpoblaciones.",C:"La dinámica estacional de migración de las especies.",D:"El movimiento de animales entre cotos de caza colindantes."},c:"B",e:"La metapoblación es un conjunto de subpoblaciones locales conectadas por dispersión de individuos. En gestión cinegética es relevante cuando las poblaciones están fragmentadas: perder una subpoblación puede repercutir en las demás si los corredores de dispersión se interrumpen."},
{b:"Gestión de poblaciones",q:"Un gestor detecta que en su coto la proporción de perdices adultas en otoño es de 2 adultos por cada 3 jóvenes. ¿Cómo interpreta este dato?",o:{A:"La reproducción ha fracasado completamente ese año.",B:"La reproducción ha sido buena: hay más jóvenes que adultos, indicando un reclutamiento superior al necesario para mantener la población.",C:"La caza ha sido excesiva ese año.",D:"La densidad de predadores ha aumentado significativamente."},c:"B",e:"Una proporción de 3 jóvenes por cada 2 adultos indica una buena reproducción y reclutamiento: hay suficientes jóvenes para compensar la mortalidad natural y la extracción cinegética, manteniendo o incrementando la población."},
{b:"Gestión de poblaciones",q:"¿Qué es un 'corredor ecológico' y qué papel juega en la gestión cinegética?",o:{A:"Una ruta de acceso para los vehículos de gestión del coto.",B:"Una franja de hábitat que conecta poblaciones aisladas, facilitando el movimiento de animales, el flujo genético y la recolonización de zonas vacías.",C:"El itinerario establecido para los censos de vertebrados.",D:"La zona de paso obligatorio para los cazadores en una batida."},c:"B",e:"Los corredores ecológicos son franjas de hábitat que conectan poblaciones fragmentadas, permitiendo el desplazamiento de animales, el intercambio genético y la recolonización de áreas que han perdido individuos, siendo fundamentales para la sostenibilidad cinegética."},

// ══ BLOQUE 6: SANIDAD CINEGÉTICA (Q69-Q80) ══
{b:"Sanidad cinegética",q:"¿Qué es la mixomatosis y cuál es su principal vía de transmisión en el conejo silvestre?",o:{A:"Enfermedad bacteriana transmitida por contacto directo entre conejos.",B:"Enfermedad vírica (Myxoma virus) transmitida principalmente por artrópodos hematófagos (pulgas, mosquitos, garrapatas) y por contacto directo.",C:"Enfermedad fúngica transmitida por inhalación de esporas del suelo.",D:"Enfermedad parasitaria transmitida por el agua contaminada."},c:"B",e:"La mixomatosis es causada por el Myxoma virus y se transmite principalmente por artrópodos hematófagos (pulgas y mosquitos). También puede contagiarse por contacto directo entre conejos. Produce tumores cutáneos, conjuntivitis y muerte."},
{b:"Sanidad cinegética",q:"¿Qué efecto ha tenido la aparición de nuevas variantes del virus de la EHV (RHDV2) sobre la gestión cinegética?",o:{A:"El RHDV2 solo afecta a conejos domésticos, sin impacto en silvestres.",B:"El RHDV2 afecta a conejos silvestres y además a liebres, siendo más virulento en algunas variantes y complicando las estrategias de vacunación.",C:"El RHDV2 ha reducido la mortalidad respecto al RHDV clásico.",D:"El RHDV2 se puede controlar eficazmente con antibióticos."},c:"B",e:"El RHDV2 (variante 2 de la enfermedad hemorrágica) es más complejo que el RHDV clásico: afecta a conejos de todas las edades (incluidos los menores de 4 semanas, antes resistentes), a liebres norteñas y complica las estrategias de vacunación por su variabilidad."},
{b:"Sanidad cinegética",q:"¿Qué es la 'brucelosis' en jabalí y cuál es su relevancia para la salud pública?",o:{A:"Una enfermedad parasitaria exclusiva del jabalí sin transmisión al hombre.",B:"Una enfermedad bacteriana (Brucella suis) que puede transmitirse al hombre por contacto con fluidos de animales infectados, causando fiebre ondulante.",C:"Una enfermedad fúngica que afecta a la cuerna del jabalí.",D:"Una infección viral similar a la gripe porcina sin riesgo para humanos."},c:"B",e:"La brucelosis en jabalí (Brucella suis) es una zoonosis relevante: puede transmitirse al hombre durante el manejo de órganos reproductores o fluidos de animales infectados, causando fiebre ondulante (Malta). Se recomienda el uso de guantes y el descarte de órganos reproductores afectados."},
{b:"Sanidad cinegética",q:"¿Qué síntomas externos son característicos de la sarna sarcóptica avanzada en cabra montés?",o:{A:"Fiebre alta y aparente desorientación.",B:"Alopecia (pérdida de pelo) generalizada, engrosamiento e hiperqueratosis de la piel, costras y grietas, y el animal se rasca frecuentemente.",C:"Parálisis de los miembros posteriores.",D:"Presencia de grandes tumores subcutáneos."},c:"B",e:"La sarna sarcóptica avanzada en cabra montés se manifiesta con alopecia progresiva, engrosamiento e hiperqueratosis de la piel (aspecto acartonado grisáceo), costras y grietas, y prurito intenso que lleva al animal a rascarse continuamente."},
{b:"Sanidad cinegética",q:"¿Qué protocolo debe seguirse ante el avistamiento de una cabra montés sospechosa de sarna sarcóptica en la Comunitat Valenciana?",o:{A:"Abatirla inmediatamente para evitar contagios.",B:"Notificar al titular del coto y al Jefe de Comarca correspondiente, quien aplicará el protocolo establecido.",C:"Fotografiarla y publicarla en redes sociales para alertar a otros cazadores.",D:"Ignorarla si no presenta síntomas graves visibles."},c:"B",e:"El protocolo valenciano establece que ante un avistamiento de cabra montés sospechosa de sarna, debe notificarse al titular del coto y al Jefe de Comarca (o Agente Medioambiental de servicio), quien decide las actuaciones a seguir."},
{b:"Sanidad cinegética",q:"¿Qué enfermedad afecta principalmente a los ungulados y está causada por bacterias del género Brucella abortus?",o:{A:"La sarna sarcóptica.",B:"La brucelosis bovina, que puede afectar también a ciervos y gamos en contacto con ganado infectado.",C:"La tuberculosis bovina.",D:"La fiebre aftosa."},c:"B",e:"La brucelosis bovina (Brucella abortus) puede afectar a cérvidos silvestres en contacto con ganado doméstico infectado. Causa abortos en hembras y orquitis en machos, siendo también una zoonosis transmisible al hombre."},
{b:"Sanidad cinegética",q:"¿Qué es la 'tuberculosis bovina' en fauna silvestre y qué especie actúa como reservorio principal en España?",o:{A:"El corzo actúa como principal reservorio de tuberculosis bovina en España.",B:"El jabalí y el ciervo actúan como principales reservorios de Mycobacterium bovis en España, pudiendo transmitirla al ganado doméstico.",C:"La tuberculosis bovina no afecta a la fauna silvestre española.",D:"La becada es el principal reservorio de tuberculosis en fauna silvestre."},c:"B",e:"El jabalí y el ciervo son los principales reservorios de Mycobacterium bovis (tuberculosis bovina) en España, especialmente en el suroeste peninsular. Pueden transmitirla al ganado bovino y caprino con los que comparten pastos y recursos."},
{b:"Sanidad cinegética",q:"¿Qué medidas de higiene básica debe adoptar un cazador al manipular vísceras de piezas abatidas?",o:{A:"No es necesaria ninguna precaución especial.",B:"Usar guantes desechables, no tocar mucosas con manos contaminadas, lavarse con agua y jabón y no consumir las vísceras crudas.",C:"Solo es necesario lavarse las manos con agua fría.",D:"Usar traje de protección completo en todos los casos."},c:"B",e:"Al manipular vísceras deben usarse guantes desechables, evitar tocarse ojos y boca, lavarse manos con agua y jabón, y no consumir vísceras crudas. Estas medidas previenen zoonosis como tularemia, brucelosis o hepatitis E."},
{b:"Sanidad cinegética",q:"¿Qué parásito interno del jabalí puede transmitirse al hombre a través del consumo de carne poco cocinada?",o:{A:"Fasciola hepatica.",B:"Trichinella spiralis u otras especies del género Trichinella.",C:"Echinococcus granulosus.",D:"Toxoplasma gondii exclusivamente."},c:"B",e:"Trichinella (principalmente T. spiralis) es el parásito más relevante del jabalí para la salud pública. Sus larvas enquistadas en el músculo se transmiten al hombre por consumo de carne poco cocinada, causando triquinelosis con síntomas graves."},
{b:"Sanidad cinegética",q:"¿Qué es la 'hepatitis E' en el contexto de la salud cinegética y cómo se previene?",o:{A:"Una enfermedad exclusiva de las aves cinegéticas sin riesgo para humanos.",B:"Una enfermedad vírica zoonótica asociada al consumo de carne de jabalí poco cocinada o por contacto con sus fluidos, prevenible mediante cocción adecuada.",C:"Una enfermedad hepática exclusiva del corzo.",D:"Una enfermedad no relacionada con la caza."},c:"B",e:"El virus de la hepatitis E genotipo 3 circula ampliamente en jabalíes europeos. Puede transmitirse al hombre por consumo de carne poco cocinada o por contacto con fluidos. La cocción completa de la carne (>70°C en el centro) previene la transmisión."},
{b:"Sanidad cinegética",q:"¿Qué acción debe evitar un cazador al encontrar un animal muerto para no alterar la investigación epidemiológica?",o:{A:"Fotografiarlo.",B:"Moverlo, tocarlo sin protección o enterrarlo, ya que esto destruye evidencias y puede difundir el agente patógeno.",C:"Comunicarlo a las autoridades.",D:"Señalizar el lugar con algún elemento visible."},c:"B",e:"Mover, tocar sin protección o enterrar un animal muerto hallado en el campo puede destruir evidencias necesarias para la investigación epidemiológica y propagar el agente patógeno. Lo correcto es no tocarlo y comunicarlo a las autoridades."},

// ══ BLOQUE 7: SEGURIDAD Y PRIMEROS AUXILIOS (Q81-Q90) ══
{b:"Seguridad y primeros auxilios",q:"¿Qué norma de seguridad básica prohíbe disparar en la modalidad de caza en mano cuando otro cazador está en la línea de tiro?",o:{A:"Se puede disparar siempre que el otro cazador esté a más de 50 metros.",B:"Nunca se debe disparar cuando la línea de tiro cruza la posición de otro cazador o cuando hay riesgo de alcanzarle por rebote.",C:"Solo está prohibido disparar directamente hacia otro cazador.",D:"Esta restricción solo aplica en la caza mayor, no en la menor."},c:"B",e:"Nunca debe dispararse cuando la trayectoria del disparo o de los proyectiles secundarios (rebotes, perdigones) pueda alcanzar a otro cazador. En la caza en mano, mantener la alineación de la línea y respetar el ángulo de tiro seguro es fundamental."},
{b:"Seguridad y primeros auxilios",q:"¿Qué precaución es esencial al cruzar un obstáculo (valla, zanja, muro) con el arma?",o:{A:"Cruzar con el arma cargada y el seguro puesto para reaccionar rápidamente.",B:"Descargar el arma siempre antes de cruzar cualquier obstáculo.",C:"Pasar el arma al acompañante mientras se cruza.",D:"Cruzar con el cañón apuntando hacia el suelo."},c:"B",e:"Al cruzar cualquier obstáculo (valla, zanja, riachuelo) es obligatorio descargar el arma previamente. Es uno de los momentos de mayor riesgo de accidente por caída accidental o disparo involuntario."},
{b:"Seguridad y primeros auxilios",q:"¿Qué actuación inmediata requiere una herida por arma de fuego con hemorragia abundante en una extremidad?",o:{A:"Aplicar agua fría sobre la herida y esperar la llegada de los servicios de emergencia.",B:"Aplicar presión directa sobre la herida con el material disponible y, si la hemorragia no cede, aplicar un torniquete proximal a la lesión.",C:"Elevar la extremidad sin aplicar presión.",D:"Limpiar la herida con agua y antiséptico antes de cualquier otra actuación."},c:"B",e:"Ante hemorragia abundante en una extremidad, la prioridad es aplicar presión directa firme sobre la herida. Si no cede, aplicar torniquete proximal (entre la herida y el corazón) para controlar la hemorragia, que puede ser mortal en minutos."},
{b:"Seguridad y primeros auxilios",q:"¿Qué es el 'shock hemorrágico' y cuáles son sus signos iniciales en el campo?",o:{A:"Una reacción alérgica grave a los anestésicos.",B:"Un estado de hipoperfusión tisular por pérdida de volumen sanguíneo, caracterizado inicialmente por palidez, sudoración fría, taquicardia, ansiedad y sed.",C:"Una conmoción cerebral producida por el impacto de la culata del arma.",D:"Un estado de hipotermia severa causado por inmersión en agua fría."},c:"B",e:"El shock hemorrágico se produce cuando la pérdida de sangre es suficiente para comprometer la perfusión de los órganos. Sus signos iniciales son palidez, piel fría y sudorosa, pulso rápido y débil, sed y ansiedad. Requiere evacuación urgente."},
{b:"Seguridad y primeros auxilios",q:"¿Qué característica hace especialmente peligrosas las heridas de bala de rifle en el campo respecto a las de perdigón?",o:{A:"Las heridas de perdigón son siempre más mortales que las de rifle.",B:"Un rifle puede ser mortal a más de un kilómetro si la bala no se 'entierra', mientras una escopeta tiene alcance mucho más reducido.",C:"Las heridas de rifle son siempre superficiales al ser proyectiles pequeños.",D:"El rifle no produce heridas internas significativas."},c:"B",e:"Una bala de rifle conserva energía letal a grandes distancias (más de 1 km si no se entierra en el terreno), mientras que los perdigones de escopeta pierden energía rápidamente. Esto hace que los accidentes de rifle sean potencialmente más graves y de mayor alcance."},
{b:"Seguridad y primeros auxilios",q:"¿Cuándo está indicado NO mover a un accidentado en el campo?",o:{A:"Nunca, siempre hay que mover al accidentado para alejarlo del peligro.",B:"Cuando se sospecha lesión de columna vertebral (traumatismo cervical o dorsal), a menos que exista peligro inmediato para su vida.",C:"Siempre que el accidentado esté consciente.",D:"Solo cuando el accidentado esté inconsciente."},c:"B",e:"No debe moverse a un accidentado con sospecha de lesión medular (caída, traumatismo fuerte en cuello o espalda) a menos que exista peligro vital inmediato (fuego, agua). La movilización incorrecta puede provocar lesión medular permanente."},
{b:"Seguridad y primeros auxilios",q:"¿Qué prendas de ropa se recomiendan para mejorar la visibilidad del cazador durante batidas y monterías?",o:{A:"Ropa de camuflaje completo para no asustar a las piezas.",B:"Prendas de colores llamativos fluorescentes (naranja o amarillo) en partes visibles como el chaleco y el gorro.",C:"Ropa completamente blanca.",D:"No se recomienda ningún color específico."},c:"B",e:"En batidas, monterías y otras modalidades con varios cazadores, se recomienda portar prendas fluorescentes (naranja o amarillo vivo) en chaleco y gorro para ser fácilmente identificables como personas y prevenir accidentes por confusión."},
{b:"Seguridad y primeros auxilios",q:"¿Qué complicación específica puede producir la retención de perdigones de plomo o níquel en tejidos oculares?",o:{A:"No existe ningún riesgo específico por perdigones retenidos.",B:"Metalosis progresiva: los perdigones de níquel o plomo se oxidan lentamente liberando metales tóxicos que causan inflamación y daño tisular progresivo.",C:"Los perdigones siempre se expulsan solos en pocos días.",D:"Solo producen riesgo de infección bacteriana."},c:"B",e:"Los perdigones de níquel o plomo retenidos en tejidos, especialmente oculares, producen metalosis: la oxidación lenta libera iones metálicos tóxicos que causan inflamación y daño tisular progresivo, por lo que deben extraerse quirúrgicamente."},
{b:"Seguridad y primeros auxilios",q:"¿Qué medidas de seguridad son específicas para la espera nocturna de jabalí?",o:{A:"No existen medidas específicas para la caza nocturna.",B:"Identificar perfectamente la pieza antes de disparar con ayuda de foco, nunca disparar sin identificar, comunicar la posición a otros cazadores y no abandonar el puesto sin avisar.",C:"Disparar hacia cualquier movimiento en la oscuridad.",D:"La espera nocturna no requiere medidas adicionales a la caza diurna."},c:"B",e:"En la espera nocturna, la identificación de la pieza con foco antes de disparar es obligatoria. Nunca se dispara sin identificar la especie. Además, deben comunicarse las posiciones entre cazadores y no abandonar el puesto sin avisar para evitar confusiones."},
{b:"Seguridad y primeros auxilios",q:"¿Cuál es la posición correcta para un accidentado inconsciente que respira en el campo, a la espera de evacuación?",o:{A:"Boca arriba con las piernas elevadas.",B:"Posición lateral de seguridad (PLS), tumbado de lado para prevenir la aspiración de vómito u otras secreciones.",C:"Sentado con la espalda apoyada en un árbol.",D:"Boca abajo con la cabeza girada a un lado."},c:"B",e:"Un accidentado inconsciente que respira debe colocarse en la Posición Lateral de Seguridad (PLS), tumbado de lado con la boca orientada hacia abajo, para evitar que vomite y aspire las secreciones, lo que podría causar asfixia."},

// ══ BLOQUE 8: PLANIFICACIÓN Y GESTIÓN (Q91-Q100) ══
{b:"Planificación y gestión",q:"¿Qué información mínima debe contener la Memoria Anual de Caza que el titular del coto presenta a la administración?",o:{A:"Solo el número total de piezas cobradas.",B:"Capturas por especie, sexo y edad, jornadas de caza realizadas, incidencias relevantes y estado de las instalaciones.",C:"Únicamente los datos económicos del coto.",D:"Solo la lista de cazadores que han participado durante la temporada."},c:"B",e:"La Memoria Anual debe incluir capturas detalladas por especie, sexo y edad, número de jornadas de caza, resumen de censos realizados, incidencias (enfermedades, daños, accidentes), estado de mejoras y comparativa con el Plan Anual de Aprovechamiento."},
{b:"Planificación y gestión",q:"¿Cuándo está justificado un programa de repoblación con conejo de monte?",o:{A:"Siempre que la densidad sea inferior a 5 conejos por hectárea.",B:"Solo cuando la baja densidad se debe a causas identificadas y corregidas (falta de refugio, enfermedad), y la repoblación se hace con animales silvestres o semisilvestres adaptados.",C:"Cuando la densidad de predadores es alta.",D:"Cuando el precio del conejo de granja es bajo."},c:"B",e:"La repoblación de conejo solo es eficaz si previamente se han identificado y corregido las causas del declive (hábitat, refugio, enfermedad) y se usan individuos silvestres o semisilvestres. Las repoblaciones sin mejora del hábitat tienen muy baja supervivencia."},
{b:"Planificación y gestión",q:"¿Qué son los 'cercones' en la gestión del conejo de monte y cuál es su función?",o:{A:"Trampas para la captura de conejos.",B:"Recintos de cría semi-extensiva de conejo silvestre para su posterior suelta, que permiten una mejor adaptación al medio natural.",C:"Vallados para proteger los vivares de los predadores.",D:"Comederos artificiales para conejos."},c:"B",e:"Los cercones son recintos semi-extensivos donde se crían conejos silvestres con mínima intervención humana, permitiendo que desarrollen comportamientos naturales (alimentación, refugio, huida) antes de ser soltados, lo que aumenta notablemente su supervivencia post-suelta."},
{b:"Planificación y gestión",q:"¿Qué criterio debe orientar la selección de individuos a abatir en la caza selectiva de ungulados?",o:{A:"Siempre los ejemplares con mejores trofeos para maximizar el valor económico.",B:"Preferentemente individuos viejos, enfermos o depauperados, y ajustar el ratio sexual según los objetivos del plan de gestión.",C:"Siempre los más jóvenes para cosechar los más recientes.",D:"Los más accesibles independientemente de su edad o condición."},c:"B",e:"La caza selectiva de ungulados debe priorizar individuos viejos, enfermos, con cuernas degeneradas o desequilibrios en el ratio sexual, siguiendo las cuotas por clase de edad y sexo establecidas en el plan técnico para mantener la estructura poblacional óptima."},
{b:"Planificación y gestión",q:"¿Qué es la 'gestión del hábitat' en el contexto de la gestión cinegética?",o:{A:"La gestión exclusiva de los predadores del coto.",B:"El conjunto de actuaciones (siembras, charcas, setos, entaramados, desbroces) que mejoran la disponibilidad de alimento, agua y refugio para las especies cinegéticas.",C:"La delimitación legal del perímetro del coto.",D:"La planificación de las jornadas de caza anuales."},c:"B",e:"La gestión del hábitat incluye todas las actuaciones que mejoran las condiciones del territorio para las especies cinegéticas: siembras de especies forrajeras, construcción de bebederos, creación de setos y linderos, entaramado de vivares de conejo, y control de la vegetación."},
{b:"Planificación y gestión",q:"¿Qué indicador de gestión cinegética refleja mejor la 'calidad' de un coto de caza mayor?",o:{A:"El número total de piezas abatidas cada temporada.",B:"La estructura de edades equilibrada, la proporción sexual adecuada y el incremento del peso y calidad de los trofeos a lo largo de los años.",C:"Los ingresos económicos generados por la venta de permisos.",D:"El número de socios del coto."},c:"B",e:"La calidad de gestión de un coto de caza mayor se mide por indicadores poblacionales: estructura de edades equilibrada (presencia de todos los grupos de edad), ratio sexual adecuado y mejora progresiva del peso y calidad de trofeos, que reflejan una población sana y bien gestionada."},
{b:"Planificación y gestión",q:"¿Qué función tienen los 'entaramados' en la gestión del hábitat para el conejo?",o:{A:"Son vallados que impiden la entrada de predadores al coto.",B:"Son estructuras de ramajes apilados que crean refugio artificial para el conejo, especialmente en zonas con escasez de vivares naturales.",C:"Son bebederos artificiales para el conejo.",D:"Son puntos de alimentación suplementaria."},c:"B",e:"Los entaramados son estructuras de leña apilada (brezo, jara, encina) que crean refugio artificial para el conejo en zonas con pocos vivares naturales. Se recomienda renovarlos al menos cada 2 años para mantener su efectividad."},
{b:"Planificación y gestión",q:"¿Qué organismo es responsable de la subasta del aprovechamiento cinegético de los terrenos del Estado en la Comunitat Valenciana?",o:{A:"La Diputación Provincial.",B:"La Generalitat Valenciana a través de la Conselleria competente en materia de caza.",C:"El Ministerio de Medio Ambiente.",D:"Los ayuntamientos de los municipios afectados."},c:"B",e:"La Generalitat Valenciana, a través de la Conselleria competente en medio ambiente, gestiona y en su caso subasta el aprovechamiento cinegético de los terrenos de titularidad pública autonómica, estableciendo las condiciones de los pliegos."},
{b:"Planificación y gestión",q:"¿Qué es un 'Plan de Ordenación Cinegética Comarcal' y cuándo se aplica?",o:{A:"Es el PTOC de un único coto de gran tamaño.",B:"Es un plan de gestión que abarca varios cotos de una comarca, buscando la coherencia en la gestión de las poblaciones a escala suprapredial.",C:"Es el plan nacional de caza aprobado por el Ministerio.",D:"Es el documento de señalización de los terrenos cinegéticos."},c:"B",e:"Los planes de ordenación comarcal coordinan la gestión cinegética de varios cotos dentro de una comarca, lo que es especialmente importante para especies con amplios territorios (ungulados, grandes carnívoros) cuyas poblaciones superan los límites de un solo coto."},
{b:"Planificación y gestión",q:"¿Qué papel juega la 'valoración económica de la caza' en la justificación de la actividad cinegética ante la sociedad?",o:{A:"La valoración económica no tiene relevancia para la justificación de la caza.",B:"Demuestra el importante impacto socioeconómico de la caza en zonas rurales (empleo, turismo cinegético, exportación de carne) y contribuye a justificar las inversiones en conservación y gestión.",C:"La caza no tiene impacto económico significativo en España.",D:"La valoración económica solo sirve para fijar el precio de los permisos."},c:"B",e:"La valoración económica de la caza en España muestra su relevante impacto: genera miles de millones de euros anuales, crea empleo directo e indirecto en zonas rurales, atrae turismo cinegético internacional y financia la conservación de hábitats y especies, justificando su gestión sostenible."}
];

  else if(st.screen==="quiz") renderQuiz();
  else renderResults();
  updateProg();
}

function updateProg(){
  const pw=$i("progWrap");
  if(st.screen==="quiz"){
    pw.style.display="flex";
    const done=Object.keys(st.ans).length;
    const pct=Math.round(done/Q.length*100);
    $i("progFill").style.width=pct+"%";
    $i("progLabel").textContent="P"+(st.cur+1)+" / "+Q.length;
    const correct=Object.values(st.ans).filter(a=>a.correct).length;
    $i("scoreBadge").textContent=correct+"/"+done;
  } else {pw.style.display="none";}
}

function renderStart(){
  app().innerHTML=`<div class="card start">
    <div style="font-size:40px;margin-bottom:12px">🦅</div>
    <h2>Test de Gestión Cinegética II</h2>
    <p>TS Gestión Forestal y del Medio Natural</p>
    <p style="margin-top:4px;font-size:.82rem;opacity:.7">100 preguntas · Nivel FP Grado Superior · Todas nuevas</p>
    <div class="tags">${BLOCKS.map(b=>`<span class="tag">${b}</span>`).join("")}</div>
    <button class="btn btn-p" style="font-size:.98rem;padding:13px 34px;border-radius:8px" onclick="startQuiz()">Comenzar el test →</button>
  </div>`;
}

function startQuiz(){st={screen:"quiz",cur:0,ans:{},filter:"Todos"};render();}

function renderQuiz(){
  const i=st.cur,q=Q[i],a=st.ans[i];
  const start=Math.max(0,i-4),end=Math.min(Q.length,start+10);
  let dots="";
  for(let d=start;d<end;d++){
    let cls="dot"+(d===i?" cur":"")+(st.ans[d]?(st.ans[d].correct?" ok":" no"):"");
    dots+=`<div class="${cls}" onclick="goTo(${d})">${d+1}</div>`;
  }
  let opts="";
  ["A","B","C","D"].forEach(l=>{
    let cls="option"+(a?" done":"");
    if(a){if(l===q.c)cls+=" correct";else if(l===a.chosen)cls+=" wrong";else cls+=" dim";}
    opts+=`<div class="${cls}" onclick="answer('${l}')"><div class="letter">${l}</div><div>${q.o[l]}</div></div>`;
  });
  const exp=a?`<div class="explanation show">💡 <b>Explicación:</b> ${q.e}</div>`:"";
  const last=i===Q.length-1;
  app().innerHTML=`<div class="card">
    <div class="block-tag">${q.b}</div>
    <div class="question">${q.q}</div>
    <div class="options">${opts}</div>${exp}
    <div class="nav">
      <button class="btn btn-s" onclick="prevQ()" ${i===0?"disabled":""}>← Anterior</button>
      <button class="btn btn-p" onclick="nextQ()" ${a?"":"disabled"}>${last?"Ver resultados →":"Siguiente →"}</button>
      <button class="btn btn-s" onclick="skipQ()" ${a?"style='display:none'":""}>Saltar</button>
    </div>
    <div class="dots">${dots}</div>
  </div>`;
}

function answer(l){const i=st.cur;if(st.ans[i])return;st.ans[i]={chosen:l,correct:l===Q[i].c};render();}
function nextQ(){if(st.cur>=Q.length-1){st.screen="results";render();}else{st.cur++;render();}}
function prevQ(){if(st.cur>0){st.cur--;render();}}
function goTo(i){st.cur=i;render();}
function skipQ(){if(!st.ans[st.cur])st.ans[st.cur]={chosen:null,correct:false};nextQ();}

function renderResults(){
  const total=Q.length,done=Object.keys(st.ans).length;
  const correct=Object.values(st.ans).filter(a=>a.correct).length;
  const wrong=done-correct,pct=Math.round(correct/total*100);
  let grade,gsub,gcol;
  if(pct>=90){grade="Excelente 🥇";gsub="Resultado sobresaliente";gcol=["#3a7a4a","#fff"];}
  else if(pct>=75){grade="Bien 🥈";gsub="Resultado satisfactorio";gcol=["#7a7a3a","#fff"];}
  else if(pct>=50){grade="Aprobado 🥉";gsub="Resultado suficiente";gcol=["#7a5c3a","#fff"];}
  else{grade="No superado ❌";gsub="Necesita repasar los contenidos";gcol=["#b84040","#fff"];}

  const f=st.filter;
  const filtered=Q.map((q,i)=>({q,i,a:st.ans[i]})).filter(({q,i,a})=>{
    if(!a)return false;
    if(f==="Errores")return !a.correct;
    if(f==="Aciertos")return a.correct;
    if(f!=="Todos")return q.b===f;
    return true;
  });

  const tabs=["Todos","Aciertos","Errores",...BLOCKS];
  const akHTML=filtered.length?filtered.map(({q,i,a})=>`
    <div class="ak-item ${a.correct?"ok":"no"}">
      <div class="ak-icon">${a.correct?"✅":"❌"}</div>
      <div class="ak-num">Q${i+1}</div>
      <div>
        <div style="font-weight:600;margin-bottom:4px;font-size:.83rem">${q.q.substring(0,85)}${q.q.length>85?"...":""}</div>
        ${a.correct
          ?`<div style="font-size:.78rem;color:#3a7a4a">✓ ${a.chosen}: ${q.o[a.chosen].substring(0,60)}</div>`
          :`<div style="font-size:.78rem;color:#b84040">Tu respuesta: ${a.chosen||"Saltada"}</div>
           <div style="font-size:.78rem;color:#3a7a4a">✓ Correcta: ${q.c} — ${q.o[q.c].substring(0,55)}</div>
           <div style="font-size:.76rem;color:#7a5c3a;font-style:italic;margin-top:3px">💡 ${q.e}</div>`}
      </div>
    </div>`).join("")
    :`<div style="text-align:center;color:#7a5c3a;padding:20px;font-size:.85rem">No hay elementos con este filtro.</div>`;

  app().innerHTML=`<div class="card">
    <div class="results">
      <div class="score-circle" style="background:${gcol[0]};color:${gcol[1]}">
        <div class="big">${correct}/${total}</div><div class="sub">${pct}%</div>
      </div>
      <div class="grade-text">${grade}</div>
      <div class="grade-sub">${gsub}</div>
      <div class="stats">
        <div class="stat"><div class="n" style="color:#3a7a4a">${correct}</div><div class="l">Correctas</div></div>
        <div class="stat"><div class="n" style="color:#b84040">${wrong}</div><div class="l">Errores</div></div>
        <div class="stat"><div class="n">${total-done}</div><div class="l">Saltadas</div></div>
        <div class="stat"><div class="n">${pct}%</div><div class="l">Nota</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-p" onclick="startQuiz()">🔄 Repetir test</button>
        <button class="btn btn-s" onclick="reviewWrong()">Repasar errores</button>
      </div>
    </div>
    <div class="ak-title">📋 Revisión de respuestas</div>
    <div class="filters">${tabs.map(t=>`<button class="ftab${st.filter===t?" on":""}" onclick="setFilter('${t}')">${t}</button>`).join("")}</div>
    ${akHTML}
  </div>`;
}

function setFilter(f){st.filter=f;renderResults();}
function reviewWrong(){
  const w=Object.keys(st.ans).filter(i=>!st.ans[i].correct).map(Number);
  if(!w.length){alert("¡No tienes errores! 🎉");return;}
  st.cur=w[0];st.screen="quiz";render();
}
render();
</script>
</body>
</html>
