<!DOCTYPE html>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#1a1208;--bark:#3d2b1a;--earth:#7a5c3a;--moss:#4a6741;--sage:#7a9e6e;--cream:#f5eed8;--parchment:#ede3c8;--red:#b84040;--green:#3a7a4a;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(74,103,65,0.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(122,92,58,0.09) 0%,transparent 50%);}
  .header{background:var(--bark);color:var(--cream);padding:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
  .header-icon{font-size:26px}.header h1{font-family:'Playfair Display',serif;font-size:1.15rem;line-height:1.2}.header p{font-size:.72rem;opacity:.65;margin-top:2px}
  .prog-wrap{background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 24px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--earth);position:sticky;top:65px;z-index:99;}
  .prog-bar{flex:1;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--sage));border-radius:3px;transition:width .4s}
  .score-badge{background:var(--bark);color:var(--cream);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.73rem;white-space:nowrap}
  .container{max-width:700px;margin:0 auto;padding:20px 16px 50px}
  .card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;animation:up .28s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .block-tag{display:inline-block;background:var(--moss);color:#fff;padding:2px 9px;border-radius:4px;font-size:.7rem;font-weight:600;margin-bottom:12px}
  .question{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.55;color:var(--bark);margin-bottom:18px;font-weight:700}
  .options{display:flex;flex-direction:column;gap:8px}
  .option{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:8px;border:2px solid var(--parchment);cursor:pointer;transition:all .16s;background:var(--parchment);font-size:.91rem;line-height:1.45}
  .option:hover:not(.done){border-color:var(--earth);background:#fff;transform:translateX(2px)}
  .letter{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--earth);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;margin-top:1px}
  .option.correct{border-color:var(--green);background:#eef7f0}.option.correct .letter{background:var(--green)}
  .option.wrong{border-color:var(--red);background:#fdf0f0}.option.wrong .letter{background:var(--red)}
  .option.dim{opacity:.4}.option.done{cursor:default}
  .explanation{margin-top:14px;padding:13px 15px;background:linear-gradient(135deg,#f0f7ee,#e8f4e8);border-left:4px solid var(--moss);border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.55;color:var(--bark);display:none}
  .explanation.show{display:block}
  .nav{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
  .btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:600;transition:all .16s}
  .btn-p{background:var(--bark);color:#fff}.btn-p:hover{background:var(--earth)}
  .btn-s{background:var(--parchment);color:var(--bark);border:1px solid rgba(0,0,0,.12)}.btn-s:hover{background:#e8dfc4}
  .btn:disabled{opacity:.38;cursor:not-allowed}
  .dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
  .dot{width:17px;height:17px;border-radius:50%;border:1px solid rgba(0,0,0,.15);cursor:pointer;font-size:.62rem;display:flex;align-items:center;justify-content:center;color:var(--earth);background:var(--parchment)}
  .dot.cur{border:2px solid var(--bark);font-weight:700}.dot.ok{background:var(--green);border-color:var(--green);color:#fff}.dot.no{background:var(--red);border-color:var(--red);color:#fff}
  .results{text-align:center;padding:8px 0 20px}
  .score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Playfair Display',serif;box-shadow:0 6px 28px rgba(0,0,0,.14)}
  .score-circle .big{font-size:2rem;font-weight:700;line-height:1}.score-circle .sub{font-size:.75rem;opacity:.7;margin-top:2px}
  .grade-text{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:5px}.grade-sub{color:var(--earth);font-size:.88rem;margin-bottom:22px}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--parchment);border-radius:10px;padding:11px 16px;text-align:center;min-width:80px}
  .stat .n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--bark)}.stat .l{font-size:.7rem;color:var(--earth);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .ak-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--bark);margin:20px 0 11px;padding-bottom:8px;border-bottom:2px solid var(--parchment)}
  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .ftab{padding:4px 11px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:var(--parchment);color:var(--earth);font-family:'Source Sans 3',sans-serif}
  .ftab.on{background:var(--bark);color:#fff;border-color:var(--bark)}
  .ak-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:6px;font-size:.83rem;line-height:1.45}
  .ak-item.ok{background:#eef7f0}.ak-item.no{background:#fdf0f0}
  .ak-icon{flex-shrink:0;font-size:.95rem}.ak-num{flex-shrink:0;font-weight:600;color:var(--earth);width:26px}
  .start{text-align:center;padding:12px 0}
  .start h2{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--bark);margin-bottom:8px}
  .start p{color:var(--earth);font-size:.9rem;margin-bottom:5px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:18px 0 22px}
  .tag{background:var(--parchment);border:1px solid rgba(0,0,0,.1);padding:4px 12px;border-radius:20px;font-size:.76rem;color:var(--earth);font-weight:600}
  @media(max-width:480px){.card{padding:18px 14px}.question{font-size:.97rem}}
</style>

<div class="header">
  <div class="header-icon">🦅</div>
  <div><h1>Hunting Management Quiz III</h1><p>TS Gestión Forestal y del Medio Natural · 100 questions in English</p></div>
</div>
<div class="prog-wrap" id="progWrap" style="display:none">
  <span id="progLabel" style="font-weight:600;min-width:70px"></span>

</div>
<div class="container" id="app"></div>
<script>
const Q=[
// ══ BLOCK 1: LEGISLATION & RIGHTS (Q1–Q15) ══
{b:"Legislation",q:"Which legal concept defines the status of wild fauna before it is lawfully captured by a hunter?",o:{A:"Res communes: wildlife belongs to all citizens equally.",B:"Res nullius: wildlife belongs to nobody until lawfully captured.",C:"Res publicae: wildlife belongs exclusively to the State.",D:"Res privatae: wildlife belongs to the landowner."},c:"B",e:"Wild fauna has the legal status of res nullius under Spanish law — it belongs to no one until lawfully captured by an authorised hunter, at which point it becomes the hunter's property."},
{b:"Legislation",q:"What is the minimum validity period of a Plan Técnico de Ordenación Cinegética (PTOC) in the Valencian Community?",o:{A:"1 year.",B:"3 years.",C:"5 years.",D:"10 years."},c:"C",e:"PTOCs have a minimum validity of 5 years in the Valencian Community, reviewed annually through the Plan Anual de Aprovechamiento (PAA)."},
{b:"Legislation",q:"Under Valencian Hunting Law 13/2004, which documents must a hunter carry at all times while hunting?",o:{A:"Only a valid national identity document.",B:"Hunting licence, written permission from the estate holder, and mandatory civil liability insurance.",C:"Only the hunting licence.",D:"Only written permission from the estate holder."},c:"B",e:"Article 7 of Law 13/2004 requires hunters to carry their hunting licence, permission from the estate holder, and proof of mandatory civil liability insurance during all hunting activities."},
{b:"Legislation",q:"According to Spanish Arms Regulations, what is a key restriction for hunters when storing rifles at home?",o:{A:"Rifles must be kept unloaded and stored in an authorised gun safe (armero).",B:"Rifles can be stored anywhere as long as they are unloaded.",C:"No home storage is permitted — all rifles must be kept at a licensed gunsmith.",D:"Rifles may only be stored at police stations between hunting seasons."},c:"A",e:"Spanish Arms Regulations require that rifles be stored in an authorised lockable gun safe (armero) at the owner's home. This is a legal obligation to prevent theft and unauthorised access."},
{b:"Legislation",q:"What constitutes a 'very serious' (muy grave) infraction under the Valencian Hunting Law?",o:{A:"Hunting without carrying civil liability insurance.",B:"Hunting on land belonging to another party without permission.",C:"Hunting protected species or during closed season.",D:"Failing to mark the hunting estate's boundaries correctly."},c:"C",e:"Hunting protected species or during closed season (veda) is classified as a very serious infraction under Law 13/2004, punishable by fines and the permanent withdrawal of the hunting licence."},
{b:"Legislation",q:"The remote-activated modular cage trap for wild boar was officially approved for use in the Valencian Community by a resolution dated:",o:{A:"January 2020.",B:"April 2023.",C:"March 2021.",D:"September 2022."},c:"B",e:"The Resolution of 25 April 2023 from the Director General of Natural Environment included the remote-activated modular cage trap (jaula-trampa modular de accionamiento remoto) in the list of approved capture methods in the Valencian Community."},
{b:"Legislation",q:"Under the trophy homologation regulations, which species' trophy can be submitted for homologation immediately after being harvested, without any waiting period?",o:{A:"Red deer (Cervus elaphus).",B:"Roe deer (Capreolus capreolus).",C:"Wild boar (Sus scrofa).",D:"Fallow deer (Dama dama)."},c:"C",e:"Wild boar tusks and whetters can be submitted for homologation immediately after harvest. Cervid trophies must wait between one and three months depending on the species."},
{b:"Legislation",q:"Under Andalusian trophy homologation rules, deer (ciervo) trophies scoring above 195 CIC points and harvested after 1 January 2012 that rank in the national top five are subject to:",o:{A:"Mandatory X-ray examination.",B:"Mandatory DNA testing to verify origin.",C:"A mandatory waiting period of six months before homologation.",D:"Submission to the national museum of natural history."},c:"B",e:"The Andalusian homologation regulations require mandatory DNA testing for deer trophies scoring over 195 CIC points harvested after 2012 and ranking in the national top five, to verify their wild origin and morphological authenticity."},
{b:"Legislation",q:"What is the main purpose of the Annual Hunting Report (Memoria Anual de Caza) submitted to the administration?",o:{A:"To renew the hunting licences of all estate members.",B:"To report annual harvests by species, sex and age, hunting days, incidents and infrastructure status.",C:"To justify the economic income of the hunting estate.",D:"To request permission for the following season's hunting."},c:"B",e:"The Annual Report provides the administration with detailed harvest data by species, sex and age, hunting days, census results, incidents (disease, accidents, damage) and comparison with the approved Annual Harvest Plan."},
{b:"Legislation",q:"According to Decree 142/2025, what is the maximum period within which a hunting estate must report the results of a collective ungulate hunt to the administration?",o:{A:"24 hours.",B:"48 hours.",C:"7 days.",D:"30 days."},c:"C",e:"Decree 142/2025 requires that results of ungulate hunts (species, number, sex, age) be communicated to the competent administration within a maximum of 7 days after the hunt."},
{b:"Legislation",q:"Which international convention established the list of wetlands where lead ammunition is prohibited in Spain?",o:{A:"The CITES Convention.",B:"The Bern Convention.",C:"The Ramsar Convention.",D:"The Bonn Convention."},c:"C",e:"The Ramsar Convention on Wetlands of International Importance provides the list of protected wetland sites where Royal Decree 581/2001 prohibits the use of lead shot, to prevent plumbism in waterbirds."},
{b:"Legislation",q:"What minimum reserve zone percentage must a sport (non-commercial) hunting estate maintain in the Valencian Community?",o:{A:"5%",B:"10%",C:"20%",D:"30%"},c:"B",e:"Sport (non-commercial) hunting estates in the Valencian Community must maintain a minimum wildlife reserve zone of 10% of their total area, compared to 20% required for commercial estates."},
{b:"Legislation",q:"Under the Valencian Community hunting exam regulations, a hunter who has not held a valid hunting licence in the last five years must:",o:{A:"Pass an aptitude test covering hunting knowledge, safety and legislation.",B:"Simply pay a higher licence fee.",C:"Complete 10 hours of supervised hunting with a licensed hunter.",D:"Submit a criminal background check only."},c:"A",e:"Hunters who have not held a valid licence in any Spanish autonomous community within the previous five years must pass the aptitude test covering hunting legislation, species knowledge, and safety."},
{b:"Legislation",q:"What is the role of the 'Plan Anual de Aprovechamiento' (PAA) in relation to the PTOC?",o:{A:"It replaces the PTOC every year.",B:"It is a short-term annual document that specifies harvest quotas and hunting days within the strategic framework set by the PTOC.",C:"It is required only for estates with more than 1,000 hectares.",D:"It is a national document issued by the Ministry of Environment."},c:"B",e:"The PAA concretises each year's harvest quotas by species, hunting dates and permitted modalities, always within the broader strategic framework established by the quinquennial PTOC."},
{b:"Legislation",q:"What distinguishes a 'Refugio de Fauna' from a regular hunting estate under Valencian law?",o:{A:"Hunting is permitted in a Refugio de Fauna but with reduced bag limits.",B:"A Refugio de Fauna is a designated non-hunting zone created to protect threatened species or critical habitats.",C:"A Refugio de Fauna is a zone where only falconry is permitted.",D:"Refugios de Fauna are exclusively managed by the national government."},c:"B",e:"Refugios de Fauna are areas declared as non-hunting land (terreno no cinegético) where all hunting is prohibited in order to protect threatened species, their habitats, or critical areas for reproduction."},

// ══ BLOCK 2: HUNTING SPACES (Q16–Q25) ══
{b:"Hunting Spaces",q:"What is the minimum area required to constitute a private small game hunting estate (coto privado de caza menor) in the Valencian Community?",o:{A:"100 hectares.",B:"250 hectares.",C:"500 hectares.",D:"1,000 hectares."},c:"C",e:"Valencian Hunting Law 13/2004 establishes a minimum area of 500 hectares for the constitution of a private small game hunting estate."},
{b:"Hunting Spaces",q:"A landowner with 200 hectares wants to create a small game coto in Valencia. What must they do?",o:{A:"They can proceed as 200 ha exceeds 100 ha.",B:"They must join with neighbouring landowners to reach the minimum 500 ha.",C:"They must apply for an exemption from the administration.",D:"They can only create a large game coto, not a small game one."},c:"B",e:"Since 200 ha falls below the 500 ha minimum, the landowner must merge their land with adjacent owners' land through formal agreement to reach the legal minimum before applying for a coto declaration."},
{b:"Hunting Spaces",q:"What do white signs with black lettering reading 'COTO DE CAZA' indicate along a boundary?",o:{A:"Free hunting land accessible to any licensed hunter.",B:"A game reserve where all hunting is prohibited.",C:"An enclosed area where only hunting access is restricted to those authorised by the estate holder.",D:"Land under administrative review for coto status."},c:"C",e:"The official boundary signs indicate the land is a legally constituted hunting estate. Only persons expressly authorised by the estate holder may hunt within its boundaries."},
{b:"Hunting Spaces",q:"What is a 'zona de seguridad' in the context of Spanish hunting legislation?",o:{A:"The 20% reserve zone within a commercial coto.",B:"A buffer zone around inhabited areas, roads and buildings where hunting is prohibited.",C:"The safe distance between two hunting posts in a batida.",D:"A zone where only archery hunting is permitted."},c:"B",e:"Safety zones (zonas de seguridad) are strips of land surrounding inhabited centres, roads, railways and buildings where hunting is prohibited to protect people from accidental shooting."},
{b:"Hunting Spaces",q:"What is the legally required minimum interval between boundary signs on a hunting estate perimeter in Spain?",o:{A:"50 metres.",B:"100 metres.",C:"200 metres.",D:"500 metres."},c:"C",e:"Hunting estate perimeters must be marked with official boundary signs at intervals not exceeding 200 metres, ensuring the boundaries are clearly identifiable to all users of the land."},
{b:"Hunting Spaces",q:"What is meant by 'terreno cinegético de aprovechamiento común' (common hunting land)?",o:{A:"Land owned by a hunting club open only to its members.",B:"Non-enclosed public or private land where any licensed hunter with the corresponding regional permit may hunt freely.",C:"National parks managed by the state.",D:"Land managed jointly by several private hunting estates."},c:"B",e:"Common hunting land consists of non-enclosed public or private terrain where hunting is open to any hunter holding a valid licence and the corresponding regional permit, as opposed to private enclosed cotos."},
{b:"Hunting Spaces",q:"What are 'cotos de piezas vivas de caza' (cercones) and what is their primary purpose?",o:{A:"Traps used for live capture of game animals.",B:"Enclosed areas used to breed or maintain live game animals for subsequent harvest or restocking operations.",C:"Hunting estates where photography is the only activity permitted.",D:"Zones where only scent hounds are used for game location."},c:"B",e:"Live game production estates (cercones) are enclosed areas used to breed and maintain live wild animals under semi-extensive conditions, both for direct cinegetic use within the enclosure and as a source of animals for restocking programmes."},
{b:"Hunting Spaces",q:"What is the minimum safe shooting distance from a public road or inhabited area under Spanish hunting law?",o:{A:"50 metres.",B:"100 metres.",C:"200 metres.",D:"500 metres."},c:"B",e:"Spanish hunting legislation establishes a mandatory minimum shooting distance of 100 metres from public roads, inhabited areas and recreational zones."},
{b:"Hunting Spaces",q:"What official document certifies the legal origin of large game animals harvested in the Valencian Community?",o:{A:"A signed declaration from the estate holder.",B:"The official Generalitat Valenciana tag (precinto) placed on the harvested animal.",C:"The hunter's membership card of the hunting estate.",D:"The purchase receipt for the hunting permit."},c:"B",e:"The official Generalitat Valenciana tag (precinto) is the legal document that certifies the lawful origin of harvested large game, and must be attached to the animal immediately after it is harvested."},
{b:"Hunting Spaces",q:"When a hunting estate spans two autonomous communities and the majority of its area lies in the other region, which technical management plan applies?",o:{A:"The Valencian plan always takes precedence.",B:"A joint plan drafted simultaneously by both regions.",C:"The majority region's plan governs, with the Valencian authority providing a complementary report.",D:"The national hunting plan approved by the Ministry."},c:"C",e:"Article 25 of Law 13/2004 establishes that shared estates are governed by the plan of the majority community, with the Valencian authority issuing a complementary technical report."},

// ══ BLOCK 3: HUNTING MODALITIES (Q26–Q38) ══
{b:"Hunting Modalities",q:"In a montería, what is the 'mancha'?",o:{A:"The line of armed hunters waiting at fixed posts.",B:"The dense vegetation area beaten by hounds to drive game toward the hunters.",C:"The team of dogs used to track wounded animals after the hunt.",D:"The official record of animals harvested during the hunt."},c:"B",e:"The mancha is the area of dense vegetation that is systematically beaten by the rehalas (packs of hounds). Its size and topography determine the placement of the armadas (shooting lines)."},
{b:"Hunting Modalities",q:"What specific safety measure is most critical during a montería or batida when using rifles?",o:{A:"Keeping the safety engaged at all times, including when at the post.",B:"Knowing the exact trajectory of every bullet and never firing when the bullet's path after impact is unknown.",C:"Wearing camouflage to avoid spooking game.",D:"Using only shotguns in drive hunts."},c:"B",e:"In drive hunts with rifles, every hunter must know where their bullet will travel after impact. A rifle bullet can remain lethal for over a kilometre; firing without knowing the bullet's final destination is the most common cause of fatal accidents."},
{b:"Hunting Modalities",q:"What is the maximum number of dogs allowed in a 'gancho de jabalí' before it is reclassified as a batida?",o:{A:"10 dogs.",B:"20 dogs.",C:"30 dogs.",D:"50 dogs."},c:"C",e:"A gancho de jabalí is strictly limited to 30 dogs (and 15 armed hunters). Exceeding either limit automatically reclassifies the hunt as a batida, which is subject to different regulations."},
{b:"Hunting Modalities",q:"In the 'al salto' (walking-up) modality, what is the typical configuration?",o:{A:"Hunters form a line and advance together in the same direction.",B:"A single hunter or small group walks through the terrain, shooting game as it is flushed.",C:"Hunters wait at fixed posts while beaters push game toward them.",D:"Hunters use decoys to attract game to a fixed location."},c:"B",e:"In the al salto modality, a hunter (or small group) walks through the terrain, often with dogs, shooting at game as it is flushed. It is characterised by individual, non-organised movement through the habitat."},
{b:"Hunting Modalities",q:"The 'persecución con galgos' (greyhound coursing) is restricted exclusively to which species?",o:{A:"Rabbits only.",B:"Hares only.",C:"Both hares and rabbits.",D:"Foxes and hares."},c:"B",e:"Greyhound coursing (persecución con galgos) is the hunting modality exclusively reserved for hares (Lepus spp.), where the greyhound captures the hare by speed alone, without the use of firearms."},
{b:"Hunting Modalities",q:"What is the 'zapeo' or 'gancho de conejos' and for which species is it exclusively used?",o:{A:"A trap-setting technique exclusively for rabbits.",B:"A drive hunting modality exclusively for rabbits, where beaters push rabbits toward a line of hunters at fixed posts.",C:"A falconry technique for rabbit hunting.",D:"A coursing technique similar to greyhound hunting but for rabbits."},c:"B",e:"The zapeo or gancho de conejos is a drive hunting modality exclusive to rabbits (Oryctolagus cuniculus): beaters with or without dogs push rabbits toward a line of hunters waiting at fixed posts."},
{b:"Hunting Modalities",q:"During the 'espera nocturna' (night ambush) for wild boar, what is mandatory before firing?",o:{A:"Firing is never permitted at night under any circumstances.",B:"The hunter must illuminate the target with a spotlight to positively identify the species before shooting.",C:"The hunter must radio the hunt organiser before every shot.",D:"A minimum of two hunters must be present at every post."},c:"B",e:"During night ambushes for wild boar, the use of a spotlight to positively identify the species before firing is mandatory. Shooting at unidentified targets in darkness is strictly prohibited and a leading cause of accidents."},
{b:"Hunting Modalities",q:"What is the 'lanceo de jabalí a caballo' (wild boar lancing on horseback) and what makes it unique?",o:{A:"A modern technique using a mounted shooter with a high-powered rifle.",B:"A traditional Spanish hunting modality in which the hunter pursues and kills the boar on horseback using a lance, without any firearms.",C:"A falconry-based technique where a trained hawk guides horseback hunters to boar.",D:"A competitive event where hunters race horses to be first to reach the boar."},c:"B",e:"Wild boar lancing on horseback is a centuries-old Spanish hunting tradition in which a mounted hunter pursues the boar and kills it with a lance, without firearms. It requires exceptional horsemanship and is one of Spain's most distinctive cinegetic traditions."},
{b:"Hunting Modalities",q:"What is the function of the 'Junta de Carnes' at the end of a montería?",o:{A:"A mandatory veterinary inspection of all harvested animals.",B:"The official meeting where trophies are assigned to their hunters, disputes over shared kills are resolved, and the distribution of meat is agreed.",C:"A formal dinner where the day's results are announced.",D:"The administrative submission of harvest data to the autonomous community."},c:"B",e:"The Junta de Carnes takes place at the end of a montería: trophies are officially assigned to the hunter from whose post each animal fell, inter-post disputes are resolved, and the distribution of meat between organiser and participants is settled according to prior agreements."},
{b:"Hunting Modalities",q:"What is the role of the 'perrero' or 'rehalero' in a montería?",o:{A:"The person responsible for placing hunters at their posts.",B:"The person in charge of managing and leading the pack of hounds (rehala) during the hunt.",C:"The veterinary inspector responsible for checking the harvested animals.",D:"The administrator who files the legal documentation after the hunt."},c:"B",e:"The rehalero (or perrero) is the person responsible for managing, conducting and caring for the rehala (pack of hounds) during and after the hunt, ensuring the dogs work the mancha effectively and are handled safely."},
{b:"Hunting Modalities",q:"What distinguishes 'selective hunting' (caza selectiva) from standard hunting in terms of its objectives?",o:{A:"It is limited to hunters with a special licence and higher bag limits.",B:"It targets specific individuals by sex, age or health status to maintain genetic diversity and population structure.",C:"It is exclusively practised by wildlife managers, not recreational hunters.",D:"It refers only to hunting of invasive exotic species."},c:"B",e:"Selective hunting is not a separate modality but a management principle: it involves deliberately targeting specific individuals (old, sick, depauperate, or those causing an imbalance in sex/age ratios) to maintain population health and genetic quality."},
{b:"Hunting Modalities",q:"For bow hunting of large game in Spain, what is the minimum draw weight required?",o:{A:"30 pounds at the archer's draw length.",B:"45 pounds (20.25 kg) at the archer's draw length.",C:"60 pounds at full draw.",D:"No minimum weight is legally established for large game."},c:"B",e:"Spanish regulations require a minimum draw weight of 45 pounds (20.25 kg) measured at the archer's draw length for large game bow hunting. Arrow tips designed like harpoons that cannot be extracted are also prohibited."},

// ══ BLOCK 4: SPECIES BIOLOGY (Q39–Q55) ══
{b:"Species Biology",q:"What is the typical number of points on a well-formed adult roe deer antler, and what are they called?",o:{A:"Two points per antler: main beam and brow tine.",B:"Three points per antler: main beam (guía), brow tine (luchadera) and rear tine (garceta).",C:"Four to five points per antler, like a small red deer.",D:"Roe deer antlers have no defined points — they are simple rounded knobs."},c:"B",e:"A well-formed adult roe deer antler has three points: the main beam (guía) with its rosette base, the brow tine (luchadera) projecting forward in the anterior third, and the rear tine (garceta) projecting backward in the posterior third."},
{b:"Species Biology",q:"What unique reproductive feature does the roe deer (Capreolus capreolus) possess among European ungulates?",o:{A:"It has the longest gestation period of all European deer.",B:"Embryonic diapause: fertilisation occurs in July-August but the embryo does not implant until January, with births in May.",C:"Females can give birth to up to four fawns per litter.",D:"Males retain their antlers year-round without shedding."},c:"B",e:"The roe deer is one of very few ungulates with embryonic diapause (delayed implantation): after mating in July-August, the embryo arrests development until January, then implants and develops normally, with births occurring in May."},
{b:"Species Biology",q:"What is the 'berrea' (rut) of the red deer and during which months does it typically occur?",o:{A:"A period of territorial marking in spring (April-May).",B:"The rut characterised by loud bellowing of males, occurring from September to October.",C:"A summer gathering of herds at water sources in July-August.",D:"A winter aggregation of males for social ranking in December-January."},c:"B",e:"The berrea (rut) of the red deer occurs from September to October and is characterised by the powerful bellowing (brama) of males competing for females and warning rivals of their presence."},
{b:"Species Biology",q:"What is 'desmogue' in deer and when does it occur in red deer?",o:{A:"Antler velvet hardening in late summer.",B:"The annual shedding of antlers; in red deer this typically occurs around March.",C:"The rut period of red deer.",D:"The birth of red deer calves in late spring."},c:"B",e:"Desmogue is the annual natural shedding of antlers in deer. In red deer it typically occurs around March, with new antler growth beginning immediately, covered in blood-rich velvet (terciopelo or borra)."},
{b:"Species Biology",q:"What name is given to a young red deer stag aged 1-2 years with only two straight, unbranched antler spikes?",o:{A:"Horquillero (fork-horn).",B:"Vareto or estaquero (spike buck).",C:"Rayón (striped boar calf).",D:"Cervatillo (fawn)."},c:"B",e:"A young stag of 1-2 years with only two straight unbranched spikes is called a vareto or estaquero — named after the stake-like appearance of the simple unbranched antlers."},
{b:"Species Biology",q:"What is the typical weight range of an adult male wild boar in Spain?",o:{A:"20-40 kg.",B:"50-100 kg, with exceptional individuals exceeding 150 kg.",C:"150-200 kg average.",D:"10-20 kg."},c:"B",e:"Adult male wild boar typically weigh 50-100 kg in Spain, although individuals in optimal conditions can exceed 150 kg. Females are considerably lighter."},
{b:"Species Biology",q:"Why are wild boar piglets called 'rayones'?",o:{A:"Because they are born with a distinctive spotted coat similar to fawns.",B:"Because of their characteristic longitudinal yellow and black stripes, which they retain until about six months of age.",C:"Because of the ray-like markings on their snout used for rooting.",D:"After the rays of light visible through the forest canopy in which they are born."},c:"B",e:"Wild boar piglets are called rayones (from raya = stripe) because of their characteristic yellow and black longitudinal stripes, which function as camouflage in dappled forest light and are shed at around six months of age."},
{b:"Species Biology",q:"What is the distinguishing feature of the fallow deer (Dama dama) antler compared to other Spanish deer species?",o:{A:"It is the only Spanish deer with no antlers at all.",B:"The antler becomes palmate (broadened like a shovel) in its upper section, with lateral points called palms.",C:"It has the simplest antler of all Spanish deer, with only two tines.",D:"The antler grows vertically without any lateral branching."},c:"B",e:"The fallow deer antler is distinctive for its palmate (flattened, shovel-like) upper section — the pala — bordered by irregular points. This palmate shape is unique among Spanish deer and is the key identification feature of the species."},
{b:"Species Biology",q:"What is the geographical origin of the fallow deer (Dama dama) in Spain?",o:{A:"It is a native Iberian species.",B:"It originates from Iran and Asia Minor, naturalised in Spain since Roman or medieval times.",C:"It originates from sub-Saharan Africa.",D:"It was introduced from Scandinavia in the 20th century."},c:"B",e:"The fallow deer is native to Iran and Asia Minor. It was introduced to Europe in antiquity (Roman or medieval period) and is now a naturalised species in Spain, widely present on hunting estates."},
{b:"Species Biology",q:"What is the typical clutch size of the red-legged partridge and who incubates?",o:{A:"3-5 eggs, incubated exclusively by the female.",B:"10-16 eggs on average; uniquely, both sexes may incubate separate clutches simultaneously.",C:"1-2 eggs, like large raptors.",D:"20-25 eggs, incubated exclusively by the male."},c:"B",e:"The red-legged partridge typically lays 10-16 eggs. Uniquely among Spanish birds, the female sometimes lays two clutches: one incubated by the male and one by the female herself, potentially doubling reproductive output."},
{b:"Species Biology",q:"What is 'caecotrophy' in lagomorphs (rabbits and hares) and why is it important?",o:{A:"Territorial marking behaviour using urine and faeces.",B:"The ingestion of soft caecal pellets (caecotrophs) directly from the anus, allowing a second digestive pass that extracts additional proteins and B vitamins.",C:"Communal sleeping behaviour in social groups.",D:"Communication through ground-thumping with the hind feet."},c:"B",e:"Caecotrophy is the process by which rabbits and hares ingest their own soft caecal pellets (rich in protein and B vitamins) directly from the anus for a second digestive pass — a key adaptation enabling the efficient digestion of plant cellulose."},
{b:"Species Biology",q:"What is the main morphological field character distinguishing a hare from a rabbit?",o:{A:"Coat colour: hares are always brown, rabbits always grey.",B:"Ear length: hares have much longer ears (longer than the head) with black tips; rabbits have shorter, rounder ears.",C:"Tooth structure: hares have visible canine teeth.",D:"Leg proportions: rabbits have proportionally longer hind legs than hares."},c:"B",e:"The most reliable field character is ear length: hares have very long ears (exceeding head length) with distinctive black tips, while rabbits have shorter, rounded ears without black tips."},
{b:"Species Biology",q:"What is the function of the anal mirror (escudo anal) in roe deer, and how does it differ between sexes in summer?",o:{A:"It is always black and circular in both sexes.",B:"It is a white heart-shaped patch (inverted heart) in winter; in summer it becomes more yellowish, and in females develops an additional downward extension forming a heart shape.",C:"Only females have an anal mirror; males do not.",D:"It is always bright red in all individuals."},c:"B",e:"The roe deer anal mirror is an inverted-heart-shaped white patch. In winter it is pure white in both sexes. In summer, the female's mirror develops a downward V-shaped extension, forming a complete heart shape that distinguishes her from the male."},
{b:"Species Biology",q:"The magpie (Pica pica) is considered the most problematic predator species for small game management in Spain primarily because:",o:{A:"It directly hunts adult partridges and hares.",B:"It is highly intelligent, highly adaptable, thrives in human-modified environments, and predates heavily on eggs, chicks and young lagomorphs during the breeding season.",C:"It competes with partridges for food resources.",D:"It carries and spreads myxomatosis among rabbit populations."},c:"B",e:"The magpie is the primary target of legal predator control programmes because of its exceptional intelligence, rapid adaptation to agricultural and urban environments, and significant predation pressure on nests, eggs, chicks and young rabbits and hares during spring."},
{b:"Species Biology",q:"What is the main predation impact of the fox (Vulpes vulpes) on small game populations?",o:{A:"Foxes have no significant impact on small game.",B:"Direct predation on rabbits, hares and partridges, especially during the breeding season when nests, chicks and leverets are most vulnerable.",C:"Foxes only impact ungulate calves, not small game.",D:"Their impact is limited to competition for plant-based food resources with rabbits."},c:"B",e:"The fox exerts significant predation pressure on rabbits, hares and partridges. This is especially critical in spring when foxes prey on nests, eggs, chicks and young lagomorphs, justifying its management as a predator species in many hunting estates."},

// ══ BLOCK 5: POPULATION MANAGEMENT (Q56–Q68) ══
{b:"Population Management",q:"What is 'carrying capacity' (K) in the context of wildlife management?",o:{A:"The maximum weight of animals that can be transported on a hunting vehicle.",B:"The maximum number of individuals of a species that a habitat can sustainably support without degradation.",C:"The maximum bag limit per hunter per day.",D:"The minimum area required for a species to maintain a viable population."},c:"B",e:"Carrying capacity (K) is the maximum number of individuals of a given species that a habitat can sustainably support, determined by the availability of food, water, shelter and space. Exceeding K leads to habitat degradation and population decline."},
{b:"Population Management",q:"What is the main advantage of camera trapping (fototrampeo) as a census method?",o:{A:"It provides an exact count of all individuals in the area.",B:"It allows individual identification through natural marks (coat patterns, antler morphology, scars) and population estimation without disturbing the animals.",C:"It can only be used at night with infrared cameras.",D:"It requires physical capture of animals to obtain useful data."},c:"B",e:"Camera trapping allows passive, non-invasive data collection. Individual animals can be identified through unique natural marks, enabling capture-recapture models to estimate population size and structure without disturbing the population."},
{b:"Population Management",q:"What does an unbalanced sex ratio strongly skewed toward females indicate in an ungulate population?",o:{A:"The population is in excellent conservation status.",B:"Excessive hunting pressure on males, potentially reducing fertilisation rates and genetic diversity.",C:"A natural phenomenon with no management implications.",D:"Population decline caused by factors other than hunting."},c:"B",e:"A heavily female-biased sex ratio typically indicates overexploitation of males through hunting. This reduces reproductive efficiency and genetic diversity, requiring adjustments to male harvest quotas to rebalance the population structure."},
{b:"Population Management",q:"What is the 'mark-recapture' (CMR) method used for in wildlife census work?",o:{A:"A lethal method for population control.",B:"A statistical method estimating population size by marking individuals, releasing them, and analysing the proportion of marked individuals in subsequent captures.",C:"A satellite tracking system for migratory species.",D:"A method exclusively used for bird-ringing programmes."},c:"B",e:"The CMR method marks a sample of individuals, releases them, and then re-samples the population. The proportion of marked individuals in the second sample, combined with the number marked in the first, allows estimation of total population size."},
{b:"Population Management",q:"What does the juvenile-to-adult ratio measured in post-breeding surveys (summer census) indicate for partridge management?",o:{A:"The total population size in absolute numbers.",B:"The recruitment rate — the proportion of young of the year added to the population, indicating reproductive success.",C:"The density of predators in the hunting estate.",D:"The mortality rate caused by hunting in the previous season."},c:"B",e:"The juvenile:adult ratio (poults per adult) in post-breeding summer surveys measures the annual recruitment rate. A high ratio (e.g., 3 juveniles per adult) indicates successful breeding and good population growth potential."},
{b:"Population Management",q:"What ecological problem does habitat fragmentation cause for game populations?",o:{A:"It increases animal density by concentrating them in smaller patches.",B:"It isolates subpopulations, prevents gene flow, increases inbreeding and reduces long-term viability.",C:"It facilitates census work by concentrating animals in defined areas.",D:"It has no negative effects on game species."},c:"B",e:"Habitat fragmentation isolates subpopulations, interrupting the dispersal of individuals between patches. This leads to inbreeding, reduced disease resistance and reduced adaptive capacity, threatening long-term population viability."},
{b:"Population Management",q:"Why is mandible (tooth) analysis of harvested ungulates useful for population management?",o:{A:"It determines the sex of the animal.",B:"It provides an age estimate through dental wear and eruption patterns, enabling assessment of the population's age structure.",C:"It identifies the presence of infectious diseases.",D:"It determines the nutritional status of the animal."},c:"B",e:"Mandible analysis uses the pattern of tooth eruption and wear to estimate the age of harvested ungulates. This data allows managers to assess the population's age structure — a key indicator of management quality and population health."},
{b:"Population Management",q:"What is 'sustainable harvest rate' and how is it theoretically calculated?",o:{A:"Always 100% of the population surplus.",B:"The percentage of the population extractable annually without reducing its size, equivalent to the net annual increment (births minus natural mortality).",C:"Always 30% of the total population.",D:"The sum of the previous year's total harvest."},c:"B",e:"Sustainable harvest rate equals the net annual population increment (natality minus natural mortality). Harvesting more than this surplus reduces the population; harvesting less allows population growth."},
{b:"Population Management",q:"What is metapopulation dynamics and when is it relevant to hunting management?",o:{A:"The behaviour of a single large, homogeneous population.",B:"A network of local subpopulations connected by dispersal, where local extinction can be offset by recolonisation from other subpopulations.",C:"The seasonal migration pattern of a species.",D:"The movement of animals between adjacent hunting estates."},c:"B",e:"A metapopulation is a set of local subpopulations connected by individual dispersal. In hunting management, it becomes relevant when populations are fragmented: losing one subpopulation can cascade to others if dispersal corridors are blocked."},
{b:"Population Management",q:"What information do 'water points' (puntos de agua) provide beyond their direct benefit to wildlife?",o:{A:"They serve only as a water source and provide no additional management information.",B:"They attract wildlife and serve as ideal locations for camera traps, providing data on species presence, activity patterns and population estimates.",C:"They are used exclusively to attract game for hunting.",D:"They are primarily used to monitor vegetation growth around water sources."},c:"B",e:"Beyond providing water, artificial water points concentrate wildlife activity, making them ideal locations for camera traps. This dual function makes them valuable both as habitat improvement measures and as standardised monitoring stations."},
{b:"Population Management",q:"What does the Random Encounter Model (REM) provide in the context of wild boar management under Decree 142/2025?",o:{A:"A method for calculating the economic value of the wild boar population.",B:"A population estimation method using camera trap data that can justify adjustments to the minimum hunting effort required in overabundance zones.",C:"A GPS tracking method for individual wild boar.",D:"A model for predicting wild boar crop damage."},c:"B",e:"Decree 142/2025 references REM (Random Encounter Model), REST and CT-DS as more precise population estimation methods using camera trap data, whose results can justify modifications to the standard minimum hunting effort of 30 equivalent sessions per km² per season."},
{b:"Population Management",q:"What is an 'ecological corridor' and why is it important for sustainable hunting management?",o:{A:"A designated route for hunting vehicles within a coto.",B:"A strip of habitat connecting isolated populations, facilitating animal movement, gene flow and recolonisation of areas that have lost individuals.",C:"The standard transect route used in wildlife census surveys.",D:"The mandatory safe passage route for hunters during a batida."},c:"B",e:"Ecological corridors are strips of habitat linking fragmented populations, enabling dispersal, genetic exchange and recolonisation of depleted areas. For sustainable hunting, maintaining corridors is essential to prevent inbreeding and support natural population recovery."},
{b:"Population Management",q:"If a game manager detects that the roe deer population in their estate shows a highly skewed age structure dominated by young individuals with very few old adults, what does this most likely indicate?",o:{A:"Excellent population health and high reproductive success.",B:"Excessive hunting pressure removing animals before they reach old age, or high natural mortality in older age classes.",C:"A natural cycle independent of management.",D:"Optimal selective hunting practice."},c:"B",e:"A population dominated by young individuals with few old adults indicates that animals are not surviving to old age — a sign of excessive hunting pressure on older classes or high mortality. This compromises the selective hunting objectives and long-term trophy quality."},

// ══ BLOCK 6: WILDLIFE HEALTH (Q69–Q80) ══
{b:"Wildlife Health",q:"What is myxomatosis and what is its main transmission route in wild rabbits?",o:{A:"A bacterial disease spread by direct contact between rabbits.",B:"A viral disease (Myxoma virus) transmitted mainly by blood-sucking arthropods (fleas, mosquitoes, ticks) and by direct contact.",C:"A fungal disease transmitted by inhaling soil spores.",D:"A parasitic disease transmitted through contaminated water."},c:"B",e:"Myxomatosis is caused by the Myxoma virus and is primarily transmitted by blood-sucking arthropods (fleas and mosquitoes), as well as by direct contact between rabbits. It causes tumours, conjunctivitis, respiratory failure and death."},
{b:"Wildlife Health",q:"How has the emergence of RHDV2 (Rabbit Haemorrhagic Disease Virus variant 2) complicated rabbit management compared to the classic RHDV?",o:{A:"RHDV2 only affects domestic rabbits, not wild populations.",B:"RHDV2 affects rabbits of all ages (including those under 4 weeks previously resistant), affects some hare species, and is more difficult to control with vaccines.",C:"RHDV2 causes lower mortality than classic RHDV.",D:"RHDV2 can be effectively controlled with antibiotics."},c:"B",e:"RHDV2 is more complex than classic RHDV: it affects rabbits of all ages (removing the previous immunity of young kittens), can infect northern hare species, and its antigenic differences complicate cross-protection from classic-strain vaccines."},
{b:"Wildlife Health",q:"What is brucellosis in wild boar and why is it a public health concern?",o:{A:"A parasitic disease exclusive to wild boar with no human transmission.",B:"A bacterial disease (Brucella suis) that can be transmitted to humans through contact with body fluids of infected animals, causing undulant fever.",C:"A fungal infection affecting the boar's tusks.",D:"A viral infection similar to swine flu with no human risk."},c:"B",e:"Brucellosis in wild boar (Brucella suis) is a relevant zoonosis: it can be transmitted to hunters during handling of reproductive organs or body fluids of infected animals, causing undulant fever (Malta fever). Use of gloves and discarding affected reproductive organs is strongly recommended."},
{b:"Wildlife Health",q:"What are the characteristic external signs of advanced sarcoptic mange in Spanish ibex (cabra montés)?",o:{A:"High fever and apparent disorientation.",B:"Progressive hair loss (alopecia), thickened and hyperkeratotic skin with a cardboard-like greyish appearance, and intense itching causing the animal to scratch constantly.",C:"Paralysis of the hindlimbs.",D:"Presence of large subcutaneous tumours."},c:"B",e:"Advanced sarcoptic mange in ibex presents with progressive alopecia, hyperkeratosis with a thickened, cracked, greyish skin (carton-like appearance), and intense pruritus causing continuous rubbing and scratching. The protocol of the Valencian Community describes these signs in its detection guide."},
{b:"Wildlife Health",q:"What is tuberculosis bovina in wildlife and which species act as the main reservoir in Spain?",o:{A:"Roe deer are the main reservoir of bovine tuberculosis in Spain.",B:"Wild boar and red deer are the main reservoirs of Mycobacterium bovis in Spain, capable of transmitting it to domestic livestock.",C:"Bovine tuberculosis does not affect Spanish wildlife.",D:"Woodcock is the main reservoir of tuberculosis in wildlife."},c:"B",e:"Wild boar (Sus scrofa) and red deer (Cervus elaphus) are the principal reservoirs of Mycobacterium bovis in Spain, particularly in the southwestern peninsula. They can transmit the pathogen to cattle and goats that share pastures and water sources."},
{b:"Wildlife Health",q:"What is the minimum temperature to which wild boar meat must be cooked at the centre to prevent hepatitis E transmission?",o:{A:"55°C for 30 minutes.",B:"Above 70°C throughout the entire piece.",C:"100°C (boiling point) for at least 10 minutes.",D:"No specific temperature is required — curing with salt is sufficient."},c:"B",e:"The hepatitis E virus (genotype 3, associated with wild boar) is inactivated by heating the meat to above 70°C throughout its entire mass. This complete cooking requirement also protects against Trichinella and other pathogens."},
{b:"Wildlife Health",q:"What parasite in wild boar can be transmitted to humans through consumption of undercooked meat?",o:{A:"Fasciola hepatica.",B:"Trichinella (mainly Trichinella spiralis and T. britovi).",C:"Echinococcus granulosus.",D:"Toxoplasma gondii exclusively."},c:"B",e:"Trichinella (mainly T. spiralis and T. britovi) is the most relevant wild boar parasite for public health. Larvae encysted in muscle tissue are transmitted to humans through consumption of undercooked meat, causing trichinellosis with potentially serious symptoms."},
{b:"Wildlife Health",q:"What basic hygiene measures should a hunter take when handling viscera from harvested game?",o:{A:"No special precautions are required.",B:"Use disposable gloves, avoid touching mucous membranes, wash hands with soap and water, and do not consume raw viscera.",C:"Simply rinse hands with cold water.",D:"A full-body protection suit is always required."},c:"B",e:"When handling game viscera, hunters should use disposable gloves, avoid touching eyes, nose and mouth, wash hands thoroughly with soap and water, and never eat raw viscera. These precautions prevent zoonoses including tularaemia, brucellosis and hepatitis E."},
{b:"Wildlife Health",q:"Why should a hunter never move or bury an animal found dead in the field?",o:{A:"Because it is legally the property of the nearest landowner.",B:"Moving or burying the carcass destroys epidemiological evidence and may spread the pathogen to new areas.",C:"Because it may still be alive and could wake up.",D:"Because moving it contaminates the hunter's clothing with fur."},c:"B",e:"Moving, touching without protection or burying a found carcass destroys the evidence needed for epidemiological investigation (the carcass, its position, potential signs of cause of death) and may spread the pathogen. The correct procedure is to leave it undisturbed and notify the competent authority."},
{b:"Wildlife Health",q:"What specific complication can occur with lead or nickel pellets retained in ocular tissues?",o:{A:"No specific risk exists from retained pellets.",B:"Progressive metalosis: slow oxidation of nickel or lead pellets releases toxic metal ions causing progressive inflammation and tissue damage.",C:"Pellets always self-expel within a few days.",D:"Only a risk of bacterial infection."},c:"B",e:"Lead or nickel pellets retained in ocular tissues undergo slow oxidation, releasing toxic metal ions that cause metalosis — progressive chemical inflammation and tissue destruction. This requires surgical removal to prevent permanent damage."},
{b:"Wildlife Health",q:"What action must be taken regarding ALL wild boar captured in an approved live trap in the Valencian Community, regardless of sex or age?",o:{A:"They must be tagged and released.",B:"They must be captured and killed (sacrificed) without exception.",C:"Adults must be killed but juveniles may be released.",D:"They may be transported alive to another hunting estate."},c:"B",e:"Both the cable-triggered and counterweight trap authorisations in the Valencian Community explicitly require the capture and sacrifice of ALL wild boar that enter the trap, regardless of sex or age, with no exceptions permitted."},

// ══ BLOCK 7: SAFETY & FIRST AID (Q81–Q90) ══
{b:"Safety & First Aid",q:"What is the correct recovery position (posición lateral de seguridad / PLS) for an unconscious breathing casualty in the field?",o:{A:"Lying face-up with legs elevated.",B:"Lying on their side with the mouth oriented downward to prevent aspiration of vomit or secretions.",C:"Seated upright with back supported against a tree.",D:"Lying face-down with the head turned to one side."},c:"B",e:"An unconscious but breathing casualty should be placed in the Recovery Position (Lateral de Seguridad / PLS): on their side with the upper knee bent forward to stabilise the position and the mouth facing downward, preventing aspiration of vomit."},
{b:"Safety & First Aid",q:"What makes rifle injuries in the field particularly more dangerous than shotgun injuries regarding range?",o:{A:"Shotgun injuries are always more dangerous than rifle injuries.",B:"A rifle bullet retains lethal energy for over a kilometre if it does not stop in the ground, whereas shotgun pellets lose energy rapidly over short distances.",C:"Rifle wounds are always superficial due to small projectile diameter.",D:"Rifle ammunition does not cause significant internal injuries."},c:"B",e:"A rifle bullet can remain lethal for over 1 km if it does not embed in the terrain after firing — hence the critical importance of knowing the bullet's full trajectory in stalking and drive hunts. Shotgun pellets lose energy rapidly beyond 40-60 m."},
{b:"Safety & First Aid",q:"What is the first priority when treating a gunshot wound with severe haemorrhage to a limb in the field?",o:{A:"Irrigate and disinfect the wound before any other action.",B:"Apply firm direct pressure to the wound; if haemorrhage does not stop, apply a tourniquet proximal to the wound.",C:"Elevate the limb without applying pressure.",D:"Apply ice to constrict the blood vessels."},c:"B",e:"Severe limb haemorrhage is immediately life-threatening. The priority is direct firm pressure over the wound. If bleeding is not controlled, a tourniquet applied proximal to the wound (between wound and heart) can be life-saving, as exsanguination can cause death within minutes."},
{b:"Safety & First Aid",q:"What are the initial signs of haemorrhagic shock in a gunshot casualty?",o:{A:"High fever and intense localised pain only.",B:"Pallor, cold clammy skin, rapid weak pulse, thirst, anxiety and confusion.",C:"Bright red skin colour and slow pulse.",D:"Deep unconsciousness and complete cessation of breathing."},c:"B",e:"Early haemorrhagic shock presents with pallor, cold and sweaty skin, rapid and weak pulse, increasing thirst (a sign of reduced circulating volume), anxiety and disorientation. Immediate evacuation to medical facilities is essential."},
{b:"Safety & First Aid",q:"Under what specific circumstance should a hunting casualty with a suspected spinal injury NOT be moved?",o:{A:"A casualty should always be moved to a more comfortable position.",B:"Should not be moved if spinal injury is suspected (fall, strong back/neck trauma) unless there is an immediate life-threatening danger at the scene.",C:"Should not be moved only if they are unconscious.",D:"Should not be moved only if a doctor is less than 30 minutes away."},c:"B",e:"Moving a casualty with suspected spinal injury without proper immobilisation can cause permanent spinal cord damage. The only exception is when leaving the person in place poses an immediate life-threatening risk (fire, flooding, etc.)."},
{b:"Safety & First Aid",q:"What safety measure is essential when crossing any obstacle (fence, ditch, wall) while carrying a firearm?",o:{A:"Cross with the safety on and the weapon loaded, ready for immediate use.",B:"Always unload the firearm completely before crossing any obstacle.",C:"Pass the loaded weapon to a companion while crossing.",D:"Cross with the barrel pointing downward only."},c:"B",e:"Crossing obstacles with a loaded firearm is one of the most common causes of hunting accidents — a stumble or fall can cause an accidental discharge. The weapon must be fully unloaded before crossing any fence, ditch or other obstacle."},
{b:"Safety & First Aid",q:"What fluorescent colours are recommended for improving hunter visibility during drive hunts and monterías?",o:{A:"Full camouflage to avoid disturbing game.",B:"Fluorescent orange or yellow garments on visible areas such as the vest and hat.",C:"Completely white clothing.",D:"No specific colour is recommended."},c:"B",e:"In drive hunts, monterías and other multi-hunter modalities, wearing fluorescent orange or yellow on visible areas (vest and hat) makes hunters easily identifiable as people, significantly reducing the risk of mistaken-identity accidents."},
{b:"Safety & First Aid",q:"What specific danger must be avoided when shooting during a partridge ojeo with metal side blinds?",o:{A:"Shooting at birds flying above the blind.",B:"Firing horizontally below or through the metal side panels toward adjacent hunter posts.",C:"Reloading the shotgun more than once per drive.",D:"Using semi-automatic shotguns in fixed posts."},c:"B",e:"The metal side blinds in ojeo are designed to channel fire upward and forward. Shooting horizontally below or through the panels creates a lethal trajectory toward adjacent posts and is explicitly prohibited as a primary cause of accidents in this modality."},
{b:"Safety & First Aid",q:"What does the '3 E' rule prescribe as the mandatory order of actions at a hunting accident scene?",o:{A:"Evacuate → Evaluate → Stabilise.",B:"Evaluate → Stabilise → Evacuate.",C:"Stabilise → Evaluate → Evacuate.",D:"Evacuate → Stabilise → Evaluate."},c:"B",e:"The 3 E rule prescribes: Evaluate (assess the scene and the casualty's condition) → Stabilise (apply first aid measures to prevent deterioration) → Evacuate (transfer to definitive medical care). Reversing this order leads to ineffective or dangerous interventions."},
{b:"Safety & First Aid",q:"What immediate action is required for an eye injury caused by shotgun pellets during hunting?",o:{A:"Remove the pellet immediately with tweezers.",B:"Cover the eye with a clean gauze pad, instruct the casualty not to eat or drink, and evacuate urgently to a specialist eye centre.",C:"Irrigate the eye with clean water for 30 minutes.",D:"Apply antibiotic eye drops and allow the hunter to rest."},c:"B",e:"Eye injuries from pellets require covering (not treating) and urgent evacuation to an ophthalmology centre. The casualty must not eat or drink as anaesthesia will likely be required. Attempting to extract pellets in the field risks catastrophic additional damage."},

// ══ BLOCK 8: RESTOCKING & HABITAT MANAGEMENT (Q91–Q100) ══
{b:"Restocking & Habitat",q:"What is the maximum recommended density of farm-bred partridges during the rearing phase to ensure adequate wild-type behaviour development?",o:{A:"More than 5 partridges per square metre.",B:"Less than one partridge per square metre.",C:"Exactly 3 partridges per square metre.",D:"Density has no effect on behaviour development."},c:"B",e:"Breeding manuals recommend a maximum density of less than one partridge per square metre during rearing, combined with large, vegetation-rich pens and minimal human contact, to ensure the birds develop the anti-predator, foraging and social behaviours essential for post-release survival."},
{b:"Restocking & Habitat",q:"What is a 'shock restocking' (repoblación de choque) of partridges and why is it generally considered ineffective?",o:{A:"An emergency restocking programme using wild-caught birds from other estates.",B:"A last-minute release of farm-bred birds days before a hunt, primarily to meet committed commercial quotas — it does not improve the wild population and increases hunting pressure on wild birds.",C:"A rapid restocking method using helicopter releases.",D:"A technique involving the release of partridges at night to reduce predation."},c:"B",e:"Shock restocking involves releasing farm birds just before a commercial hunt to meet contracted quotas. It does not contribute to genuine population recovery, increases predation pressure on resident wild birds, and is widely criticised as ecologically and ethically counterproductive."},
{b:"Restocking & Habitat",q:"What is the recommended minimum size of the reserve zone around a partridge release area to improve post-release survival?",o:{A:"At least 10 hectares.",B:"More than 100 hectares.",C:"At least 500 hectares.",D:"There is no recommended minimum size."},c:"B",e:"Management recommendations for partridge restocking programmes indicate that the release zone should be declared a no-hunting reserve of more than 100 ha to allow released birds to establish, socialise and breed before being exposed to hunting pressure."},
{b:"Restocking & Habitat",q:"What is the main risk of restocking with farm-bred partridges of non-wild genetic lineage?",o:{A:"Farm-bred birds always die within 24 hours of release.",B:"Hybridisation with wild partridges, genetic contamination, and introduction of subclinical diseases that can spread to wild populations.",C:"They have no negative effects compared to wild-lineage birds.",D:"They exclusively affect the competitive balance with rabbits."},c:"B",e:"Restocking with non-wild-lineage birds risks hybridisation and genetic contamination of the wild gene pool. Additionally, birds raised with antibiotics and antiparasitic treatments may carry subclinical infections — apparently healthy but capable of infecting wild populations after release."},
{b:"Restocking & Habitat",q:"When is the recommended release timing for 90-day-old partridge chicks (perdigones de 90 días) and why?",o:{A:"In spring to coincide with the wild hatching season.",B:"In August-September, when natural wild chicks of the same year are also present, to maximise integration into natural flocks.",C:"In December, before the hunting season opens.",D:"At any time of year, as age of release has no effect on survival."},c:"B",e:"90-day-old chicks should be released in August-September, coinciding with wild chicks of the same age. This synchronisation facilitates social integration into natural flocks, improving survival and reducing the tendency of released birds to remain dependent on feeding points."},
{b:"Restocking & Habitat",q:"What are 'entaramados' in rabbit habitat management and how often should they be renewed?",o:{A:"Metal fencing used to exclude predators from warrens.",B:"Piled brushwood structures creating artificial refuge for rabbits, particularly in areas with few natural warrens; recommended to be renewed at least every 2 years.",C:"Artificial feeding stations for rabbits.",D:"Drinking troughs installed along rabbit movement corridors."},c:"B",e:"Entaramados are piles of brushwood (heather, gorse, holm oak branches) that create artificial shelter for rabbits, especially in habitats with few natural warrens. They must be renewed at least every 2 years as the wood decays and loses structural integrity."},
{b:"Restocking & Habitat",q:"What is the 'cercón' system for Iberian hare breeding and what advantage does it offer over direct release of farm-bred hares?",o:{A:"Cercones are live traps for capturing wild hares for mark-recapture studies.",B:"Large semi-extensive enclosures where hares are bred with minimal human contact, developing natural behaviours before release, improving post-release survival.",C:"Fenced plots where supplementary food is provided to boost wild hare density.",D:"Closed facilities for pure intensive breeding of hares for commercial sale."},c:"B",e:"Cercones are large semi-extensive enclosures where Iberian hares are bred under natural conditions with minimal human contact. This allows them to develop anti-predator, foraging and social behaviours essential for survival in the wild, dramatically improving post-release success compared to intensive farm-raised animals."},
{b:"Restocking & Habitat",q:"What is the primary ecological benefit of 'habitat management' (gestión del hábitat) in a hunting estate beyond improving hunting yields?",o:{A:"It increases the legal value of the estate for sale.",B:"It improves biodiversity, creates heterogeneous landscapes benefiting non-game species, and contributes to conservation of natural ecosystems.",C:"It reduces the administrative burden of PTOC preparation.",D:"It guarantees higher trophy quality in ungulate populations."},c:"B",e:"Habitat management — sowing food crops, creating water points, maintaining hedgerows and woodland structure — improves conditions not only for game species but for the full range of biodiversity. Well-managed hunting estates frequently support higher biodiversity than unmanaged agricultural land."},
{b:"Restocking & Habitat",q:"What type of crop is specifically recommended for wild boar habitat management in forest areas and why?",o:{A:"Sunflowers, because boar prefer seeds.",B:"Maize (corn), which can be buried when ripe to encourage boar to spend more time searching for food in the forest area, reducing crop damage to adjacent farmland.",C:"Wheat, because boar exclusively feed on cereal grains.",D:"Rapeseed, because its oil content attracts boar most effectively."},c:"B",e:"Maize planted in the forest, which can be buried when ripe or spread with a mechanical distributor, encourages wild boar to concentrate their feeding activity within the forest, reducing their pressure on adjacent agricultural crops and helping managers retain boar populations within the estate."},
{b:"Restocking & Habitat",q:"What essential resources must the release area offer to maximise survival of restocked red-legged partridges?",o:{A:"Only supplementary food provided by the estate manager.",B:"Food, water, and refuge from predators — ideally in a single multipurpose management area providing all three simultaneously.",C:"Only predator control without food or water provisioning.",D:"Only water — partridges find food independently."},c:"B",e:"The ideal release area must simultaneously offer food (natural or supplementary), fresh water (drinkers or natural sources) and refuge (shrubs, brushwood, choppers). Management guidance recommends combining all three elements in a single multipurpose zone to reduce dispersal and maximise survival of released birds."}
];

const BLOCKS=[...new Set(Q.map(q=>q.b))];
let st={screen:"start",cur:0,ans:{},filter:"All"};
function $i(id){return document.getElementById(id)}
function app(){return $i("app")}

function render(){
  if(st.screen==="start") renderStart();
  else if(st.screen==="quiz") renderQuiz();
  else renderResults();
  updateProg();
}

function updateProg(){
  const pw=$i("progWrap");
  if(st.screen==="quiz"){
    pw.style.display="flex";
    const done=Object.keys(st.ans).length;
    const pct=Math.round(done/Q.length*100);
    $i("progFill").style.width=pct+"%";
    $i("progLabel").textContent="Q"+(st.cur+1)+" / "+Q.length;
    const correct=Object.values(st.ans).filter(a=>a.correct).length;
    $i("scoreBadge").textContent=correct+"/"+done;
  } else {pw.style.display="none";}
}

function renderStart(){
  app().innerHTML=`<div class="card start">
    <div style="font-size:40px;margin-bottom:12px">🦅</div>
    <h2>Hunting Management Quiz III</h2>
    <p>TS Gestión Forestal y del Medio Natural</p>
    <p style="margin-top:4px;font-size:.82rem;opacity:.7">100 questions in English · Upper Secondary Vocational Level · All new</p>
    <div class="tags">${BLOCKS.map(b=>`<span class="tag">${b}</span>`).join("")}</div>
    <button class="btn btn-p" style="font-size:.98rem;padding:13px 34px;border-radius:8px" onclick="startQuiz()">Start Quiz →</button>
  </div>`;
}

function startQuiz(){st={screen:"quiz",cur:0,ans:{},filter:"All"};render();}

function renderQuiz(){
  const i=st.cur,q=Q[i],a=st.ans[i];
  const start=Math.max(0,i-4),end=Math.min(Q.length,start+10);
  let dots="";
  for(let d=start;d<end;d++){
    let cls="dot"+(d===i?" cur":"")+(st.ans[d]?(st.ans[d].correct?" ok":" no"):"");
    dots+=`<div class="${cls}" onclick="goTo(${d})">${d+1}</div>`;
  }
  let opts="";
  ["A","B","C","D"].forEach(l=>{
    let cls="option"+(a?" done":"");
    if(a){if(l===q.c)cls+=" correct";else if(l===a.chosen)cls+=" wrong";else cls+=" dim";}
    opts+=`<div class="${cls}" onclick="answer('${l}')"><div class="letter">${l}</div><div>${q.o[l]}</div></div>`;
  });
  const exp=a?`<div class="explanation show">💡 <b>Explanation:</b> ${q.e}</div>`:"";
  const last=i===Q.length-1;
  app().innerHTML=`<div class="card">
    <div class="block-tag">${q.b}</div>
    <div class="question">${q.q}</div>
    <div class="options">${opts}</div>${exp}
    <div class="nav">
      <button class="btn btn-s" onclick="prevQ()" ${i===0?"disabled":""}>← Previous</button>
      <button class="btn btn-p" onclick="nextQ()" ${a?"":"disabled"}>${last?"See Results →":"Next →"}</button>
      <button class="btn btn-s" onclick="skipQ()" ${a?"style='display:none'":""}>Skip</button>
    </div>
    <div class="dots">${dots}</div>
  </div>`;
}

function answer(l){const i=st.cur;if(st.ans[i])return;st.ans[i]={chosen:l,correct:l===Q[i].c};render();}
function nextQ(){if(st.cur>=Q.length-1){st.screen="results";render();}else{st.cur++;render();}}
function prevQ(){if(st.cur>0){st.cur--;render();}}
function goTo(i){st.cur=i;render();}
function skipQ(){if(!st.ans[st.cur])st.ans[st.cur]={chosen:null,correct:false};nextQ();}

function renderResults(){
  const total=Q.length,done=Object.keys(st.ans).length;
  const correct=Object.values(st.ans).filter(a=>a.correct).length;
  const wrong=done-correct,pct=Math.round(correct/total*100);
  let grade,gsub,gcol;
  if(pct>=90){grade="Excellent 🥇";gsub="Outstanding result";gcol=["#3a7a4a","#fff"];}
  else if(pct>=75){grade="Good 🥈";gsub="Satisfactory result";gcol=["#7a7a3a","#fff"];}
  else if(pct>=50){grade="Pass 🥉";gsub="Sufficient result";gcol=["#7a5c3a","#fff"];}
  else{grade="Not Passed ❌";gsub="Review the material";gcol=["#b84040","#fff"];}

  const f=st.filter;
  const filtered=Q.map((q,i)=>({q,i,a:st.ans[i]})).filter(({q,i,a})=>{
    if(!a)return false;
    if(f==="Wrong")return !a.correct;
    if(f==="Correct")return a.correct;
    if(f!=="All")return q.b===f;
    return true;
  });

  const tabs=["All","Correct","Wrong",...BLOCKS];
  const akHTML=filtered.length?filtered.map(({q,i,a})=>`
    <div class="ak-item ${a.correct?"ok":"no"}">
      <div class="ak-icon">${a.correct?"✅":"❌"}</div>
      <div class="ak-num">Q${i+1}</div>
      <div>
        <div style="font-weight:600;margin-bottom:4px;font-size:.83rem">${q.q.substring(0,85)}${q.q.length>85?"...":""}</div>
        ${a.correct
          ?`<div style="font-size:.78rem;color:#3a7a4a">✓ ${a.chosen}: ${q.o[a.chosen].substring(0,60)}</div>`
          :`<div style="font-size:.78rem;color:#b84040">Your answer: ${a.chosen||"Skipped"}</div>
           <div style="font-size:.78rem;color:#3a7a4a">✓ Correct: ${q.c} — ${q.o[q.c].substring(0,55)}</div>
           <div style="font-size:.76rem;color:#7a5c3a;font-style:italic;margin-top:3px">💡 ${q.e}</div>`}
      </div>
    </div>`).join("")
    :`<div style="text-align:center;color:#7a5c3a;padding:20px;font-size:.85rem">No items match this filter.</div>`;

  app().innerHTML=`<div class="card">
    <div class="results">
      <div class="score-circle" style="background:${gcol[0]};color:${gcol[1]}">
        <div class="big">${correct}/${total}</div><div class="sub">${pct}%</div>
      </div>
      <div class="grade-text">${grade}</div>
      <div class="grade-sub">${gsub}</div>
      <div class="stats">
        <div class="stat"><div class="n" style="color:#3a7a4a">${correct}</div><div class="l">Correct</div></div>
        <div class="stat"><div class="n" style="color:#b84040">${wrong}</div><div class="l">Wrong</div></div>
        <div class="stat"><div class="n">${total-done}</div><div class="l">Skipped</div></div>
        <div class="stat"><div class="n">${pct}%</div><div class="l">Score</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-p" onclick="startQuiz()">🔄 Retry Quiz</button>
        <button class="btn btn-s" onclick="reviewWrong()">Review Wrong Answers</button>
      </div>
    </div>
    <div class="ak-title">📋 Answer Key & Review</div>
    <div class="filters">${tabs.map(t=>`<button class="ftab${st.filter===t?" on":""}" onclick="setFilter('${t}')">${t}</button>`).join("")}</div>
    ${akHTML}
  </div>`;
}

function setFilter(f){st.filter=f;renderResults();}
function reviewWrong(){
  const w=Object.keys(st.ans).filter(i=>!st.ans[i].correct).map(Number);
  if(!w.length){alert("No wrong answers! 🎉");return;}
  st.cur=w[0];st.screen="quiz";render();
}
render();
</script>
</body>
</html>
